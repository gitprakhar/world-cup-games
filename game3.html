<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Ria World Cup — Headers</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1419;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ---------------- country picker modal ---------------- */
      .picker {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 16, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 20px;
      }
      .picker[hidden] { display: none; }
      .picker-card {
        background: #1a1d24;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 28px 28px 20px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .picker-card h1 { margin: 0 0 6px; font-size: 22px; font-weight: 800; }
      .picker-card p { margin: 0 0 18px; font-size: 13px; opacity: 0.7; }
      .picker-card select {
        width: 100%;
        padding: 12px 14px;
        background: #0f1219;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        font-size: 16px;
        font-family: inherit;
        appearance: none;
        -webkit-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%23fff' fill='none' stroke-width='1.5'/></svg>");
        background-repeat: no-repeat;
        background-position: right 14px center;
        margin-bottom: 14px;
      }
      .picker-card button {
        width: 100%;
        padding: 13px;
        background: #ff6e14;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .picker-card button:hover { background: #ff8033; }

      /* ---------------- game canvas + HUD ---------------- */
      .game { position: fixed; inset: 0; }
      .game[hidden] { display: none; }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none; /* swallow scroll/pinch so drags move the player */
        cursor: pointer;
      }

      .scoreboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .stat {
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      .stat-headers { font-size: 22px; font-weight: 800; }

      /* Big centred country header — flag + name + live score. The national
         colour (set per-country via --accent) tints the border + glow so the
         player's country is front-and-centre while they play. */
      .country-header {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 11px 24px;
        background: rgba(0, 0, 0, 0.58);
        border: 2px solid var(--accent, rgba(253, 230, 138, 0.45));
        border-radius: 999px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        pointer-events: none;
        z-index: 2;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        white-space: nowrap;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45),
                    0 0 22px -4px var(--accent, transparent);
      }
      /* One-time entrance pop, re-triggered each run by toggling .reveal. */
      .country-header.reveal { animation: headerReveal 0.6s cubic-bezier(0.22, 1.4, 0.4, 1); }
      @keyframes headerReveal {
        0%   { transform: translateX(-50%) translateY(-26px) scale(0.7); opacity: 0; }
        60%  { transform: translateX(-50%) translateY(4px) scale(1.06); }
        100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
      }
      .header-flag {
        font-size: 38px;
        line-height: 1;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.55));
      }
      .header-name {
        font-size: 19px;
        font-weight: 800;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .header-score {
        font-size: 32px;
        font-weight: 900;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
        min-width: 56px;
        text-align: right;
        line-height: 1;
      }
      .header-score.pop {
        animation: scorePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes scorePop {
        0%   { transform: scale(1);    color: #ffffff; }
        35%  { transform: scale(1.25); color: #fde047; }
        100% { transform: scale(1);    color: #ffffff; }
      }

      .leaderboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        right: 16px;
        width: 200px;
        max-height: 70vh;
        overflow: auto;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 10px 12px 8px;
        font-size: 13px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        pointer-events: none;
      }
      .lb-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 4px;
      }
      .lb-row {
        display: grid;
        grid-template-columns: 18px 22px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 3px 2px;
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
      }
      .lb-row.you {
        background: rgba(253, 230, 138, 0.18);
        color: #fde68a;
        font-weight: 700;
      }
      .lb-rank { opacity: 0.55; font-size: 11px; }
      .lb-flag { font-size: 16px; line-height: 1; }
      .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .hint {
        position: absolute;
        bottom: max(env(safe-area-inset-bottom, 0px), 24px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 13px;
        opacity: 0.65;
        pointer-events: none;
        transition: opacity 0.4s ease-out;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }

      /* +1 floater that flies from the bounce point to the leaderboard row. */
      .floater {
        position: fixed;
        z-index: 6;
        font-size: 28px;
        font-weight: 900;
        color: #fde047;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
        pointer-events: none;
        will-change: transform, opacity;
        transition:
          transform 0.85s cubic-bezier(0.25, 1.1, 0.5, 1),
          opacity 0.85s ease-out;
      }

      /* ---------------- game over ---------------- */
      .gameover {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 36%,
                    rgba(28, 32, 46, 0.55), rgba(5, 6, 11, 0.88));
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        padding: 20px;
        animation: goFade 0.35s ease-out;
      }
      @keyframes goFade { from { opacity: 0; } to { opacity: 1; } }
      .gameover[hidden] { display: none; }
      .gameover-card {
        position: relative;
        background: #16181f;
        border: 1px solid var(--accent, rgba(255, 255, 255, 0.12));
        border-radius: 18px;
        padding: 26px 30px 24px;
        text-align: center;
        width: 100%;
        max-width: 360px;
        max-height: calc(100vh - 40px);
        overflow: auto;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6),
                    0 0 50px -12px var(--accent, rgba(0, 0, 0, 0));
        animation: goPop 0.55s cubic-bezier(0.22, 1.3, 0.4, 1);
      }
      @keyframes goPop {
        0%   { transform: scale(0.82) translateY(24px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      /* Player hero — the cubist footballer in the country kit, pops out of
         the card; the flag pins to the lower-right like a country badge. */
      .gameover-card .go-hero {
        position: relative;
        width: 140px;
        height: 150px;
        margin: 0 auto 2px;
      }
      .gameover-card .go-player {
        display: block;
        width: 140px;
        height: 150px;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
        animation: playerPop 0.6s 0.05s cubic-bezier(0.22, 1.5, 0.4, 1) both;
      }
      @keyframes playerPop {
        0%   { transform: translateY(26px) scale(0.35); opacity: 0; }
        62%  { transform: translateY(-6px) scale(1.08); }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .gameover-card .go-flag {
        position: absolute;
        right: 4px;
        bottom: 6px;
        font-size: 42px;
        line-height: 1;
        filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.6));
        animation: flagDrop 0.55s 0.45s cubic-bezier(0.22, 1.5, 0.4, 1) both;
      }
      @keyframes flagDrop {
        0%   { transform: translateY(-22px) scale(0.3) rotate(-14deg); opacity: 0; }
        65%  { transform: translateY(4px) scale(1.15) rotate(6deg); }
        100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
      }
      .gameover-card .go-best-badge {
        display: inline-block;
        margin-bottom: 8px;
        padding: 5px 15px;
        background: linear-gradient(90deg, #fde047, #ff9f1c);
        color: #15181f;
        font-weight: 800;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-radius: 999px;
        box-shadow: 0 4px 14px -2px rgba(253, 224, 71, 0.6);
        animation: badgePulse 1.1s ease-in-out infinite;
      }
      .gameover-card .go-best-badge[hidden] { display: none; }
      @keyframes badgePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
      .gameover-card .go-title {
        margin: 0;
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .gameover-card .go-country {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--accent-text, #fde68a);
        margin: 3px 0 2px;
      }
      .gameover-card .score {
        font-size: 66px;
        font-weight: 900;
        color: #fde047;
        margin: 6px 0 0;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        animation: scoreReveal 0.6s 0.18s both cubic-bezier(0.22, 1.4, 0.4, 1);
      }
      @keyframes scoreReveal {
        0%   { transform: scale(0.3); opacity: 0; }
        70%  { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      .gameover-card .label {
        opacity: 0.6;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .gameover-card .go-rank {
        margin-top: 12px;
        font-size: 14px;
        opacity: 0.9;
      }
      .gameover-card .go-rank b {
        color: #fde047;
        font-size: 17px;
        font-weight: 900;
      }
      .gameover-card button {
        margin-top: 18px;
        width: 100%;
        padding: 13px;
        background: #ff6e14;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .gameover-card button:hover { background: #ff8033; }

      /* Leaderboard preview embedded in the game-over card so the player
         can see where their country sits at the end of a run. Visually
         echoes the live HUD leaderboard. */
      .gameover-card .gameover-lb {
        margin-top: 20px;
        text-align: left;
        max-height: 220px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px 8px;
      }
      .gameover-card .gameover-lb-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.65;
        margin-bottom: 6px;
      }
      .gameover-card .lb-row {
        display: grid;
        grid-template-columns: 18px 22px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 3px 2px;
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
        font-size: 13px;
      }
      .gameover-card .lb-row.you {
        background: rgba(253, 230, 138, 0.18);
        color: #fde68a;
        font-weight: 700;
      }
      .gameover-card .lb-rank { opacity: 0.55; font-size: 11px; }
      .gameover-card .lb-flag { font-size: 16px; line-height: 1; }
      .gameover-card .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* Small screens — push the side panels below the centred header so
         they don't overlap, and shrink the leaderboard. */
      @media (max-width: 600px) {
        .scoreboard  { top: calc(max(env(safe-area-inset-top, 0px), 16px) + 56px); }
        .leaderboard { top: calc(max(env(safe-area-inset-top, 0px), 16px) + 56px); }
      }
      @media (max-width: 480px) {
        /* Hide the live HUD leaderboard on phones — it crowds the playfield.
           Players still see the full leaderboard (and their country) on the
           game-over card. */
        .leaderboard { display: none; }
        .stat { padding: 7px 11px; font-size: 12px; }
        .stat-headers { font-size: 18px; }
        .country-header { padding: 7px 14px; gap: 10px; }
        .header-flag { font-size: 22px; }
        .header-name { font-size: 13px; letter-spacing: 0.04em; }
        .header-score { font-size: 22px; min-width: 40px; }
      }
    </style>
  </head>
  <body>
    <!-- Step 1: pick a country. -->
    <div class="picker" id="picker">
      <div class="picker-card">
        <h1>Pick your country</h1>
        <p>Every header you score adds to your country's total on the leaderboard.</p>
        <select id="country-select"></select>
        <button id="start-btn" type="button">Start playing</button>
      </div>
    </div>

    <!-- Step 2: the game itself. -->
    <div class="game" id="game" hidden>
      <canvas id="canvas"></canvas>

      <div class="scoreboard">
        <div class="stat stat-headers">⚡ <span id="headers">0</span></div>
        <div class="stat">🏆 Best <span id="best">0</span></div>
      </div>

      <div class="country-header" id="country-header">
        <div class="header-flag" id="header-flag">🇲🇽</div>
        <div class="header-name" id="header-name">Mexico</div>
        <div class="header-score" id="header-score">0</div>
      </div>

      <div class="leaderboard">
        <div class="lb-title">🌎 Leaderboard</div>
        <div id="lb-rows"></div>
      </div>

      <div class="hint" id="hint">Tilt your phone (or ← → / mouse / touch) — keep the ball on your head</div>

      <div class="gameover" id="gameover" hidden>
        <div class="gameover-card" id="gameover-card">
          <div class="go-hero">
            <canvas class="go-player" id="go-player" width="140" height="150"></canvas>
            <div class="go-flag" id="go-flag">🇲🇽</div>
          </div>
          <div class="go-best-badge" id="go-best-badge" hidden>★ New personal best</div>
          <div class="go-title">Full time</div>
          <div class="go-country" id="go-country">Playing for Mexico</div>
          <div class="score" id="final-score">0</div>
          <div class="label">headers</div>
          <div class="go-rank" id="go-rank"></div>
          <div class="gameover-lb">
            <div class="gameover-lb-title">🌎 Leaderboard</div>
            <div id="gameover-lb-rows"></div>
          </div>
          <button id="play-again" type="button">Play again</button>
        </div>
      </div>
    </div>

    <script>
      // =================================================================
      // COUNTRIES + LEADERBOARD STATE
      // =================================================================
      // [ISO-2, flag emoji, display name, seed score]. Seeds keep the
      // leaderboard from reading all-zeros on first paint.
      const COUNTRIES = [
        ["MX", "🇲🇽", "Mexico", 412],
        ["CO", "🇨🇴", "Colombia", 358],
        ["PE", "🇵🇪", "Peru", 287],
        ["CL", "🇨🇱", "Chile", 245],
        ["AR", "🇦🇷", "Argentina", 391],
        ["BR", "🇧🇷", "Brazil", 478],
        ["US", "🇺🇸", "USA", 219],
        ["ES", "🇪🇸", "Spain", 196],
        ["PH", "🇵🇭", "Philippines", 173],
        ["IN", "🇮🇳", "India", 312],
      ];
      // Per-country running totals — incremented on every successful header.
      // Plain in-memory map (no persistence, per spec).
      const scores = Object.fromEntries(
        COUNTRIES.map(([code, , , seed]) => [code, seed])
      );

      // Football kits per country — fed straight into drawPlayer's flat
      // palette. jersey = base plane, shadow = the cubist right-side break
      // (a darker shade of the base), collar + trim = the accent bands.
      const KITS = {
        MX: { jersey: "#00713a", shadow: "#004f29", collar: "#0a0a0a", trim: "#f5efe1" },
        CO: { jersey: "#fcd116", shadow: "#c9a50f", collar: "#00338d", trim: "#ce1126" },
        PE: { jersey: "#f5efe1", shadow: "#cfc9bd", collar: "#d91023", trim: "#d91023" },
        CL: { jersey: "#da291c", shadow: "#9e1d14", collar: "#0033a0", trim: "#f5efe1" },
        AR: { jersey: "#75aadb", shadow: "#4f86bd", collar: "#f5efe1", trim: "#f5efe1" },
        BR: { jersey: "#ffdf00", shadow: "#d4b800", collar: "#009c3b", trim: "#009c3b" },
        US: { jersey: "#f5efe1", shadow: "#cfc9bd", collar: "#0a3161", trim: "#b31942" },
        ES: { jersey: "#c60b1e", shadow: "#8e0815", collar: "#ffc400", trim: "#ffc400" },
        PH: { jersey: "#0038a8", shadow: "#00276f", collar: "#ce1126", trim: "#fcd116" },
        IN: { jersey: "#0090d0", shadow: "#0066a0", collar: "#ff9933", trim: "#ff9933" },
      };
      const DEFAULT_KIT = { jersey: "#c5221c", shadow: "#7d1612", collar: "#0e0e0e", trim: "#f5efe1" };

      // Stadium backdrops — one is picked at random each run. Each theme just
      // recolours the shared scene (sky gradient, sun/moon + halo, clouds,
      // floodlight glow, grass, horizon haze). stars=true scatters a starfield.
      const THEMES = [
        {
          name: "Golden hour",
          sky: [[0, "#162247"], [0.4, "#3a2d62"], [0.75, "#c4633a"], [1, "#f0a560"]],
          celestial: "#fff0c8",
          halo: [[0, "rgba(255,225,165,0.7)"], [0.35, "rgba(255,170,110,0.22)"], [1, "rgba(255,150,100,0)"]],
          cloud: "rgba(255,205,175,0.32)",
          lampGlow: "rgba(255,240,200,0.6)",
          grass: ["#4d8554", "#386841", "#1d4326"],
          haze: "rgba(255,200,150,0.4)",
          stars: false,
        },
        {
          name: "Clear day",
          sky: [[0, "#2b6fc4"], [0.5, "#5fa3e0"], [1, "#cfe9f7"]],
          celestial: "#fffbe8",
          halo: [[0, "rgba(255,250,220,0.85)"], [0.3, "rgba(255,245,200,0.25)"], [1, "rgba(255,245,200,0)"]],
          cloud: "rgba(255,255,255,0.7)",
          lampGlow: "rgba(255,250,230,0.25)",
          grass: ["#5aa45f", "#3f7a48", "#256b32"],
          haze: "rgba(220,240,255,0.35)",
          stars: false,
        },
        {
          name: "Night match",
          sky: [[0, "#05060f"], [0.5, "#0b1430"], [1, "#16284f"]],
          celestial: "#eef1ff",
          halo: [[0, "rgba(220,228,255,0.55)"], [0.4, "rgba(150,170,230,0.15)"], [1, "rgba(150,170,230,0)"]],
          cloud: "rgba(120,140,180,0.16)",
          lampGlow: "rgba(255,250,225,0.95)",
          grass: ["#2f6b3e", "#235233", "#13301d"],
          haze: "rgba(180,200,255,0.3)",
          stars: true,
        },
        {
          name: "Dusk",
          sky: [[0, "#1a1033"], [0.45, "#4a2a6b"], [0.8, "#a14a7a"], [1, "#e89a8a"]],
          celestial: "#ffe0d0",
          halo: [[0, "rgba(255,210,200,0.6)"], [0.35, "rgba(220,140,170,0.2)"], [1, "rgba(220,140,170,0)"]],
          cloud: "rgba(255,200,220,0.3)",
          lampGlow: "rgba(255,235,225,0.7)",
          grass: ["#487d52", "#356040", "#1d4326"],
          haze: "rgba(255,190,210,0.38)",
          stars: false,
        },
      ];
      let bgTheme = THEMES[0];
      let stars = []; // {x, y, r} in screen px — regenerated per run / resize

      // Session state.
      let playerCountry = "MX";
      let headers = 0;   // successful headers this run
      let best = 0;
      let newBestThisRun = false; // beat the prior best during this run?
      let alive = false;

      // =================================================================
      // UI REFERENCES
      // =================================================================
      const ui = {
        picker: document.getElementById("picker"),
        countrySelect: document.getElementById("country-select"),
        startBtn: document.getElementById("start-btn"),
        game: document.getElementById("game"),
        canvas: document.getElementById("canvas"),
        headers: document.getElementById("headers"),
        best: document.getElementById("best"),
        lbRows: document.getElementById("lb-rows"),
        hint: document.getElementById("hint"),
        gameover: document.getElementById("gameover"),
        gameoverCard: document.getElementById("gameover-card"),
        goPlayer: document.getElementById("go-player"),
        goFlag: document.getElementById("go-flag"),
        goCountry: document.getElementById("go-country"),
        goRank: document.getElementById("go-rank"),
        goBestBadge: document.getElementById("go-best-badge"),
        finalScore: document.getElementById("final-score"),
        playAgain: document.getElementById("play-again"),
        gameoverLbRows: document.getElementById("gameover-lb-rows"),
        countryHeader: document.getElementById("country-header"),
        headerFlag: document.getElementById("header-flag"),
        headerName: document.getElementById("header-name"),
        headerScore: document.getElementById("header-score"),
      };

      // Populate the dropdown.
      COUNTRIES.forEach(([code, flag, name]) => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = `${flag}  ${name}`;
        if (code === playerCountry) opt.selected = true;
        ui.countrySelect.appendChild(opt);
      });

      // Build the shared leaderboard markup once and reuse it for the live
      // HUD board AND the end-of-run summary on the game-over card.
      function buildLeaderboardHTML() {
        const ranked = COUNTRIES
          .map(([code, flag, name]) => ({ code, flag, name, score: scores[code] }))
          .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
        return ranked
          .map(
            (r, idx) => `
              <div class="lb-row${r.code === playerCountry ? " you" : ""}">
                <span class="lb-rank">${idx + 1}</span>
                <span class="lb-flag">${r.flag}</span>
                <span class="lb-name">${r.name}</span>
                <span>${r.score}</span>
              </div>`
          )
          .join("");
      }

      // Live HUD leaderboard — refreshed on every header.
      function renderLeaderboard() {
        ui.lbRows.innerHTML = buildLeaderboardHTML();
      }

      // End-of-run snapshot — populated when the game-over card opens.
      function renderGameoverLeaderboard() {
        ui.gameoverLbRows.innerHTML = buildLeaderboardHTML();
      }

      function setHeaders(n) {
        headers = n;
        ui.headers.textContent = String(n);
        if (n > best) {
          best = n;
          newBestThisRun = n > 0;
          ui.best.textContent = String(n);
        }
      }

      // World ranking of a country by current leaderboard score (1 = top).
      function countryRank(code) {
        return COUNTRIES
          .map(([c]) => c)
          .sort((a, b) => scores[b] - scores[a])
          .indexOf(code) + 1;
      }

      function setCountryHeader() {
        const entry = COUNTRIES.find(([code]) => code === playerCountry);
        if (!entry) return;
        ui.headerFlag.textContent = entry[1];
        ui.headerName.textContent = entry[2];
        ui.headerScore.textContent = String(scores[playerCountry]);
        // Tint the banner with the national kit colour.
        const kit = KITS[playerCountry] || DEFAULT_KIT;
        ui.countryHeader.style.setProperty("--accent", kit.jersey);
      }

      // Re-trigger the .pop animation each header so the number visibly
      // punches even on rapid-fire bounces.
      function pulseCountryScore() {
        ui.headerScore.textContent = String(scores[playerCountry]);
        ui.headerScore.classList.remove("pop");
        void ui.headerScore.offsetWidth; // force reflow
        ui.headerScore.classList.add("pop");
      }

      // Spawn a "+1" at the bounce point and fly it to the player's row.
      function spawnFloater(srcX, srcY) {
        const f = document.createElement("div");
        f.className = "floater";
        f.textContent = "+1";
        f.style.left = srcX + "px";
        f.style.top = srcY + "px";
        f.style.transform = "translate(-50%, -50%) scale(1)";
        f.style.opacity = "1";
        document.body.appendChild(f);

        let targetX = window.innerWidth - 100;
        let targetY = 60;
        const youRow = ui.lbRows.querySelector(".lb-row.you");
        if (youRow) {
          const rect = youRow.getBoundingClientRect();
          targetX = rect.left + rect.width / 2;
          targetY = rect.top + rect.height / 2;
        }
        const dx = targetX - srcX;
        const dy = targetY - srcY;
        requestAnimationFrame(() => {
          f.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.55)`;
          f.style.opacity = "0";
        });
        f.addEventListener("transitionend", () => f.remove(), { once: true });
        setTimeout(() => f.remove(), 1200);
      }

      // =================================================================
      // GAME PHYSICS + RENDERING
      // =================================================================
      const canvas = ui.canvas;
      const ctx = canvas.getContext("2d");

      // ---- tuning ----
      const GRAVITY = 1300;              // px/s² — ball's downward acceleration
      const BOUNCE_VY = 700;             // px/s — upward kick on every header
      const BOUNCE_LATERAL = 340;        // px/s — max sideways push from an off-centre hit
      const SIDE_RESTITUTION = 0.78;     // bounce energy retained off side walls
      const PLAYER_KEYBOARD_SPEED = 540; // px/s — keyboard movement
      const POINTER_LERP = 14;           // smoothing factor for mouse/touch follow
      const TILT_MAX_SPEED = 640;        // px/s — speed at full tilt
      const TILT_FULL_DEG = 22;          // tilt angle (deg from rest) for full speed
      const TILT_DEADZONE_DEG = 2.5;     // ignore tiny wobble so the player holds still
      const GROUND_FRAC = 0.78;          // grass starts at this fraction of viewport height
      const BALL_RADIUS = 22;
      const HEAD_RADIUS = 19;
      const LEG_HEIGHT = 36;
      const TORSO_HEIGHT = 50;
      const NECK_GAP = 4;
      // Distance from groundY (feet) up to the head's centre — used for
      // both drawing the figure and the bounce collision check.
      const HEAD_CENTRE_FROM_FEET = LEG_HEIGHT + TORSO_HEIGHT + NECK_GAP + HEAD_RADIUS;

      let W = 0, H = 0;
      let groundY = 0;
      const player = { x: 0 };
      const ball = { x: 0, y: 0, vx: 0, vy: 0, spin: 0, vSpin: 0 };

      // Track each input source separately; whichever fired most recently
      // wins, so swapping mid-game (touch → mouse → arrow keys) just works.
      const keys = { left: false, right: false };
      let pointerX = null;
      let lastInput = "none"; // "keyboard" | "pointer" | "tilt" | "none"

      // Gyroscope/tilt control (phones). tiltZero is the resting angle captured
      // at the start of each run, so however the player naturally holds the
      // phone becomes "centre" — they tilt left/right from there to steer.
      let tiltSetup = false;   // listener attached + permission granted
      let tiltDelta = 0;       // current left-right tilt, degrees from rest
      let tiltZero = null;     // resting angle; null = recalibrate on next reading

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        groundY = H * GROUND_FRAC;
        if (bgTheme.stars) seedStars();
        // Keep the player on-screen if the window shrank.
        player.x = Math.max(40, Math.min(W - 40, player.x || W / 2));
        if (!alive) {
          ball.x = W / 2;
          ball.y = H * 0.18;
        }
      }
      window.addEventListener("resize", resize);

      function resetForRun() {
        player.x = W / 2;
        // Drop the ball close to the player so the very first header is
        // reachable even on keyboard — fixed pixel range (not a fraction of
        // W) so wide desktops don't push the ball to a far corner where the
        // arrow keys can't catch up in time.
        const FIRST_DROP_HALF_RANGE = 110;
        ball.x = player.x + (Math.random() * 2 - 1) * FIRST_DROP_HALF_RANGE;
        ball.y = -BALL_RADIUS - 10;
        ball.vx = 0;
        ball.vy = 80; // small initial nudge so the drop feels purposeful
        ball.spin = 0;
        ball.vSpin = 0;
      }

      // Lay out a starfield for the current viewport (only used by night).
      function seedStars() {
        const count = Math.round((W * groundY) / 14000);
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * groundY * 0.8,
            r: Math.random() < 0.85 ? 0.8 : 1.5,
          });
        }
      }

      // Pick a random backdrop for this run.
      function pickTheme() {
        bgTheme = THEMES[Math.floor(Math.random() * THEMES.length)];
        if (bgTheme.stars) seedStars();
        else stars = [];
      }

      function startGame() {
        setHeaders(0);
        newBestThisRun = false;
        resetForRun();
        pickTheme();
        // Recapture the resting tilt angle so however the phone is held now
        // becomes centre for this run.
        tiltZero = null;
        tiltDelta = 0;
        alive = true;
        ui.hint.style.opacity = "0.65";
        ui.gameover.hidden = true;
        // Re-trigger the banner entrance pop for this run.
        ui.countryHeader.classList.remove("reveal");
        void ui.countryHeader.offsetWidth; // force reflow
        ui.countryHeader.classList.add("reveal");
      }

      // Render the cubist footballer (in the country kit) onto the small
      // game-over card canvas, centred with feet near the bottom.
      function drawCardPlayer() {
        const cssW = 140, cssH = 150;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const c = ui.goPlayer.getContext("2d");
        ui.goPlayer.width = cssW * dpr;
        ui.goPlayer.height = cssH * dpr;
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.clearRect(0, 0, cssW, cssH);
        drawPlayer(c, cssW / 2, cssH - 8);
      }

      // Count a number up to `to` over `dur` ms for a punchy reveal.
      function animateCount(el, to, dur = 650) {
        const start = performance.now();
        function step(now) {
          const t = Math.min(1, (now - start) / dur);
          const eased = 1 - Math.pow(1 - t, 3);
          el.textContent = String(Math.round(to * eased));
          if (t < 1) requestAnimationFrame(step);
          else el.textContent = String(to);
        }
        requestAnimationFrame(step);
      }

      function endGame() {
        alive = false;
        const entry = COUNTRIES.find(([code]) => code === playerCountry);
        const flag = entry ? entry[1] : "🏳️";
        const name = entry ? entry[2] : "your country";
        const kit = KITS[playerCountry] || DEFAULT_KIT;

        // Country-themed accent + hero art.
        ui.gameoverCard.style.setProperty("--accent", kit.jersey);
        ui.goFlag.textContent = flag;
        ui.goCountry.textContent = `Playing for ${name}`;
        ui.goRank.innerHTML = `${flag} ${name} is <b>#${countryRank(playerCountry)}</b> in the world`;
        ui.goBestBadge.hidden = !newBestThisRun;
        drawCardPlayer();

        renderGameoverLeaderboard();
        ui.gameover.hidden = false;
        animateCount(ui.finalScore, headers);
      }

      // ---------------------- input ----------------------
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
          keys.left = true;
          lastInput = "keyboard";
        } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
          keys.right = true;
          lastInput = "keyboard";
        }
      });
      window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
      });
      // Mouse + touch both flow through pointer events — one handler each.
      canvas.addEventListener("pointermove", (e) => {
        pointerX = e.clientX;
        lastInput = "pointer";
      });
      canvas.addEventListener("pointerdown", (e) => {
        pointerX = e.clientX;
        lastInput = "pointer";
        e.preventDefault();
      });

      // Phone tilt. e.gamma is the left-right tilt in degrees. We track it
      // relative to the resting angle captured at run start, and only claim
      // control once the player tilts past the deadzone — so a phone sitting
      // still never fights with touch/keyboard.
      function onOrientation(e) {
        if (e.gamma === null || e.gamma === undefined) return;
        if (tiltZero === null) tiltZero = e.gamma;
        const delta = e.gamma - tiltZero;
        tiltDelta = delta;
        if (Math.abs(delta) > TILT_DEADZONE_DEG) lastInput = "tilt";
      }

      // Attach the orientation listener. iOS 13+ gates the sensor behind a
      // permission prompt that must be triggered from a user gesture, so this
      // is called from the Start button tap.
      function enableTilt() {
        if (tiltSetup) return;
        const DOE = window.DeviceOrientationEvent;
        if (!DOE) return; // device has no orientation sensor
        const attach = () => {
          window.addEventListener("deviceorientation", onOrientation);
          tiltSetup = true;
        };
        if (typeof DOE.requestPermission === "function") {
          DOE.requestPermission().then((state) => {
            if (state === "granted") attach();
          }).catch(() => {});
        } else {
          attach();
        }
      }

      // ---------------------- physics ----------------------
      function tickPlayer(dt) {
        if (keys.left || keys.right) {
          // Pressing a key implies direct control — override pointer-follow.
          lastInput = "keyboard";
          let vx = 0;
          if (keys.left) vx -= PLAYER_KEYBOARD_SPEED;
          if (keys.right) vx += PLAYER_KEYBOARD_SPEED;
          player.x += vx * dt;
        } else if (lastInput === "pointer" && pointerX !== null) {
          // Smoothly chase the pointer (instant snap would feel jittery).
          player.x += (pointerX - player.x) * Math.min(1, dt * POINTER_LERP);
        } else if (lastInput === "tilt") {
          // Tilt steers like a velocity: angle past the deadzone, ramped to
          // full speed at TILT_FULL_DEG, beyond which it's capped.
          let d = tiltDelta;
          if (d > TILT_DEADZONE_DEG) d -= TILT_DEADZONE_DEG;
          else if (d < -TILT_DEADZONE_DEG) d += TILT_DEADZONE_DEG;
          else d = 0;
          const frac = Math.max(-1, Math.min(1, d / (TILT_FULL_DEG - TILT_DEADZONE_DEG)));
          player.x += frac * TILT_MAX_SPEED * dt;
        }
        // Keep the player's head fully on-screen.
        player.x = Math.max(HEAD_RADIUS + 6, Math.min(W - HEAD_RADIUS - 6, player.x));
      }

      function headCentre() {
        return { x: player.x, y: groundY - HEAD_CENTRE_FROM_FEET };
      }

      function tickBall(dt) {
        ball.vy += GRAVITY * dt;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.spin += ball.vSpin * dt + ball.vx * dt * 0.008;

        // Side walls.
        if (ball.x - BALL_RADIUS < 0) {
          ball.x = BALL_RADIUS;
          ball.vx = -ball.vx * SIDE_RESTITUTION;
        } else if (ball.x + BALL_RADIUS > W) {
          ball.x = W - BALL_RADIUS;
          ball.vx = -ball.vx * SIDE_RESTITUTION;
        }

        // Header collision — ball overlaps the head's upper hemisphere
        // while moving downward. Side-hits don't count; only true headers.
        const head = headCentre();
        const dx = ball.x - head.x;
        const dy = ball.y - head.y;
        const combined = BALL_RADIUS + HEAD_RADIUS;
        if (
          ball.vy > 0 &&
          dy < 0 &&
          dx * dx + dy * dy < combined * combined
        ) {
          const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
          // Snap ball just outside the head along the contact normal so
          // it can't stick / re-trigger next frame.
          ball.x = head.x + (dx / dist) * combined;
          ball.y = head.y + (dy / dist) * combined;
          // -1 (far left of head) → ball goes left; +1 (far right) → right.
          const offset = Math.max(-1, Math.min(1, dx / HEAD_RADIUS));
          ball.vy = -BOUNCE_VY;
          ball.vx = offset * BOUNCE_LATERAL;
          ball.vSpin = offset * 0.06;

          setHeaders(headers + 1);
          scores[playerCountry] = (scores[playerCountry] || 0) + 1;
          renderLeaderboard();
          pulseCountryScore();
          spawnFloater(ball.x, ball.y - BALL_RADIUS - 4);
          ui.hint.style.opacity = "0";
        }

        // Ground = run ends.
        if (ball.y + BALL_RADIUS >= groundY) {
          ball.y = groundY - BALL_RADIUS;
          ball.vy = 0;
          endGame();
        }
      }

      // ---------------------- rendering ----------------------
      // Stadium scene at golden hour. Rebuilt every frame — cheap at 60fps
      // and sidesteps any cache invalidation work on resize.
      function drawBackground() {
        // SKY — gradient stops come from the active theme.
        const sky = ctx.createLinearGradient(0, 0, 0, groundY);
        for (const [stop, color] of bgTheme.sky) sky.addColorStop(stop, color);
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, groundY);

        // STARS — night theme only.
        if (stars.length) {
          ctx.fillStyle = "rgba(255,255,255,0.85)";
          for (const s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // SUN / MOON + halo
        const sunX = W * 0.72;
        const sunY = groundY - H * 0.12;
        const sunR = Math.min(W, H) * 0.045;
        const halo = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 8);
        for (const [stop, color] of bgTheme.halo) halo.addColorStop(stop, color);
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, W, groundY);
        ctx.fillStyle = bgTheme.celestial;
        ctx.beginPath();
        ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
        ctx.fill();

        // CLOUDS
        function cloud(cx, cy, sz) {
          ctx.fillStyle = bgTheme.cloud;
          ctx.beginPath();
          ctx.ellipse(cx - sz * 0.45, cy, sz * 0.4, sz * 0.18, 0, 0, Math.PI * 2);
          ctx.ellipse(cx, cy - sz * 0.06, sz * 0.5, sz * 0.22, 0, 0, Math.PI * 2);
          ctx.ellipse(cx + sz * 0.45, cy + sz * 0.02, sz * 0.42, 0.19 * sz, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        cloud(W * 0.18, H * 0.22, Math.min(W, H) * 0.09);
        cloud(W * 0.46, H * 0.11, Math.min(W, H) * 0.11);
        cloud(W * 0.88, H * 0.27, Math.min(W, H) * 0.075);

        // STADIUM SILHOUETTE — stepped roofline of distant stands.
        ctx.fillStyle = "#15203a";
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(0, groundY - 24);
        ctx.lineTo(W * 0.07, groundY - 26);
        ctx.lineTo(W * 0.09, groundY - 44);
        ctx.lineTo(W * 0.3,  groundY - 46);
        ctx.lineTo(W * 0.32, groundY - 34);
        ctx.lineTo(W * 0.48, groundY - 36);
        ctx.lineTo(W * 0.5,  groundY - 56);
        ctx.lineTo(W * 0.72, groundY - 56);
        ctx.lineTo(W * 0.74, groundY - 40);
        ctx.lineTo(W * 0.94, groundY - 38);
        ctx.lineTo(W * 0.96, groundY - 26);
        ctx.lineTo(W, groundY - 24);
        ctx.lineTo(W, groundY);
        ctx.closePath();
        ctx.fill();

        // FLOODLIGHTS
        ctx.strokeStyle = "#0e1626";
        ctx.lineWidth = 2;
        const lights = [
          { x: W * 0.16, h: 78 },
          { x: W * 0.61, h: 96 },
          { x: W * 0.88, h: 72 },
        ];
        for (const { x, h } of lights) {
          ctx.beginPath();
          ctx.moveTo(x, groundY - 50);
          ctx.lineTo(x, groundY - 50 - h);
          ctx.stroke();
          const ly = groundY - 50 - h;
          const lampGlow = ctx.createRadialGradient(x, ly, 0, x, ly, 32);
          lampGlow.addColorStop(0, bgTheme.lampGlow);
          lampGlow.addColorStop(1, bgTheme.lampGlow.replace(/[\d.]+\)$/, "0)"));
          ctx.fillStyle = lampGlow;
          ctx.beginPath();
          ctx.arc(x, ly, 32, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff5d6";
          ctx.beginPath();
          ctx.arc(x, ly, 4, 0, Math.PI * 2);
          ctx.fill();
        }

        // Horizon haze — sells the stadium-meets-pitch depth.
        const haze = ctx.createLinearGradient(0, groundY - 10, 0, groundY + 4);
        haze.addColorStop(0, bgTheme.haze.replace(/[\d.]+\)$/, "0)"));
        haze.addColorStop(1, bgTheme.haze);
        ctx.fillStyle = haze;
        ctx.fillRect(0, groundY - 10, W, 14);

        // GRASS + mowing stripes from a vanishing point above.
        const grass = ctx.createLinearGradient(0, groundY, 0, H);
        grass.addColorStop(0, bgTheme.grass[0]);
        grass.addColorStop(0.5, bgTheme.grass[1]);
        grass.addColorStop(1, bgTheme.grass[2]);
        ctx.fillStyle = grass;
        ctx.fillRect(0, groundY, W, H - groundY);
        const vpX = W * 0.5;
        const vpY = groundY - H * 0.25;
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, groundY, W, H - groundY);
        ctx.clip();
        for (let i = 0; i < 9; i++) {
          if (i % 2 !== 0) continue;
          const a1 = (i / 9 - 0.5) * Math.PI * 1.25;
          const a2 = ((i + 1) / 9 - 0.5) * Math.PI * 1.25;
          ctx.fillStyle = "rgba(0,0,0,0.11)";
          ctx.beginPath();
          ctx.moveTo(vpX + Math.tan(a1) * (groundY - vpY), groundY);
          ctx.lineTo(vpX + Math.tan(a1) * (H + 300 - vpY), H + 300);
          ctx.lineTo(vpX + Math.tan(a2) * (H + 300 - vpY), H + 300);
          ctx.lineTo(vpX + Math.tan(a2) * (groundY - vpY), groundY);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      // Cubist / flat-illustration player: limited palette, hard-edged
      // planes, no gradients. The face is split into a lit half (warm
      // off-white) and a shadow half (cool grey), with a heavy brow and an
      // angular nose. The jersey (base + shadow plane, collar, trim, belt)
      // is coloured from the selected country's kit — see KITS.
      // Draws the figure onto context `c` with feet at (px, feetY). Defaults
      // to the live game canvas; the game-over card passes its own mini canvas.
      function drawPlayer(c = ctx, px = player.x, feetY = groundY) {
        const hipY = feetY - LEG_HEIGHT;
        const shoulderY = hipY - TORSO_HEIGHT;
        const head = { x: px, y: feetY - HEAD_CENTRE_FROM_FEET };

        // Flat palette — change here to retheme the player.
        const SKIN_LIGHT = "#eee5d3";
        const SKIN_SHADOW = "#7d7872";
        const HAIR = "#a8a8a2";
        const BROW = "#161616";
        // Jersey colours follow the selected country's kit.
        const kit = KITS[playerCountry] || DEFAULT_KIT;
        const JERSEY = kit.jersey;
        const JERSEY_SHADOW = kit.shadow;
        const COLLAR = kit.collar;
        const TRIM = kit.trim;
        const LEG = "#161821";

        // Drop shadow under the feet.
        c.save();
        c.translate(px, feetY + 2);
        c.scale(1, 0.32);
        c.fillStyle = "rgba(0, 0, 0, 0.4)";
        c.beginPath();
        c.arc(0, 0, 26, 0, Math.PI * 2);
        c.fill();
        c.restore();

        // ---- Legs ----
        // Dark rectangles with a 2px inside-edge highlight to suggest a
        // plane break (very subtle at this scale, but reads with the rest).
        c.fillStyle = LEG;
        c.fillRect(px - 12, hipY, 9, LEG_HEIGHT);
        c.fillRect(px + 3, hipY, 9, LEG_HEIGHT);
        c.fillStyle = "rgba(255,255,255,0.08)";
        c.fillRect(px - 12, hipY, 2, LEG_HEIGHT);
        c.fillRect(px + 3, hipY, 2, LEG_HEIGHT);
        // Cleats.
        c.fillStyle = "#0a0a0a";
        c.fillRect(px - 15, feetY - 4, 15, 4);
        c.fillRect(px, feetY - 4, 15, 4);

        // ---- Torso / jersey ----
        const tL = px - 18;
        const tR = px + 18;
        const tT = shoulderY;
        const tB = hipY;
        // Base jersey plane.
        c.fillStyle = JERSEY;
        c.fillRect(tL, tT, 36, TORSO_HEIGHT);
        // Shadow plane on the right — angled cubist break.
        c.fillStyle = JERSEY_SHADOW;
        c.beginPath();
        c.moveTo(px + 3, tT);
        c.lineTo(tR, tT);
        c.lineTo(tR, tB);
        c.lineTo(px - 3, tB);
        c.closePath();
        c.fill();
        // Collar band at the top + trim below it.
        c.fillStyle = COLLAR;
        c.fillRect(tL, tT, 36, 7);
        c.fillStyle = TRIM;
        c.fillRect(tL, tT + 7, 36, 2);
        // Belt — collar-tone strip near the bottom of the jersey.
        c.fillStyle = COLLAR;
        c.fillRect(tL, tB - 5, 36, 4);

        // ---- Arms ----
        // Flat trapezoid sleeves in the jersey-shadow tone, with one light
        // and one shadow hand to carry the bicolour conceit through.
        c.fillStyle = JERSEY_SHADOW;
        c.beginPath();
        c.moveTo(tL, tT + 7);
        c.lineTo(tL - 8, tT + 10);
        c.lineTo(tL - 6, tT + 30);
        c.lineTo(tL, tT + 28);
        c.closePath();
        c.fill();
        c.beginPath();
        c.moveTo(tR, tT + 7);
        c.lineTo(tR + 8, tT + 10);
        c.lineTo(tR + 6, tT + 30);
        c.lineTo(tR, tT + 28);
        c.closePath();
        c.fill();
        c.fillStyle = SKIN_LIGHT;
        c.beginPath();
        c.arc(tL - 6, tT + 32, 4, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = SKIN_SHADOW;
        c.beginPath();
        c.arc(tR + 6, tT + 32, 4, 0, Math.PI * 2);
        c.fill();

        // ---- Head ----
        // 1) Light-skin base disc.
        c.fillStyle = SKIN_LIGHT;
        c.beginPath();
        c.arc(head.x, head.y, HEAD_RADIUS, 0, Math.PI * 2);
        c.fill();

        // 2) Clip to the head and paint the shadow plane + features inside.
        c.save();
        c.beginPath();
        c.arc(head.x, head.y, HEAD_RADIUS, 0, Math.PI * 2);
        c.clip();

        // Shadow plane on the right — vertical slab, angled inward at the
        // chin for the geometric "two halves of a face" look.
        c.fillStyle = SKIN_SHADOW;
        c.beginPath();
        c.moveTo(head.x + HEAD_RADIUS * 0.05, head.y - HEAD_RADIUS);
        c.lineTo(head.x + HEAD_RADIUS, head.y - HEAD_RADIUS);
        c.lineTo(head.x + HEAD_RADIUS, head.y + HEAD_RADIUS);
        c.lineTo(head.x + HEAD_RADIUS * 0.25, head.y + HEAD_RADIUS);
        c.closePath();
        c.fill();

        // Hair — flat angular cap across the top of the head.
        c.fillStyle = HAIR;
        c.beginPath();
        c.moveTo(head.x - HEAD_RADIUS, head.y - HEAD_RADIUS * 0.15);
        c.lineTo(head.x - HEAD_RADIUS * 0.55, head.y - HEAD_RADIUS);
        c.lineTo(head.x + HEAD_RADIUS * 0.5, head.y - HEAD_RADIUS);
        c.lineTo(head.x + HEAD_RADIUS, head.y - HEAD_RADIUS * 0.55);
        c.lineTo(head.x + HEAD_RADIUS, head.y - HEAD_RADIUS * 0.28);
        c.lineTo(head.x + HEAD_RADIUS * 0.55, head.y - HEAD_RADIUS * 0.38);
        c.lineTo(head.x - HEAD_RADIUS * 0.4, head.y - HEAD_RADIUS * 0.32);
        c.closePath();
        c.fill();

        // Heavy brow — thick dark slab under the hairline.
        c.fillStyle = BROW;
        c.fillRect(
          head.x - HEAD_RADIUS * 0.65,
          head.y - HEAD_RADIUS * 0.2,
          HEAD_RADIUS * 1.25,
          Math.max(2, HEAD_RADIUS * 0.18)
        );

        // Angular nose — small dark triangle pointing down-right.
        c.fillStyle = BROW;
        c.beginPath();
        c.moveTo(head.x + HEAD_RADIUS * 0.1, head.y - HEAD_RADIUS * 0.02);
        c.lineTo(head.x + HEAD_RADIUS * 0.55, head.y + HEAD_RADIUS * 0.28);
        c.lineTo(head.x + HEAD_RADIUS * 0.18, head.y + HEAD_RADIUS * 0.3);
        c.closePath();
        c.fill();

        // Tiny ear nub on the left side of the head.
        c.fillStyle = SKIN_LIGHT;
        c.beginPath();
        c.arc(
          head.x - HEAD_RADIUS * 0.92,
          head.y + HEAD_RADIUS * 0.1,
          HEAD_RADIUS * 0.18,
          0,
          Math.PI * 2
        );
        c.fill();

        c.restore();

        // Crisp outline so the head silhouette pops against the pitch.
        c.lineWidth = 1.3;
        c.strokeStyle = "rgba(0,0,0,0.55)";
        c.beginPath();
        c.arc(head.x, head.y, HEAD_RADIUS, 0, Math.PI * 2);
        c.stroke();
      }

      // White sphere with radial-gradient shading + drop shadow.
      function drawBall() {
        const heightAbove = groundY - ball.y;
        const heightFrac = Math.max(0, Math.min(1, heightAbove / (H * 0.55)));
        const shadowAlpha = 0.4 * (1 - heightFrac * 0.65);
        const shadowScale = Math.max(0.45, 1 - heightFrac * 0.5);
        ctx.save();
        ctx.translate(ball.x, groundY + BALL_RADIUS * 0.15);
        ctx.scale(shadowScale, 0.3);
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(0, 0, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(ball.x, ball.y);

        // Body — lit from the upper-left.
        const body = ctx.createRadialGradient(
          -BALL_RADIUS * 0.32, -BALL_RADIUS * 0.38, 0,
          0, 0, BALL_RADIUS * 1.05
        );
        body.addColorStop(0, "#ffffff");
        body.addColorStop(0.4, "#f0f0f0");
        body.addColorStop(0.82, "#a8a8a8");
        body.addColorStop(1, "#666666");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(0, 0, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fill();

        // Specular hotspot.
        const spec = ctx.createRadialGradient(
          -BALL_RADIUS * 0.34, -BALL_RADIUS * 0.4, 0,
          -BALL_RADIUS * 0.34, -BALL_RADIUS * 0.4, BALL_RADIUS * 0.42
        );
        spec.addColorStop(0, "rgba(255,255,255,0.95)");
        spec.addColorStop(0.6, "rgba(255,255,255,0.25)");
        spec.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = spec;
        ctx.beginPath();
        ctx.arc(-BALL_RADIUS * 0.34, -BALL_RADIUS * 0.4, BALL_RADIUS * 0.42, 0, Math.PI * 2);
        ctx.fill();

        // Edge.
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.arc(0, 0, BALL_RADIUS, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      // ---------------------- main loop ----------------------
      let lastT = performance.now();
      function loop(now) {
        const dt = Math.min((now - lastT) / 1000, 0.05);
        lastT = now;
        if (alive) {
          tickPlayer(dt);
          tickBall(dt);
        }
        drawBackground();
        drawPlayer();
        drawBall();
        requestAnimationFrame(loop);
      }

      // =================================================================
      // BOOT
      // =================================================================
      ui.startBtn.addEventListener("click", () => {
        playerCountry = ui.countrySelect.value;
        // This tap is a user gesture — the only context iOS lets us ask for
        // gyroscope access from.
        enableTilt();
        setCountryHeader();
        ui.picker.hidden = true;
        ui.game.hidden = false;
        resize();
        renderLeaderboard();
        startGame();
      });

      ui.playAgain.addEventListener("click", () => startGame());

      resize();
      renderLeaderboard();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
