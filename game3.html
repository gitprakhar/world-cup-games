<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Ria World Cup — Headers</title>
    <!-- Pixel/bitmap font for the billboard ads. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      /* =================================================================
         16-BIT PALETTE — tweak these to recolour the whole UI. The canvas
         art reads the matching JS `PALETTE` object (top of the script).
         ================================================================= */
      :root {
        --ui-blue:      #3a6fd0;  /* panel / badge fill        */
        --ui-blue-lt:   #6fa3f0;  /* top-left bevel highlight   */
        --ui-blue-dk:   #21408a;  /* bottom-right bevel shadow  */
        --ui-inset:     #16284f;  /* recessed score box         */
        --ui-outline:   #0b1430;  /* hard outer outline         */
        --ui-text:      #ffffff;
        --ui-gold:      #ffd23a;  /* numbers + icons            */
        --btn-orange:   #f2913a;
        --btn-orange-dk:#c96f1f;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1419;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ---------------- country picker modal ---------------- */
      .picker {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end; /* title, byline + controls clustered at the bottom */
        gap: 16px;
        /* poster.png shown as-is behind the country selection */
        background: url("poster.png") center / cover no-repeat;
        image-rendering: pixelated;
        padding: 5vh 20px calc(58px + env(safe-area-inset-bottom, 0px)); /* clear the ticker */
        text-align: center;
      }
      .picker[hidden] { display: none; }
      .picker-head {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .picker-title {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(26px, 9vw, 42px);
        color: #ffffff;
        letter-spacing: 0.04em;
        text-shadow: 0 3px 0 #0b1430, 0 0 12px rgba(0, 0, 0, 0.5);
      }
      .picker-bottom {
        width: 100%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .picker-sub {
        margin: 0;
        max-width: 300px;
        font-family: "Press Start 2P", monospace;
        font-size: 8px;
        line-height: 1.7;
        color: #ffffff;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.6);
      }
      /* Pixel-style dropdown (beveled blue panel). */
      .picker select {
        width: 100%;
        font-family: "Press Start 2P", monospace;
        font-size: 10px;
        color: #fff;
        background-color: var(--ui-blue);
        border: 3px solid var(--ui-outline);
        box-shadow:
          inset 3px 3px 0 0 var(--ui-blue-lt),
          inset -3px -3px 0 0 var(--ui-blue-dk);
        padding: 13px 30px 13px 12px;
        appearance: none;
        -webkit-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%23fff' fill='none' stroke-width='2'/></svg>");
        background-repeat: no-repeat;
        background-position: right 12px center;
        cursor: pointer;
      }
      /* Pixel-style start button (beveled orange). */
      .picker button {
        width: 100%;
        font-family: "Press Start 2P", monospace;
        font-size: 12px;
        text-transform: uppercase;
        color: #1a1206;
        padding: 14px;
        background: var(--btn-orange);
        border: 3px solid var(--ui-outline);
        box-shadow:
          inset 3px 3px 0 0 #ffd9a8,
          inset -3px -3px 0 0 var(--btn-orange-dk),
          0 4px 0 rgba(0, 0, 0, 0.35);
        cursor: pointer;
      }
      .picker button:active { transform: translateY(1px); }
      /* Scrolling standings ticker pinned to the bottom of the home screen. */
      .home-ticker {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        padding: 7px 0;
        background: rgba(8, 10, 16, 0.72);
        border-top: 2px solid var(--ui-outline);
        white-space: nowrap;
      }
      .ticker-track {
        display: inline-block;
        white-space: nowrap;
        font-family: "Press Start 2P", monospace;
        font-size: 9px;
        color: #fff;
        will-change: transform;
        animation: tickerScroll 22s linear infinite;
      }
      .ticker-track .tk-item { margin: 0 16px; }
      .ticker-track .tk-flag { font-family: initial; }
      .ticker-track b { color: var(--ui-gold); font-weight: normal; }
      .ticker-track .tk-you b,
      .ticker-track .tk-you { color: #ffd23a; }
      @keyframes tickerScroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }

      /* ---------------- game canvas + HUD ---------------- */
      .game { position: fixed; inset: 0; }
      .game[hidden] { display: none; }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none; /* swallow scroll/pinch so drags move the player */
        cursor: pointer;
        image-rendering: pixelated;        /* keep the upscaled pixel art crisp */
        image-rendering: -moz-crisp-edges;
      }
      .go-player { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }

      /* ---------------- TOP HUD (16-bit beveled pixel UI) ----------------
         Shared bevel: hard inset highlights/shadows (no blur, no radius) and
         a crisp dark outline. `.px-panel` is the reusable chrome. */
      .px-panel {
        background: var(--ui-blue);
        border: 3px solid var(--ui-outline);
        box-shadow:
          inset 3px 3px 0 0 var(--ui-blue-lt),   /* top-left highlight  */
          inset -3px -3px 0 0 var(--ui-blue-dk), /* bottom-right shadow */
          0 4px 0 0 rgba(0, 0, 0, 0.35);         /* drop shadow         */
        font-family: "Press Start 2P", monospace;
        color: var(--ui-text);
        image-rendering: pixelated;
      }
      .px-inset { /* recessed dark box (score readout) */
        background: var(--ui-inset);
        box-shadow:
          inset 2px 2px 0 0 rgba(0, 0, 0, 0.55),
          inset -2px -2px 0 0 rgba(255, 255, 255, 0.08);
      }

      /* Single HUD pane (top-left): compact top-3 (+ your country). */
      .leaderboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 12px);
        left: 12px;
        width: 138px;
        padding: 8px 9px 7px;
        font-family: "Press Start 2P", monospace;
        color: var(--ui-text);
        pointer-events: none;
      }
      .lb-title {
        font-size: 7px;
        letter-spacing: 0.06em;
        color: #cde0ff;
        margin-bottom: 7px;
      }
      .lb-row {
        display: grid;
        grid-template-columns: 12px 18px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 4px 2px;
        font-size: 10px;
      }
      .lb-row.you {
        background: var(--ui-inset);
        box-shadow: inset 2px 2px 0 0 rgba(0,0,0,0.5), inset -2px -2px 0 0 rgba(255,255,255,0.08);
        color: var(--ui-gold);
      }
      .lb-rank { color: #9ab4e6; }
      .lb-flag { font-size: 16px; line-height: 1; font-family: initial; }
      .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .lb-score { color: var(--ui-gold); }
      .lb-row.you .lb-name { color: var(--ui-gold); }

      /* Sound + play/pause controls (top-right), beveled pixel buttons. */
      .controls {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 12px);
        right: 12px;
        display: flex;
        gap: 8px;
        z-index: 3;
      }
      .ctrl-btn {
        width: 38px;
        height: 38px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        pointer-events: auto;
        color: var(--ui-gold);
        border: none; /* bevel comes from .px-panel box-shadow */
      }
      .ctrl-btn:active { transform: translateY(1px); }
      /* During the tilt practice, hide the HUD leaderboard + control buttons. */
      .game.tut .leaderboard,
      .game.tut .controls { display: none; }
      .ctrl-btn svg {
        width: 20px;
        height: 20px;
        display: block;
        shape-rendering: crispEdges; /* keep the pixel icons hard-edged */
      }
      @media (max-width: 480px) {
        .ctrl-btn { width: 32px; height: 32px; }
        .ctrl-btn svg { width: 17px; height: 17px; }
      }

      /* How-to-play tilt demo overlay (mobile). Transparent so the player is
         visible moving behind it; only the Start button is clickable. */
      .tutorial {
        position: absolute;
        inset: 0;
        z-index: 4;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 16vh;
        pointer-events: none;
        font-family: "Press Start 2P", monospace;
        color: #fff;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.6);
      }
      .tutorial[hidden] { display: none; }
      /* Rotation is set in JS from the live device tilt (see the loop). */
      .tut-phone { width: 56px; height: 56px; transition: transform 0.06s linear; }
      .tut-phone svg { width: 100%; height: 100%; display: block; shape-rendering: crispEdges; }
      .tut-text { margin-top: 18px; font-size: 12px; letter-spacing: 0.06em; }
      /* Once the player has tilted, drop the phone + instruction. */
      .tutorial.tilted .tut-phone,
      .tutorial.tilted .tut-text { display: none; }
      #tutorial-start {
        margin-top: 28px;
        pointer-events: auto;
        font-family: "Press Start 2P", monospace;
        font-size: 11px;
        text-transform: uppercase;
        color: #1a1206;
        padding: 12px 18px;
        background: var(--btn-orange);
        border: 3px solid var(--ui-outline);
        box-shadow:
          inset 3px 3px 0 0 #ffd9a8,
          inset -3px -3px 0 0 var(--btn-orange-dk),
          0 4px 0 rgba(0, 0, 0, 0.35);
        cursor: pointer;
        animation: tutBtnIn 0.3s ease-out;
      }
      #tutorial-start[hidden] { display: none; }
      @keyframes tutBtnIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

      .hint {
        position: absolute;
        bottom: max(env(safe-area-inset-bottom, 0px), 24px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 13px;
        opacity: 0.65;
        pointer-events: none;
        transition: opacity 0.4s ease-out;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }

      /* +1 floater that flies from the bounce point to the leaderboard row. */
      .floater {
        position: fixed;
        z-index: 6;
        font-size: 28px;
        font-weight: 900;
        color: #fde047;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
        pointer-events: none;
        will-change: transform, opacity;
        transition:
          transform 0.85s cubic-bezier(0.25, 1.1, 0.5, 1),
          opacity 0.85s ease-out;
      }

      /* ---------------- game over ---------------- */
      .gameover {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 36%,
                    rgba(28, 32, 46, 0.55), rgba(5, 6, 11, 0.88));
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        padding: 20px;
        animation: goFade 0.35s ease-out;
      }
      @keyframes goFade { from { opacity: 0; } to { opacity: 1; } }
      .gameover[hidden] { display: none; }
      .gameover-card {
        position: relative;
        background: #16181f;
        border: 1px solid var(--accent, rgba(255, 255, 255, 0.12));
        border-radius: 18px;
        padding: 26px 30px 24px;
        text-align: center;
        width: 100%;
        max-width: 360px;
        max-height: calc(100vh - 40px);
        overflow: auto;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6),
                    0 0 50px -12px var(--accent, rgba(0, 0, 0, 0));
        animation: goPop 0.55s cubic-bezier(0.22, 1.3, 0.4, 1);
      }
      @keyframes goPop {
        0%   { transform: scale(0.82) translateY(24px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      /* Player hero — the cubist footballer in the country kit, pops out of
         the card; the flag pins to the lower-right like a country badge. */
      .gameover-card .go-hero {
        position: relative;
        width: 140px;
        height: 150px;
        margin: 0 auto 2px;
      }
      .gameover-card .go-player {
        display: block;
        width: 140px;
        height: 150px;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
        animation: playerPop 0.6s 0.05s cubic-bezier(0.22, 1.5, 0.4, 1) both;
      }
      @keyframes playerPop {
        0%   { transform: translateY(26px) scale(0.35); opacity: 0; }
        62%  { transform: translateY(-6px) scale(1.08); }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .gameover-card .go-flag {
        position: absolute;
        right: 4px;
        bottom: 6px;
        font-size: 42px;
        line-height: 1;
        filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.6));
        animation: flagDrop 0.55s 0.45s cubic-bezier(0.22, 1.5, 0.4, 1) both;
      }
      @keyframes flagDrop {
        0%   { transform: translateY(-22px) scale(0.3) rotate(-14deg); opacity: 0; }
        65%  { transform: translateY(4px) scale(1.15) rotate(6deg); }
        100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
      }
      .gameover-card .go-best-badge {
        display: inline-block;
        margin-bottom: 8px;
        padding: 5px 15px;
        background: linear-gradient(90deg, #fde047, #ff9f1c);
        color: #15181f;
        font-weight: 800;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-radius: 999px;
        box-shadow: 0 4px 14px -2px rgba(253, 224, 71, 0.6);
        animation: badgePulse 1.1s ease-in-out infinite;
      }
      .gameover-card .go-best-badge[hidden] { display: none; }
      @keyframes badgePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
      .gameover-card .go-title {
        margin: 0;
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .gameover-card .go-country {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--accent-text, #fde68a);
        margin: 3px 0 2px;
      }
      .gameover-card .score {
        font-size: 66px;
        font-weight: 900;
        color: #fde047;
        margin: 6px 0 0;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        animation: scoreReveal 0.6s 0.18s both cubic-bezier(0.22, 1.4, 0.4, 1);
      }
      @keyframes scoreReveal {
        0%   { transform: scale(0.3); opacity: 0; }
        70%  { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      .gameover-card .label {
        opacity: 0.6;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .gameover-card .go-rank {
        margin-top: 12px;
        font-size: 14px;
        opacity: 0.9;
      }
      .gameover-card .go-rank b {
        color: #fde047;
        font-size: 17px;
        font-weight: 900;
      }
      .gameover-card button {
        margin-top: 18px;
        width: 100%;
        padding: 13px;
        background: #ff6e14;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .gameover-card button:hover { background: #ff8033; }

      /* Leaderboard preview embedded in the game-over card so the player
         can see where their country sits at the end of a run. Visually
         echoes the live HUD leaderboard. */
      .gameover-card .gameover-lb {
        margin-top: 20px;
        text-align: left;
        max-height: 220px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px 8px;
      }
      .gameover-card .gameover-lb-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.65;
        margin-bottom: 6px;
      }
      .gameover-card .lb-row {
        display: grid;
        grid-template-columns: 18px 22px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 3px 2px;
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
        font-size: 13px;
      }
      .gameover-card .lb-row.you {
        background: rgba(253, 230, 138, 0.18);
        color: #fde68a;
        font-weight: 700;
      }
      .gameover-card .lb-rank { opacity: 0.55; font-size: 11px; }
      .gameover-card .lb-flag { font-size: 16px; line-height: 1; }
      .gameover-card .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* Small screens — shrink the HUD pane a touch. */
      @media (max-width: 480px) {
        .leaderboard { width: 122px; padding: 6px 7px; }
        .lb-row { font-size: 9px; gap: 5px; }
        .lb-flag { font-size: 13px; }
      }
    </style>
  </head>
  <body>
    <!-- Step 1: pick a country (over the poster, no popup). -->
    <div class="picker" id="picker">
      <div class="picker-head">
        <div class="picker-title">RIA CUP</div>
        <p class="picker-sub">Pick your country — every header adds to its leaderboard total</p>
      </div>
      <div class="picker-bottom">
        <select id="country-select"></select>
        <button id="start-btn" type="button">Start playing</button>
      </div>
      <div class="home-ticker">
        <div class="ticker-track" id="ticker-track"></div>
      </div>
    </div>

    <!-- Step 2: the game itself. -->
    <div class="game" id="game" hidden>
      <canvas id="canvas"></canvas>

      <div class="leaderboard px-panel">
        <div class="lb-title">🌎 TOP COUNTRIES</div>
        <div id="lb-rows"></div>
      </div>

      <div class="controls">
        <button class="ctrl-btn px-panel" id="btn-sound" type="button" aria-label="Toggle sound"></button>
        <button class="ctrl-btn px-panel" id="btn-vibrate" type="button" aria-label="Toggle vibration"></button>
        <button class="ctrl-btn px-panel" id="btn-pause" type="button" aria-label="Pause / resume"></button>
      </div>

      <div class="hint" id="hint">Tilt your phone (or ← → / mouse / touch) — keep the ball on your head</div>

      <!-- How-to-play tilt demo (mobile, only when motion is allowed). -->
      <div class="tutorial" id="tutorial" hidden>
        <div class="tut-phone" id="tut-phone">
          <svg viewBox="0 0 16 24">
            <rect x="2" y="1" width="12" height="22" fill="#ffffff"/>
            <rect x="3" y="3" width="10" height="16" fill="#16284f"/>
            <rect x="7" y="20" width="2" height="2" fill="#16284f"/>
          </svg>
        </div>
        <div class="tut-text">‹ TILT TO MOVE ›</div>
        <button id="tutorial-start" type="button" hidden>Start playing</button>
      </div>

      <div class="gameover" id="gameover" hidden>
        <div class="gameover-card" id="gameover-card">
          <div class="go-hero">
            <canvas class="go-player" id="go-player" width="140" height="150"></canvas>
            <div class="go-flag" id="go-flag">🇲🇽</div>
          </div>
          <div class="go-best-badge" id="go-best-badge" hidden>★ New personal best</div>
          <div class="go-title">Full time</div>
          <div class="go-country" id="go-country">Playing for Mexico</div>
          <div class="score" id="final-score">0</div>
          <div class="label">headers</div>
          <div class="go-rank" id="go-rank"></div>
          <div class="gameover-lb">
            <div class="gameover-lb-title">🌎 Leaderboard</div>
            <div id="gameover-lb-rows"></div>
          </div>
          <button id="play-again" type="button">Play again</button>
        </div>
      </div>
    </div>

    <script>
      // =================================================================
      // 16-BIT PALETTE (canvas art) — mirrors the CSS :root vars used by the
      // DOM HUD. Tweak here to recolour the pitch, crowd, goal, ball, etc.
      // =================================================================
      const PALETTE = {
        sky:      "#36c0f0", skyTop:   "#5fd0f5",
        stand:    "#566678", standDk:  "#3d4a5a",
        wall:     "#9aa7b3", wallDk:   "#6e7c89",
        pitchLt:  "#5cb84e", pitchDk:  "#46a23c",
        line:     "#f2f7f2",
        goal:     "#ffffff", goalDk:   "#b9c4cc", net: "#dce8e0",
        ballLt:   "#ffffff", ballDk:   "#1a1a1a",
        outline:  "#0b1430",
        // Bright crowd shirts.
        crowd: ["#e23b3b", "#2f6fd6", "#3fae4a", "#f2c531", "#d63a9e",
                "#ef8a2b", "#2bbfae", "#8a3fd0", "#e8e8e8"],
        // Sideline ad-board fills (placeholders).
        ads: ["#d6403a", "#3a6fd0", "#f2c531", "#8a3fd0", "#2bbfae", "#ef8a2b"],
      };

      // =================================================================
      // COUNTRIES + LEADERBOARD STATE
      // =================================================================
      // [ISO-2, flag emoji, display name, seed score]. Seeds keep the
      // leaderboard from reading all-zeros on first paint.
      const COUNTRIES = [
        ["MX", "🇲🇽", "Mexico", 412],
        ["CO", "🇨🇴", "Colombia", 358],
        ["PE", "🇵🇪", "Peru", 287],
        ["CL", "🇨🇱", "Chile", 245],
        ["AR", "🇦🇷", "Argentina", 391],
        ["BR", "🇧🇷", "Brazil", 478],
        ["US", "🇺🇸", "USA", 219],
        ["ES", "🇪🇸", "Spain", 196],
        ["PH", "🇵🇭", "Philippines", 173],
        ["IN", "🇮🇳", "India", 312],
      ];
      // Short codes for the compact leaderboard (MX, ARG, …).
      const ABBR = {
        MX: "MX", CO: "COL", PE: "PER", CL: "CHI", AR: "ARG",
        BR: "BRA", US: "USA", ES: "ESP", PH: "PHI", IN: "IND",
      };

      // Per-country running totals — incremented on every successful header.
      // Plain in-memory map (no persistence, per spec).
      const scores = Object.fromEntries(
        COUNTRIES.map(([code, , , seed]) => [code, seed])
      );

      // Football kits per country — fed straight into drawPlayer's flat
      // palette. jersey = base plane, shadow = the cubist right-side break
      // (a darker shade of the base), collar + trim = the accent bands.
      const KITS = {
        MX: { jersey: "#00713a", shadow: "#004f29", collar: "#0a0a0a", trim: "#f5efe1" },
        CO: { jersey: "#fcd116", shadow: "#c9a50f", collar: "#00338d", trim: "#ce1126" },
        PE: { jersey: "#f5efe1", shadow: "#cfc9bd", collar: "#d91023", trim: "#d91023" },
        CL: { jersey: "#da291c", shadow: "#9e1d14", collar: "#0033a0", trim: "#f5efe1" },
        AR: { jersey: "#75aadb", shadow: "#4f86bd", collar: "#f5efe1", trim: "#f5efe1" },
        BR: { jersey: "#ffdf00", shadow: "#d4b800", collar: "#009c3b", trim: "#009c3b" },
        US: { jersey: "#f5efe1", shadow: "#cfc9bd", collar: "#0a3161", trim: "#b31942" },
        ES: { jersey: "#c60b1e", shadow: "#8e0815", collar: "#ffc400", trim: "#ffc400" },
        PH: { jersey: "#0038a8", shadow: "#00276f", collar: "#ce1126", trim: "#fcd116" },
        IN: { jersey: "#0090d0", shadow: "#0066a0", collar: "#ff9933", trim: "#ff9933" },
      };
      const DEFAULT_KIT = { jersey: "#c5221c", shadow: "#7d1612", collar: "#0e0e0e", trim: "#f5efe1" };

      // Currency + indicative USD rate per country, for the Ria ad ticker.
      const RATES = {
        MX: { cur: "MXN", rate: "1767" },
        CO: { cur: "COP", rate: "3,900" },
        PE: { cur: "PEN", rate: "3.75" },
        CL: { cur: "CLP", rate: "950" },
        AR: { cur: "ARS", rate: "990" },
        BR: { cur: "BRL", rate: "5.40" },
        US: { cur: "USD", rate: "1.00" },
        ES: { cur: "EUR", rate: "0.92" },
        PH: { cur: "PHP", rate: "58" },
        IN: { cur: "INR", rate: "83.5" },
      };

      // Stadium backdrops — one is picked at random each run. Each theme just
      // recolours the shared scene (sky gradient, sun/moon + halo, clouds,
      // floodlight glow, grass, horizon haze). stars=true scatters a starfield.
      const THEMES = [
        {
          name: "Golden hour",
          sky: [[0, "#162247"], [0.4, "#3a2d62"], [0.75, "#c4633a"], [1, "#f0a560"]],
          celestial: "#fff0c8",
          halo: [[0, "rgba(255,225,165,0.7)"], [0.35, "rgba(255,170,110,0.22)"], [1, "rgba(255,150,100,0)"]],
          cloud: "rgba(255,205,175,0.32)",
          lampGlow: "rgba(255,240,200,0.6)",
          grass: ["#4d8554", "#386841", "#1d4326"],
          haze: "rgba(255,200,150,0.4)",
          stars: false,
        },
        {
          name: "Clear day",
          sky: [[0, "#2b6fc4"], [0.5, "#5fa3e0"], [1, "#cfe9f7"]],
          celestial: "#fffbe8",
          halo: [[0, "rgba(255,250,220,0.85)"], [0.3, "rgba(255,245,200,0.25)"], [1, "rgba(255,245,200,0)"]],
          cloud: "rgba(255,255,255,0.7)",
          lampGlow: "rgba(255,250,230,0.25)",
          grass: ["#5aa45f", "#3f7a48", "#256b32"],
          haze: "rgba(220,240,255,0.35)",
          stars: false,
        },
        {
          name: "Night match",
          sky: [[0, "#05060f"], [0.5, "#0b1430"], [1, "#16284f"]],
          celestial: "#eef1ff",
          halo: [[0, "rgba(220,228,255,0.55)"], [0.4, "rgba(150,170,230,0.15)"], [1, "rgba(150,170,230,0)"]],
          cloud: "rgba(120,140,180,0.16)",
          lampGlow: "rgba(255,250,225,0.95)",
          grass: ["#2f6b3e", "#235233", "#13301d"],
          haze: "rgba(180,200,255,0.3)",
          stars: true,
        },
        {
          name: "Dusk",
          sky: [[0, "#1a1033"], [0.45, "#4a2a6b"], [0.8, "#a14a7a"], [1, "#e89a8a"]],
          celestial: "#ffe0d0",
          halo: [[0, "rgba(255,210,200,0.6)"], [0.35, "rgba(220,140,170,0.2)"], [1, "rgba(220,140,170,0)"]],
          cloud: "rgba(255,200,220,0.3)",
          lampGlow: "rgba(255,235,225,0.7)",
          grass: ["#487d52", "#356040", "#1d4326"],
          haze: "rgba(255,190,210,0.38)",
          stars: false,
        },
      ];
      let bgTheme = THEMES[0];
      let stars = []; // {x, y, r} in screen px — regenerated per run / resize

      // Session state.
      let playerCountry = "AR";
      let headers = 0;   // successful headers this run
      let best = 0;
      let newBestThisRun = false; // beat the prior best during this run?
      let alive = false;
      let inTutorial = false;     // showing the tilt how-to-play demo?
      let tilted = false;         // has the player tilted yet during the demo?

      // =================================================================
      // UI REFERENCES
      // =================================================================
      const ui = {
        picker: document.getElementById("picker"),
        countrySelect: document.getElementById("country-select"),
        startBtn: document.getElementById("start-btn"),
        game: document.getElementById("game"),
        canvas: document.getElementById("canvas"),
        headers: document.getElementById("headers"),
        best: document.getElementById("best"),
        lbRows: document.getElementById("lb-rows"),
        tickerTrack: document.getElementById("ticker-track"),
        btnSound: document.getElementById("btn-sound"),
        btnVibrate: document.getElementById("btn-vibrate"),
        btnPause: document.getElementById("btn-pause"),
        tutorial: document.getElementById("tutorial"),
        tutPhone: document.getElementById("tut-phone"),
        tutorialStart: document.getElementById("tutorial-start"),
        hint: document.getElementById("hint"),
        gameover: document.getElementById("gameover"),
        gameoverCard: document.getElementById("gameover-card"),
        goPlayer: document.getElementById("go-player"),
        goFlag: document.getElementById("go-flag"),
        goCountry: document.getElementById("go-country"),
        goRank: document.getElementById("go-rank"),
        goBestBadge: document.getElementById("go-best-badge"),
        finalScore: document.getElementById("final-score"),
        playAgain: document.getElementById("play-again"),
        gameoverLbRows: document.getElementById("gameover-lb-rows"),
        countryHeader: document.getElementById("country-header"),
        headerFlag: document.getElementById("header-flag"),
        headerName: document.getElementById("header-name"),
        headerScore: document.getElementById("header-score"),
      };

      // Populate the dropdown.
      COUNTRIES.forEach(([code, flag, name]) => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = `${flag}  ${name}`;
        if (code === playerCountry) opt.selected = true;
        ui.countrySelect.appendChild(opt);
      });
      // Keep the home leaderboard highlight in sync with the picked country.
      ui.countrySelect.addEventListener("change", () => {
        playerCountry = ui.countrySelect.value;
        renderHomeTicker();
      });

      // Build leaderboard rows. `compact` → just the top 3, plus the player's
      // country as a 4th row if it isn't already in the top 3 (so it always
      // shows where they stand). Otherwise the full ranking (game-over card).
      function buildLeaderboardHTML(compact) {
        const ranked = COUNTRIES
          .map(([code, flag, name]) => ({ code, flag, name, score: scores[code] }))
          .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
          .map((r, idx) => ({ ...r, rank: idx + 1 }));

        let rows = ranked;
        if (compact) {
          rows = ranked.slice(0, 3);
          if (!rows.some((r) => r.code === playerCountry)) {
            const me = ranked.find((r) => r.code === playerCountry);
            if (me) rows = rows.concat(me); // 4th row = your country
          }
        }
        return rows
          .map(
            (r) => `
              <div class="lb-row${r.code === playerCountry ? " you" : ""}">
                <span class="lb-rank">${r.rank}</span>
                <span class="lb-flag">${r.flag}</span>
                <span class="lb-name">${ABBR[r.code] || r.code}</span>
                <span class="lb-score">${r.score}</span>
              </div>`
          )
          .join("");
      }

      // Live HUD leaderboard — compact top-3 (+ you), refreshed each header.
      function renderLeaderboard() {
        ui.lbRows.innerHTML = buildLeaderboardHTML(true);
      }

      // Home-screen scrolling standings ticker (full ranking, looping).
      function renderHomeTicker() {
        const ranked = COUNTRIES
          .map(([code, flag, name]) => ({ code, flag, score: scores[code] }))
          .sort((a, b) => b.score - a.score);
        const items = ranked
          .map(
            (r, i) =>
              `<span class="tk-item${r.code === playerCountry ? " tk-you" : ""}">` +
              `${i + 1} <span class="tk-flag">${r.flag}</span> ${ABBR[r.code] || r.code} <b>${r.score}</b></span>`
          )
          .join("");
        ui.tickerTrack.innerHTML = items + items; // duplicate → seamless loop
      }

      // End-of-run snapshot — full ranking on the game-over card.
      function renderGameoverLeaderboard() {
        ui.gameoverLbRows.innerHTML = buildLeaderboardHTML(false);
      }

      function setHeaders(n) {
        // `headers`/`best` still track the run for the game-over card; their
        // live HUD badges were removed, so update those readouts only if present.
        headers = n;
        if (ui.headers) ui.headers.textContent = String(n);
        if (n > best) {
          best = n;
          newBestThisRun = n > 0;
          if (ui.best) ui.best.textContent = String(n);
        }
      }

      // World ranking of a country by current leaderboard score (1 = top).
      function countryRank(code) {
        return COUNTRIES
          .map(([c]) => c)
          .sort((a, b) => scores[b] - scores[a])
          .indexOf(code) + 1;
      }

      // The dedicated country panel was merged into the single leaderboard
      // pane; these stay as guarded no-ops so the call sites don't need to
      // change (the leaderboard's highlighted row now shows your country).
      function setCountryHeader() {
        if (!ui.countryHeader) return;
        const entry = COUNTRIES.find(([code]) => code === playerCountry);
        if (!entry) return;
        ui.headerFlag.textContent = entry[1];
        ui.headerName.textContent = entry[2];
        ui.headerScore.textContent = String(scores[playerCountry]);
        const kit = KITS[playerCountry] || DEFAULT_KIT;
        ui.countryHeader.style.setProperty("--accent", kit.jersey);
      }

      function pulseCountryScore() {
        if (!ui.headerScore) return;
        ui.headerScore.textContent = String(scores[playerCountry]);
        ui.headerScore.classList.remove("pop");
        void ui.headerScore.offsetWidth; // force reflow
        ui.headerScore.classList.add("pop");
      }

      // Spawn a "+1" at the bounce point and fly it to the player's row.
      function spawnFloater(srcX, srcY) {
        const f = document.createElement("div");
        f.className = "floater";
        f.textContent = "+1";
        f.style.left = srcX + "px";
        f.style.top = srcY + "px";
        f.style.transform = "translate(-50%, -50%) scale(1)";
        f.style.opacity = "1";
        document.body.appendChild(f);

        let targetX = window.innerWidth - 100;
        let targetY = 60;
        const youRow = ui.lbRows.querySelector(".lb-row.you");
        if (youRow) {
          const rect = youRow.getBoundingClientRect();
          targetX = rect.left + rect.width / 2;
          targetY = rect.top + rect.height / 2;
        }
        const dx = targetX - srcX;
        const dy = targetY - srcY;
        requestAnimationFrame(() => {
          f.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.55)`;
          f.style.opacity = "0";
        });
        f.addEventListener("transitionend", () => f.remove(), { once: true });
        setTimeout(() => f.remove(), 1200);
      }

      // =================================================================
      // GAME PHYSICS + RENDERING
      // =================================================================
      const canvas = ui.canvas;
      const ctx = canvas.getContext("2d");

      // ---- tuning ----
      const GRAVITY = 1300;              // px/s² — ball's downward acceleration
      const BOUNCE_VY = 820;             // px/s — upward kick on every header
      const BOUNCE_LATERAL = 340;        // px/s — max sideways push from an off-centre hit
      const SIDE_RESTITUTION = 0.78;     // bounce energy retained off side walls
      const PLAYER_KEYBOARD_SPEED = 540; // px/s — keyboard movement
      const POINTER_LERP = 14;           // smoothing factor for mouse/touch follow
      const TILT_MAX_SPEED = 640;        // px/s — speed at full tilt
      const TILT_FULL_DEG = 22;          // tilt angle (deg from rest) for full speed
      const TILT_DEADZONE_DEG = 2.5;     // ignore tiny wobble so the player holds still
      const GROUND_FRAC = 0.78;          // grass starts at this fraction of viewport height
      const BALL_RADIUS = 22;
      const HEAD_RADIUS = 19;
      const LEG_HEIGHT = 36;
      const TORSO_HEIGHT = 50;
      const NECK_GAP = 4;
      // Distance from groundY (feet) up to the head's centre — used for
      // both drawing the figure and the bounce collision check.
      const HEAD_CENTRE_FROM_FEET = LEG_HEIGHT + TORSO_HEIGHT + NECK_GAP + HEAD_RADIUS;

      let W = 0, H = 0;
      let groundY = 0;
      const player = { x: 0 };
      const ball = { x: 0, y: 0, vx: 0, vy: 0, spin: 0, vSpin: 0 };

      // ---- player sprite (frames 1, 2, 4 — frame 3 skipped) ----
      // Mapped to: 0 idle · 1 crouch · 2 contact. Edit FRAME_FILES to change
      // which PNGs are used / in what order.
      const FRAME_FILES = [1, 2];
      // Per-country sprite sets (prefix). Falls back to DEFAULT_SKIN otherwise.
      const PLAYER_SKINS = { AR: "player-frames-ar" };
      const DEFAULT_SKIN = "player-frames";
      const PLAYER_FRAMES = [];
      let playerFramesReady = 0;
      // (Re)load the frame set for the chosen country.
      function loadPlayerFrames() {
        const prefix = PLAYER_SKINS[playerCountry] || DEFAULT_SKIN;
        PLAYER_FRAMES.length = 0;
        playerFramesReady = 0;
        for (const n of FRAME_FILES) {
          const img = new Image();
          img.onload = () => { playerFramesReady++; };
          img.src = `${prefix}${n}.png`;
          PLAYER_FRAMES.push(img);
        }
      }
      loadPlayerFrames(); // initial load for the default country
      let playerFrame = 0; // which frame to draw right now (idle by default)

      // Football sprite (swap football.png to re-skin). The ball fills the
      // image height, so its on-screen diameter = drawn height.
      const ballImg = new Image();
      ballImg.src = "football.png";
      const ballPix = document.createElement("canvas"); // downscale step for chunkier pixels
      const BALL_PIXELATE = 2.2;  // higher = chunkier ball pixels

      // Pre-rendered stadium backdrop used on phones (crowd + ad boards + goal
      // + pitch baked in). On mobile we draw this instead of the procedural
      // scene, then overlay the player, ball, and the DOM HUD.
      const bgMobileImg = new Image();
      bgMobileImg.src = "background-mobile.png";
      const bgBlurBuf = document.createElement("canvas"); // downscale buffer for the mobile blur
      const BALL_VISUAL_SCALE = 1.2; // ball drawn bigger than its hitbox, for looks
      const MOBILE_MAX_W = 600;   // ≤ this viewport width counts as "mobile"
      let mobileMode = false;     // set in resize()
      const BG_BLUR = 5;          // px — background blur to push focus to the player

      // Source frame geometry + where the figure sits inside the frame. The
      // sprite is scaled so the feet land on `groundY` and the head-centre
      // lands on the existing ball-contact point — tweak the two fractions if
      // the head/feet don't line up perfectly.
      const SPR_W = 96, SPR_H = 222;
      const SPR_FEET_FRAC = 0.95;       // feet position down the frame (0=top,1=bottom)
      const SPR_HEAD_FRAC = 0.15;       // head-centre position down the frame
      const SPR_HEAD_RADIUS_FRAC = 0.10; // visual head radius as a fraction of frame height
      const PLAYER_SCALE = 2.5;   // size multiplier (anchored at the head)
      const PLAYER_Y_OFFSET = -70; // px to nudge the sprite up the frame

      // Header animation tuning. The wind-up (crouch→rising) is driven by the
      // descending ball's distance to the head, so frame 3 (contact) lands on
      // the real bounce; afterwards a short timer plays frame 3 then 4 → idle.
      const HEADER_POSE_DUR = 0.07; // s — how long frame 2 shows on a header (~4 frames)
      let contactTimer = 0;         // counts down the header pose

      // ---- pixel-art buffer ----
      // The whole scene is drawn into a tiny offscreen canvas in "virtual
      // pixels", then upscaled to the screen with smoothing OFF — that hard
      // nearest-neighbour blow-up is what gives the chunky 8-bit look.
      let PX = 4;            // CSS px per virtual pixel
      let vW = 0, vH = 0;    // buffer size in virtual px
      let vGround = 0;       // player's feet line in virtual px (physics)
      let vPitchTop = 0;     // top edge of the green pitch (below the ad row)

      // Vertical band layout of the stadium (all in virtual px). Shared by the
      // crowd seeding and the scene drawing so they always line up. The pitch
      // fills everything from `pitchTop` to the bottom of the screen.
      function bands() {
        const crowdTop = Math.round(vH * 0.015);
        const crowdBottom = crowdTop + Math.round(vH * 0.135);
        const barrierH = Math.max(2, Math.round(vH * 0.02));
        const adY = crowdBottom + barrierH;
        const adH = Math.max(9, Math.round(vH * 0.05));
        return { crowdTop, crowdBottom, barrierH, adY, adH, pitchTop: adY + adH };
      }
      const buf = document.createElement("canvas");
      const bctx = buf.getContext("2d");
      let crowd = [];        // precomputed fans {x, y, jersey} in virtual px
      let adTime = 0;        // ad-board slide timer, seconds
      let adVY = 0, adVH = 0; // ad board rect in the scene buffer (virtual px)
      const adBuf = document.createElement("canvas"); // finer-res ad layer
      const adLogoTmp = document.createElement("canvas"); // logo pixelation step
      const adLogo = new Image();
      let adLogoReady = false;
      adLogo.onload = () => { adLogoReady = true; };
      adLogo.src = "logo.png";

      // Track each input source separately; whichever fired most recently
      // wins, so swapping mid-game (touch → mouse → arrow keys) just works.
      const keys = { left: false, right: false };
      let pointerX = null;
      let lastInput = "none"; // "keyboard" | "pointer" | "tilt" | "none"

      // Gyroscope/tilt control (phones). tiltZero is the resting angle captured
      // at the start of each run, so however the player naturally holds the
      // phone becomes "centre" — they tilt left/right from there to steer.
      let tiltSetup = false;   // listener attached + permission granted
      let tiltDelta = 0;       // current left-right tilt, degrees from rest
      let tiltZero = null;     // resting angle; null = recalibrate on next reading

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
        groundY = H * GROUND_FRAC;
        mobileMode = W <= MOBILE_MAX_W;

        // Size the low-res buffer — aim for ~230 virtual px across.
        PX = Math.max(3, Math.round(W / 230));
        vW = Math.ceil(W / PX);
        vH = Math.ceil(H / PX);
        vGround = Math.round(groundY / PX);
        buf.width = vW;
        buf.height = vH;
        bctx.imageSmoothingEnabled = false;
        seedCrowd();

        if (bgTheme.stars) seedStars();
        // Keep the player on-screen if the window shrank.
        player.x = Math.max(40, Math.min(W - 40, player.x || W / 2));
        if (!alive) {
          ball.x = W / 2;
          ball.y = H * 0.18;
        }
      }

      // Lay out the crowd: rows of little fans filling the top stands band.
      // Colours are fixed per seat (computed once) so the crowd doesn't
      // shimmer frame to frame.
      const CROWD_SKIN = ["#f0c39a", "#e0a877", "#c98a5e", "#9c6b43", "#7a4a2a"];
      function seedCrowd() {
        crowd = [];
        const bd = bands();
        const cw = 5, chRow = 5;       // tight packing for a dense crowd
        let row = 0;
        for (let y = bd.crowdTop; y < bd.crowdBottom; y += chRow, row++) {
          const off = (row % 2) * (cw / 2);
          for (let x = -cw; x < vW + cw; x += cw) {
            // Stable pseudo-random pick per seat (no Math.random → no shimmer).
            const h = (row * 73856093) ^ (Math.round(x) * 19349663);
            const shirt = PALETTE.crowd[Math.abs(h) % PALETTE.crowd.length];
            const skin = CROWD_SKIN[Math.abs(h >> 3) % CROWD_SKIN.length];
            crowd.push({ x: Math.round(x + off), y, shirt, skin });
          }
        }
      }
      window.addEventListener("resize", resize);

      function resetForRun() {
        player.x = W / 2;
        // Drop the ball close to the player so the very first header is
        // reachable even on keyboard — fixed pixel range (not a fraction of
        // W) so wide desktops don't push the ball to a far corner where the
        // arrow keys can't catch up in time.
        const FIRST_DROP_HALF_RANGE = 110;
        ball.x = player.x + (Math.random() * 2 - 1) * FIRST_DROP_HALF_RANGE;
        ball.y = -BALL_RADIUS - 10;
        ball.vx = 0;
        ball.vy = 80; // small initial nudge so the drop feels purposeful
        ball.spin = 0;
        ball.vSpin = 0;
      }

      // Lay out a starfield for the current viewport (only used by night).
      function seedStars() {
        const count = Math.round((W * groundY) / 14000);
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * groundY * 0.8,
            r: Math.random() < 0.85 ? 0.8 : 1.5,
          });
        }
      }

      // Pick a random backdrop for this run.
      function pickTheme() {
        bgTheme = THEMES[Math.floor(Math.random() * THEMES.length)];
        if (bgTheme.stars) seedStars();
        else stars = [];
      }

      function startGame() {
        setHeaders(0);
        newBestThisRun = false;
        resetForRun();
        pickTheme();
        // Recapture the resting tilt angle so however the phone is held now
        // becomes centre for this run.
        tiltZero = null;
        tiltDelta = 0;
        alive = true;
        ui.hint.style.opacity = "0.65";
        ui.gameover.hidden = true;
      }

      // Render the pixel footballer (in the country kit) onto the game-over
      // card: draw into a tiny buffer, then upscale crisply to the canvas.
      function drawCardPlayer() {
        const cbW = 40, cbH = 46;
        const cb = document.createElement("canvas");
        cb.width = cbW;
        cb.height = cbH;
        const cc = cb.getContext("2d");
        cc.imageSmoothingEnabled = false;
        // Grid scale so the figure fills the buffer height with a small margin.
        const pp = (HEAD_CENTRE_FROM_FEET + HEAD_RADIUS) / (cbH - 6);
        drawPlayer(cc, pp, (cbW / 2) * pp, (cbH - 3) * pp);

        const cssW = 140, cssH = 150;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const c = ui.goPlayer.getContext("2d");
        ui.goPlayer.width = cssW * dpr;
        ui.goPlayer.height = cssH * dpr;
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.imageSmoothingEnabled = false;
        c.clearRect(0, 0, cssW, cssH);
        const scale = Math.min(cssW / cbW, cssH / cbH);
        const dw = cbW * scale, dh = cbH * scale;
        c.drawImage(cb, (cssW - dw) / 2, (cssH - dh) / 2, dw, dh);
      }

      // Count a number up to `to` over `dur` ms for a punchy reveal.
      function animateCount(el, to, dur = 650) {
        const start = performance.now();
        function step(now) {
          const t = Math.min(1, (now - start) / dur);
          const eased = 1 - Math.pow(1 - t, 3);
          el.textContent = String(Math.round(to * eased));
          if (t < 1) requestAnimationFrame(step);
          else el.textContent = String(to);
        }
        requestAnimationFrame(step);
      }

      function endGame() {
        alive = false;
        const entry = COUNTRIES.find(([code]) => code === playerCountry);
        const flag = entry ? entry[1] : "🏳️";
        const name = entry ? entry[2] : "your country";
        const kit = KITS[playerCountry] || DEFAULT_KIT;

        // Country-themed accent + hero art.
        ui.gameoverCard.style.setProperty("--accent", kit.jersey);
        ui.goFlag.textContent = flag;
        ui.goCountry.textContent = `Playing for ${name}`;
        ui.goRank.innerHTML = `${flag} ${name} is <b>#${countryRank(playerCountry)}</b> in the world`;
        ui.goBestBadge.hidden = !newBestThisRun;
        drawCardPlayer();

        renderGameoverLeaderboard();
        ui.gameover.hidden = false;
        animateCount(ui.finalScore, headers);
      }

      // ---------------------- input ----------------------
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
          keys.left = true;
          lastInput = "keyboard";
        } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
          keys.right = true;
          lastInput = "keyboard";
        }
      });
      window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
      });
      // Mouse + touch both flow through pointer events — one handler each.
      canvas.addEventListener("pointermove", (e) => {
        pointerX = e.clientX;
        lastInput = "pointer";
      });
      canvas.addEventListener("pointerdown", (e) => {
        pointerX = e.clientX;
        lastInput = "pointer";
        e.preventDefault();
      });

      // Phone tilt. e.gamma is the left-right tilt in degrees. We track it
      // relative to the resting angle captured at run start, and only claim
      // control once the player tilts past the deadzone — so a phone sitting
      // still never fights with touch/keyboard.
      function onOrientation(e) {
        if (e.gamma === null || e.gamma === undefined) return;
        if (tiltZero === null) tiltZero = e.gamma;
        const delta = e.gamma - tiltZero;
        tiltDelta = delta;
        if (Math.abs(delta) > TILT_DEADZONE_DEG) lastInput = "tilt";
      }

      // Attach the orientation listener. iOS 13+ gates the sensor behind a
      // permission prompt that must be triggered from a user gesture, so this
      // is called from the Start button tap.
      // Returns a Promise that resolves true if tilt is available + permitted.
      function enableTilt() {
        return new Promise((resolve) => {
          if (tiltSetup) { resolve(true); return; }
          const DOE = window.DeviceOrientationEvent;
          if (!DOE) { resolve(false); return; } // no orientation sensor
          const attach = () => {
            window.addEventListener("deviceorientation", onOrientation);
            tiltSetup = true;
            resolve(true);
          };
          if (typeof DOE.requestPermission === "function") {
            DOE.requestPermission()
              .then((state) => (state === "granted" ? attach() : resolve(false)))
              .catch(() => resolve(false));
          } else {
            attach(); // Android / desktop — no permission gate
          }
        });
      }

      // ---------------------- physics ----------------------
      function tickPlayer(dt) {
        if (keys.left || keys.right) {
          // Pressing a key implies direct control — override pointer-follow.
          lastInput = "keyboard";
          let vx = 0;
          if (keys.left) vx -= PLAYER_KEYBOARD_SPEED;
          if (keys.right) vx += PLAYER_KEYBOARD_SPEED;
          player.x += vx * dt;
        } else if (lastInput === "pointer" && pointerX !== null) {
          // Smoothly chase the pointer (instant snap would feel jittery).
          player.x += (pointerX - player.x) * Math.min(1, dt * POINTER_LERP);
        } else if (lastInput === "tilt") {
          // Tilt steers like a velocity: angle past the deadzone, ramped to
          // full speed at TILT_FULL_DEG, beyond which it's capped.
          let d = tiltDelta;
          if (d > TILT_DEADZONE_DEG) d -= TILT_DEADZONE_DEG;
          else if (d < -TILT_DEADZONE_DEG) d += TILT_DEADZONE_DEG;
          else d = 0;
          const frac = Math.max(-1, Math.min(1, d / (TILT_FULL_DEG - TILT_DEADZONE_DEG)));
          player.x += frac * TILT_MAX_SPEED * dt;
        }
        // Keep the player's head fully on-screen.
        player.x = Math.max(HEAD_RADIUS + 6, Math.min(W - HEAD_RADIUS - 6, player.x));
      }

      function headCentre() {
        // The ball rests HEAD_RADIUS above this point. The sprite's visual head
        // is bigger than that hitbox, so raise the collision centre by the
        // difference — that lands the ball on the TOP of the visual head.
        const intrinsic = (SPR_FEET_FRAC - SPR_HEAD_FRAC) * SPR_H;
        const scale = (HEAD_CENTRE_FROM_FEET / intrinsic) * PLAYER_SCALE;
        const visualHeadR = SPR_HEAD_RADIUS_FRAC * SPR_H * scale;
        const spriteHeadY = groundY - HEAD_CENTRE_FROM_FEET + PLAYER_Y_OFFSET;
        return { x: player.x, y: spriteHeadY - (visualHeadR - HEAD_RADIUS) };
      }

      function tickBall(dt) {
        ball.vy += GRAVITY * dt;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        ball.spin += ball.vSpin * dt + ball.vx * dt * 0.008;

        // Side walls.
        if (ball.x - BALL_RADIUS < 0) {
          ball.x = BALL_RADIUS;
          ball.vx = -ball.vx * SIDE_RESTITUTION;
        } else if (ball.x + BALL_RADIUS > W) {
          ball.x = W - BALL_RADIUS;
          ball.vx = -ball.vx * SIDE_RESTITUTION;
        }

        // Header collision — ball overlaps the head's upper hemisphere
        // while moving downward. Side-hits don't count; only true headers.
        const head = headCentre();
        const dx = ball.x - head.x;
        const dy = ball.y - head.y;
        const combined = BALL_RADIUS + HEAD_RADIUS;
        if (
          ball.vy > 0 &&
          dy < 0 &&
          dx * dx + dy * dy < combined * combined
        ) {
          const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
          // Snap ball just outside the head along the contact normal so
          // it can't stick / re-trigger next frame.
          ball.x = head.x + (dx / dist) * combined;
          ball.y = head.y + (dy / dist) * combined;
          // -1 (far left of head) → ball goes left; +1 (far right) → right.
          const offset = Math.max(-1, Math.min(1, dx / HEAD_RADIUS));
          ball.vy = -BOUNCE_VY;
          ball.vx = offset * BOUNCE_LATERAL;
          ball.vSpin = offset * 0.06;

          // Feedback always; scoring only counts in a real run, not practice.
          playHeaderSound();
          if (vibrateOn && navigator.vibrate) navigator.vibrate(25);
          contactTimer = HEADER_POSE_DUR; // flick to the header pose
          if (!inTutorial) {
            setHeaders(headers + 1);
            scores[playerCountry] = (scores[playerCountry] || 0) + 1;
            renderLeaderboard();
            pulseCountryScore();
            spawnFloater(ball.x, ball.y - BALL_RADIUS - 4);
            ui.hint.style.opacity = "0";
          }
        }

        // Ball hits the ground.
        if (ball.y + BALL_RADIUS >= groundY) {
          if (inTutorial) {
            resetForRun(); // practice: drop a fresh ball, keep going
          } else {
            ball.y = groundY - BALL_RADIUS;
            ball.vy = 0;
            endGame();
          }
        }
      }

      // ---------------------- rendering ----------------------
      // Everything is painted into the low-res buffer `bctx`, then the loop
      // blits it to the screen with smoothing off for the chunky 8-bit look.

      // Fill a CSS-space rectangle into context `c`, snapping both edges to a
      // `pp`-pixel grid so the result lands on clean pixel boundaries.
      function pxRect(c, pp, x, y, w, h, color) {
        const X = Math.round(x / pp), Y = Math.round(y / pp);
        const X2 = Math.round((x + w) / pp), Y2 = Math.round((y + h) / pp);
        c.fillStyle = color;
        c.fillRect(X, Y, Math.max(1, X2 - X), Math.max(1, Y2 - Y));
      }

      // Goal near the top of the pitch, viewed from the field: crossbar +
      // side posts at the back, net grid inside, open mouth toward the camera.
      function drawGoal(b) {
        const gw = Math.round(vW * 0.42);
        const ph = vH - vPitchTop;
        const gh = Math.round(ph * 0.16);
        const gx = Math.round(vW / 2 - gw / 2);
        const gy = vPitchTop + Math.round(ph * 0.04);
        // Net grid.
        b.fillStyle = PALETTE.net;
        for (let x = gx; x <= gx + gw; x += 4) b.fillRect(x, gy, 1, gh);
        for (let y = gy; y <= gy + gh; y += 4) b.fillRect(gx, y, gw, 1);
        // Frame: crossbar + two posts (back of the goal) + goal-line at mouth.
        b.fillStyle = PALETTE.goal;
        b.fillRect(gx, gy, gw, 2);                 // crossbar
        b.fillRect(gx, gy, 2, gh);                 // left post
        b.fillRect(gx + gw - 2, gy, 2, gh);        // right post
        b.fillStyle = PALETTE.goalDk;
        b.fillRect(gx, gy + gh, gw, 1);            // shaded goal line
      }

      // Top-down field markings on the green pitch.
      function drawPitchLines(b) {
        const top = vPitchTop, bot = vH, h = bot - top, cx = vW / 2;
        const L = PALETTE.line;
        const box = (x, y, w, hh) => {       // 1px rectangle outline
          b.fillStyle = L;
          b.fillRect(Math.round(x), Math.round(y), Math.round(w), 1);
          b.fillRect(Math.round(x), Math.round(y + hh), Math.round(w), 1);
          b.fillRect(Math.round(x), Math.round(y), 1, Math.round(hh));
          b.fillRect(Math.round(x + w), Math.round(y), 1, Math.round(hh));
        };
        // Penalty box + 6-yard box around the goal (top).
        box(cx - vW * 0.30, top, vW * 0.60, h * 0.20);
        box(cx - vW * 0.16, top, vW * 0.32, h * 0.09);
        // Halfway line + centre circle + spot.
        b.fillStyle = L;
        b.fillRect(0, Math.round(top + h * 0.5), vW, 1);
        b.strokeStyle = L;
        b.lineWidth = 1;
        b.beginPath();
        b.arc(cx, top + h * 0.5, Math.round(vW * 0.13), 0, Math.PI * 2);
        b.stroke();
        b.fillRect(Math.round(cx), Math.round(top + h * 0.5), 1, 1);
        // Bottom edge arc (the "D").
        b.beginPath();
        b.arc(cx, bot, Math.round(vW * 0.18), Math.PI, Math.PI * 2);
        b.stroke();
      }

      // The price line for the chosen country, e.g. "1 USD = 1767 MXN".
      function adPriceText() {
        const rt = RATES[playerCountry];
        return rt ? `1 USD = ${rt.rate} ${rt.cur}` : "RIA MONEY TRANSFER";
      }

      // True when the baked mobile backdrop should be used instead of the
      // procedural pixel scene.
      function useImageBg() {
        return mobileMode && bgMobileImg.complete && bgMobileImg.naturalWidth > 0;
      }

      // Draw the mobile backdrop to fill the screen (cover: scale up, centre-
      // crop so there are no bars). The blur is done by downscaling then
      // upscaling with smoothing on — `ctx.filter` blur isn't supported on
      // iOS Safari / many mobile webviews, so we avoid it here.
      function drawMobileBackground() {
        const iw = bgMobileImg.naturalWidth, ih = bgMobileImg.naturalHeight;
        const scale = Math.max(W / iw, H / ih);
        const dw = iw * scale, dh = ih * scale;
        const ox = (W - dw) / 2, oy = (H - dh) / 2;

        if (BG_BLUR > 0) {
          const f = Math.max(2, Math.round(BG_BLUR * 0.6)); // downscale = blur strength
          const lw = Math.max(1, Math.round(W / f));
          const lh = Math.max(1, Math.round(H / f));
          bgBlurBuf.width = lw;
          bgBlurBuf.height = lh;
          const c2 = bgBlurBuf.getContext("2d");
          c2.imageSmoothingEnabled = true;
          c2.clearRect(0, 0, lw, lh);
          c2.drawImage(bgMobileImg, ox / f, oy / f, dw / f, dh / f);
          ctx.imageSmoothingEnabled = true;        // smooth upscale = blur
          ctx.drawImage(bgBlurBuf, 0, 0, lw, lh, 0, 0, W, H);
        } else {
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(bgMobileImg, ox, oy, dw, dh);
        }
      }

      function drawBackground() {
        const b = bctx;
        const bd = bands();
        vPitchTop = bd.pitchTop;

        // --- Sky behind the top band ---
        b.fillStyle = PALETTE.sky;
        b.fillRect(0, 0, vW, bd.pitchTop);

        // --- Stand backdrop + crowd ---
        b.fillStyle = PALETTE.standDk;
        b.fillRect(0, bd.crowdTop, vW, bd.crowdBottom - bd.crowdTop);
        for (const f of crowd) {
          b.fillStyle = f.shirt;            // torso (3x3)
          b.fillRect(f.x, f.y + 2, 3, 3);
          b.fillStyle = f.skin;             // head (2x2)
          b.fillRect(f.x + 1, f.y, 2, 2);
        }

        // --- Barrier wall under the crowd ---
        b.fillStyle = PALETTE.wall;
        b.fillRect(0, bd.crowdBottom, vW, bd.barrierH);
        b.fillStyle = PALETTE.wallDk;
        b.fillRect(0, bd.crowdBottom, vW, 1);
        b.fillRect(0, bd.crowdBottom + bd.barrierH - 1, vW, 1);

        // --- Advertising board bar (text + logo painted in drawAdOverlay) ---
        adVY = bd.adY;
        adVH = bd.adH;
        b.fillStyle = "#0b0e13";
        b.fillRect(0, adVY, vW, adVH);
        b.fillStyle = "#3a4252";          // rails
        b.fillRect(0, adVY - 1, vW, 1);
        b.fillRect(0, adVY + adVH, vW, 1);

        // --- Pitch: fills from the ad row to the bottom; vertical mow stripes ---
        const stripeW = Math.max(6, Math.round(vW / 9));
        for (let x = 0, i = 0; x < vW; x += stripeW, i++) {
          b.fillStyle = i % 2 ? PALETTE.pitchDk : PALETTE.pitchLt;
          b.fillRect(x, vPitchTop, stripeW, vH - vPitchTop);
        }
        drawPitchLines(b);
      }

      // Chunky pixel-art footballer in the country kit. Built from the same
      // body proportions as the physics (so the head still lines up with the
      // bounce check), but every rectangle is snapped to the `pp` pixel grid.
      // Used in-game (c = bctx, pp = PX) and on the game-over card.
      function drawPlayer(c, pp, cx, feetY) {
        const kit = KITS[playerCountry] || DEFAULT_KIT;
        const SKIN = "#e7b48b", SKIN_SH = "#c98a5e";
        const HAIR = "#2c2018", BOOT = "#141414", SHORT = "#16203a";
        const hipY = feetY - LEG_HEIGHT;
        const shoulderY = hipY - TORSO_HEIGHT;
        const headCY = feetY - HEAD_CENTRE_FROM_FEET;
        const headTop = headCY - HEAD_RADIUS;
        const R = HEAD_RADIUS;
        const r = (x, y, w, h, col) => pxRect(c, pp, x, y, w, h, col);

        // Ground shadow.
        r(cx - 22, feetY - 3, 44, 4, "rgba(0,0,0,0.28)");
        // Boots.
        r(cx - 16, feetY - 6, 14, 6, BOOT);
        r(cx + 2,  feetY - 6, 14, 6, BOOT);
        // Legs.
        r(cx - 12, hipY + 6, 9, LEG_HEIGHT - 12, SKIN);
        r(cx + 3,  hipY + 6, 9, LEG_HEIGHT - 12, SKIN);
        // Torso jersey + shaded right half.
        r(cx - 18, shoulderY, 36, TORSO_HEIGHT, kit.jersey);
        r(cx,      shoulderY, 18, TORSO_HEIGHT, kit.shadow);
        // Collar band + chest trim stripe.
        r(cx - 18, shoulderY,      36, 8, kit.collar);
        r(cx - 18, shoulderY + 14, 36, 4, kit.trim);
        // Arms (one lit, one shadow) + hands.
        r(cx - 27, shoulderY + 6, 9, 30, kit.jersey);
        r(cx + 18, shoulderY + 6, 9, 30, kit.shadow);
        r(cx - 27, shoulderY + 34, 9, 7, SKIN);
        r(cx + 18, shoulderY + 34, 9, 7, SKIN_SH);
        // Shorts (over the torso bottom + leg tops).
        r(cx - 16, hipY - 2, 32, 16, SHORT);
        // Neck.
        r(cx - 6, headCY + R - 6, 12, 8, SKIN);
        // Head + shaded right half.
        r(cx - R, headTop, 2 * R, 2 * R, SKIN);
        r(cx,     headTop, R,     2 * R, SKIN_SH);
        // Hair cap.
        r(cx - R, headTop, 2 * R, 12, HAIR);
        // Brow / eye band.
        r(cx - R + 4, headCY - 4, 2 * R - 8, 5, "#1a1a1a");
      }

      // Pick the player's frame each tick:
      //   • after a header, a short timer plays frame 3 (contact) → 4 (land);
      //   • otherwise, as the ball falls toward the head, crouch (1) → rise (2)
      //     so the wind-up leads into the contact;
      //   • idle (0) the rest of the time.
      // Frame 1 (idle) almost always; flick to frame 2 only for a few frames
      // right when the ball is headed, then back to frame 1.
      function updatePlayerAnim(dt) {
        if (contactTimer > 0) {
          contactTimer -= dt;
          playerFrame = 1; // brief header pose
          return;
        }
        playerFrame = 0; // idle
      }

      // Draw the player sprite (current `playerFrame`) straight onto the main
      // canvas — NOT the low-res buffer — so it stays crisp. Scaled so the
      // feet sit on groundY and the head-centre meets the ball-contact point.
      function drawPlayerSprite() {
        const img = PLAYER_FRAMES[playerFrame] || PLAYER_FRAMES[0];
        if (!img || !img.complete || !img.naturalWidth) return;
        // Base scale aligns the sprite's feet→head span to the physics span;
        // PLAYER_SCALE then sizes it up, anchored at the head so the ball still
        // contacts the head (the feet just extend lower onto the pitch).
        const intrinsic = (SPR_FEET_FRAC - SPR_HEAD_FRAC) * SPR_H;
        const scale = (HEAD_CENTRE_FROM_FEET / intrinsic) * PLAYER_SCALE;
        const dw = SPR_W * scale;
        const dh = SPR_H * scale;
        const headY = groundY - HEAD_CENTRE_FROM_FEET; // ball-contact point
        const dx = player.x - dw / 2;
        const dy = headY - SPR_HEAD_FRAC * dh + PLAYER_Y_OFFSET; // nudged up
        ctx.imageSmoothingEnabled = false; // crisp pixels (req. 5)
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      // Football sprite — drawn crisp on the main canvas, sized to the physics
      // ball diameter (so collisions still match), spun by ball.spin, with a
      // soft ground shadow that shrinks as the ball rises.
      function drawBallSprite() {
        const diam = BALL_RADIUS * 2;
        if (!ballImg.complete || !ballImg.naturalWidth) return;
        const aspect = ballImg.naturalWidth / ballImg.naturalHeight; // ~1.8
        const dh = diam * BALL_VISUAL_SCALE;
        const dw = dh * aspect;

        // Downscale to a small buffer, then nearest-neighbour upscale so the
        // ball reads as chunky pixels (matching the player's pixel size).
        const sw = Math.max(1, Math.round(dw / BALL_PIXELATE));
        const sh = Math.max(1, Math.round(dh / BALL_PIXELATE));
        ballPix.width = sw;
        ballPix.height = sh;
        const t = ballPix.getContext("2d");
        t.imageSmoothingEnabled = true; // clean downscale
        t.clearRect(0, 0, sw, sh);
        t.drawImage(ballImg, 0, 0, sw, sh);

        ctx.save();
        ctx.translate(ball.x, ball.y);
        ctx.rotate(ball.spin);
        ctx.imageSmoothingEnabled = false; // chunky upscale
        ctx.drawImage(ballPix, 0, 0, sw, sh, -dw / 2, -dh / 2, dw, dh);
        ctx.restore();
      }

      // Largest "Press Start 2P" size (capped at basePx) that fits `text`
      // within `maxW`. The font's blocky glyphs give the pixel look.
      const AD_FONT = "'Press Start 2P', monospace";
      function fitAdFont(a, text, maxW, basePx) {
        a.font = basePx + "px " + AD_FONT;
        const w = a.measureText(text).width || 1;
        const px = w > maxW ? Math.max(5, Math.floor(basePx * maxW / w)) : basePx;
        a.font = px + "px " + AD_FONT;
        return px;
      }

      // The ad-board text + logo. Drawn 1:1 over the board strip after the
      // main blit, using a pixel font so the lettering reads as pixel art.
      function drawAdOverlay() {
        if (!adVH) return;
        const sy = H / vH;
        const boardY = adVY * sy;
        const boardH = adVH * sy;
        const aw = Math.max(1, Math.round(W));
        const ah = Math.max(1, Math.round(boardH));
        adBuf.width = aw;
        adBuf.height = ah;
        const a = adBuf.getContext("2d");
        a.clearRect(0, 0, aw, ah);
        a.textBaseline = "middle";
        a.textAlign = "left";
        const cyA = ah / 2 + 1;
        const basePx = Math.max(6, ah - 8);

        if (Math.floor(adTime / 3.5) % 2 === 0) {
          // Slide 1 — the price.
          const txt = adPriceText();
          fitAdFont(a, txt, aw * 0.95, basePx);
          a.fillStyle = "#ffd23a";
          a.fillText(txt, Math.round((aw - a.measureText(txt).width) / 2), cyA);
        } else {
          // Slide 2 — logo + riamoneytransfer.com, centred as a group.
          const txt = "RIAMONEYTRANSFER.COM";
          const logoH = ah - 2;
          const logoW = adLogoReady ? Math.round(logoH * (adLogo.width / adLogo.height)) : 0;
          const gap = logoW ? 6 : 0;
          fitAdFont(a, txt, aw * 0.95 - logoW - gap, basePx);
          const txtW = a.measureText(txt).width;
          let x = Math.round((aw - (logoW + gap + txtW)) / 2);
          if (adLogoReady) {
            // Pixelate: shrink the logo to a small canvas, then nearest-
            // neighbour upscale it so it's blocky like the rest of the art.
            const LP = 3; // pixelation factor
            const sw = Math.max(1, Math.round(logoW / LP));
            const sh = Math.max(1, Math.round(logoH / LP));
            adLogoTmp.width = sw;
            adLogoTmp.height = sh;
            const t = adLogoTmp.getContext("2d");
            t.imageSmoothingEnabled = true;
            t.clearRect(0, 0, sw, sh);
            t.drawImage(adLogo, 0, 0, sw, sh);
            a.imageSmoothingEnabled = false;
            a.drawImage(adLogoTmp, 0, 0, sw, sh, x, 1, logoW, logoH);
            x += logoW + gap;
          }
          a.fillStyle = "#f4f6f8";
          a.fillText(txt, x, cyA);
        }

        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(adBuf, 0, 0, aw, ah, 0, boardY, aw, boardH);
      }

      // ---------------------- sound + vibrate + pause controls ----------------------
      let muted = false;
      let vibrateOn = true;
      let paused = false;
      let audioCtx = null;

      // Tiny pixel icons (axis-aligned rects → crisp when scaled).
      const ICONS = {
        soundOn:
          '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="6" width="3" height="4"/><rect x="5" y="5" width="1" height="6"/><rect x="6" y="4" width="1" height="8"/><rect x="7" y="3" width="1" height="10"/><rect x="10" y="6" width="1" height="4"/><rect x="12" y="4" width="1" height="8"/></svg>',
        soundOff:
          '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="6" width="3" height="4"/><rect x="5" y="5" width="1" height="6"/><rect x="6" y="4" width="1" height="8"/><rect x="7" y="3" width="1" height="10"/><rect x="10" y="5" width="1" height="1"/><rect x="11" y="6" width="1" height="1"/><rect x="12" y="7" width="1" height="1"/><rect x="13" y="8" width="1" height="1"/><rect x="13" y="5" width="1" height="1"/><rect x="12" y="6" width="1" height="1"/><rect x="11" y="7" width="1" height="1"/><rect x="10" y="8" width="1" height="1"/></svg>',
        play:
          '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="3" width="2" height="10"/><rect x="6" y="5" width="2" height="6"/><rect x="8" y="7" width="2" height="2"/></svg>',
        pause:
          '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="3" width="3" height="10"/><rect x="9" y="3" width="3" height="10"/></svg>',
        vibeOn:
          '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="6" y="2" width="4" height="12"/><rect x="3" y="5" width="1" height="6"/><rect x="4" y="6" width="1" height="4"/><rect x="12" y="5" width="1" height="6"/><rect x="11" y="6" width="1" height="4"/></svg>',
        vibeOff:
          '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="6" y="2" width="4" height="12"/><rect x="11" y="5" width="1" height="1"/><rect x="12" y="6" width="1" height="1"/><rect x="13" y="7" width="1" height="1"/><rect x="13" y="5" width="1" height="1"/><rect x="12" y="6" width="1" height="1"/><rect x="11" y="7" width="1" height="1"/></svg>',
      };
      function refreshControlIcons() {
        ui.btnSound.innerHTML = muted ? ICONS.soundOff : ICONS.soundOn;
        ui.btnVibrate.innerHTML = vibrateOn ? ICONS.vibeOn : ICONS.vibeOff;
        ui.btnPause.innerHTML = paused ? ICONS.play : ICONS.pause;
      }

      // Lazily create the audio context (must follow a user gesture).
      function initAudio() {
        if (audioCtx) return;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { audioCtx = null; }
      }
      // Short blip on each header — self-contained, no audio files.
      function playHeaderSound() {
        if (muted || !audioCtx) return;
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "square";
        o.frequency.setValueAtTime(660, t);
        o.frequency.exponentialRampToValueAtTime(990, t + 0.08);
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
        o.connect(g).connect(audioCtx.destination);
        o.start(t);
        o.stop(t + 0.14);
      }

      ui.btnSound.addEventListener("click", () => {
        initAudio();
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        muted = !muted;
        refreshControlIcons();
      });
      ui.btnVibrate.addEventListener("click", () => {
        vibrateOn = !vibrateOn;
        if (vibrateOn && navigator.vibrate) navigator.vibrate(25); // confirmation buzz
        refreshControlIcons();
      });
      ui.btnPause.addEventListener("click", () => {
        paused = !paused;
        refreshControlIcons();
      });
      refreshControlIcons();

      // ---------------------- main loop ----------------------
      let lastT = performance.now();
      function loop(now) {
        const dt = Math.min((now - lastT) / 1000, 0.05);
        lastT = now;
        if (!paused) {
          adTime += dt; // drives the ad-board slide swap
          if (alive || inTutorial) {
            tickPlayer(dt);
            tickBall(dt); // practice mode keeps a ball falling too
          }
          if (inTutorial) {
            // Rotate the phone icon by the actual tilt (1:1, clamped) so it
            // matches how much the player is tilting / how the player moves.
            const deg = Math.max(-35, Math.min(35, tiltDelta));
            ui.tutPhone.style.transform = `rotate(${deg}deg)`;
            // Once they've actually tilted, hide the instruction and just
            // leave the Start button.
            if (!tilted && Math.abs(tiltDelta) > 8) {
              tilted = true;
              ui.tutorial.classList.add("tilted");
              ui.tutorialStart.hidden = false;
            }
          }
          updatePlayerAnim(dt);
        }
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, W, H);

        if (useImageBg()) {
          // MOBILE: baked backdrop image (crowd + ads + goal + pitch).
          // Self-blurs via downscale/upscale (no ctx.filter — unsupported on
          // iOS Safari / many mobile browsers).
          drawMobileBackground();
        } else {
          // DESKTOP: procedural pixel scene, blurred with the canvas filter
          // (supported on the desktop browsers this path runs on).
          ctx.filter = `blur(${BG_BLUR}px)`;
          // Pass 1 — backdrop (crowd, wall, pitch, ad bar) behind the ads.
          bctx.clearRect(0, 0, vW, vH);
          drawBackground();
          ctx.drawImage(buf, 0, 0, vW, vH, 0, 0, W, H);
          // Ad board text + logo — in front of the bar, behind goal + player.
          drawAdOverlay();
          // Pass 2 — pixel foreground (goal) composited on top of the ads.
          bctx.clearRect(0, 0, vW, vH);
          drawGoal(bctx);
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(buf, 0, 0, vW, vH, 0, 0, W, H);
          ctx.filter = "none";
        }

        // Sprites drawn crisp on the main canvas: player first, ball on top so
        // it reads in front of the forehead on contact. (HUD is DOM, on top.)
        drawPlayerSprite();
        drawBallSprite();
        requestAnimationFrame(loop);
      }

      // =================================================================
      // BOOT
      // =================================================================
      // Show the player + a tilting-phone demo; the player moves with real
      // tilt. A Start button appears after a moment. (Only used when tilt is
      // granted on mobile.)
      function startTutorial() {
        inTutorial = true;
        tilted = false;
        player.x = W / 2;
        tiltZero = null; // calibrate rest angle to how they're holding it now
        tiltDelta = 0;
        resetForRun();           // drop a practice ball
        pickTheme();             // pick a backdrop for the practice scene
        ui.game.classList.add("tut"); // hides leaderboard + controls (see CSS)
        ui.hint.style.opacity = "0";
        ui.tutorial.hidden = false;
        ui.tutorial.classList.remove("tilted");
        ui.tutorialStart.hidden = true;
        // Fallback: reveal Start after a bit even if they don't tilt.
        window.setTimeout(() => { ui.tutorialStart.hidden = false; }, 2500);
      }

      ui.startBtn.addEventListener("click", async () => {
        playerCountry = ui.countrySelect.value;
        loadPlayerFrames(); // swap to the country's sprite set (e.g. Argentina)
        // This tap is a user gesture — the only context iOS lets us ask for
        // gyroscope access / start audio from.
        initAudio();
        setCountryHeader();
        ui.picker.hidden = true;
        ui.game.hidden = false;
        resize();
        renderLeaderboard();
        const tiltOk = await enableTilt();
        // Tilt granted on a phone → show the how-to-play demo; else just play.
        if (mobileMode && tiltOk) startTutorial();
        else startGame();
      });

      ui.tutorialStart.addEventListener("click", () => {
        inTutorial = false;
        ui.tutorial.hidden = true;
        ui.game.classList.remove("tut"); // restore leaderboard + controls
        startGame();
      });

      ui.playAgain.addEventListener("click", () => startGame());

      resize();
      renderLeaderboard();
      renderHomeTicker();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
