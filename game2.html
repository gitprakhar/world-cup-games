<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b1d09" />
    <title>Ria World Cup ⚽</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        height: 100%;
        width: 100%;
        color: #fff;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #stage {
        position: fixed;
        inset: 0;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 4;
      }

      .scoreboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0), 16px);
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 12px;
        font-weight: 700;
      }
      .stat {
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 14px;
        border-radius: 999px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-size: 14px;
        letter-spacing: 0.03em;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      .stat span {
        font-size: 18px;
        margin-left: 4px;
      }

      .title-card {
        position: absolute;
        top: max(env(safe-area-inset-top, 0) + 60px, 76px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.55;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }

      .instructions {
        position: absolute;
        bottom: max(env(safe-area-inset-bottom, 0), 28px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 13px;
        padding: 0 20px;
        opacity: 0.8;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
      }
      .instructions strong {
        color: #fde68a;
      }

      .feedback {
        position: absolute;
        top: 36%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: clamp(48px, 11vw, 96px);
        font-weight: 900;
        letter-spacing: 0.02em;
        text-shadow:
          0 6px 24px rgba(0, 0, 0, 0.7),
          0 2px 4px rgba(0, 0, 0, 0.8);
        opacity: 0;
        transform: scale(0.85);
        transition:
          opacity 200ms ease-out,
          transform 200ms cubic-bezier(0.22, 1.4, 0.36, 1);
      }
      .feedback.show {
        opacity: 1;
        transform: scale(1);
      }
      .feedback.goal {
        color: #fde047;
      }
      .feedback.saved {
        color: #fca5a5;
      }
      .feedback.missed {
        color: #d1d5db;
      }

      /* Power meter — fills up while the player holds the mouse/finger down,
         and resets after the shot. Mouse aim shows the live arc in 3D, so the
         meter is the only 2D feedback the player needs. */
      .power-meter {
        position: absolute;
        left: 50%;
        bottom: 22px;
        width: min(240px, 60vw);
        height: 12px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.25);
        overflow: hidden;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.18s ease-out;
        z-index: 3;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .power-meter.active {
        opacity: 1;
      }
      .power-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #4ade80 0%, #facc15 55%, #ef4444 100%);
      }

      /* In-game leaderboard — top-right card, semi-transparent so it never
         hides the goal. Per-country goal totals persist across sessions via
         localStorage; the player's own country is highlighted. */
      .leaderboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0), 16px);
        right: 16px;
        width: 200px;
        max-height: 60vh;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 14px;
        padding: 10px 12px 8px;
        font-size: 13px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 4;
      }
      .leaderboard .lb-title {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 2px;
      }
      .leaderboard .lb-row {
        display: grid;
        grid-template-columns: 18px 22px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 3px 2px;
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
      }
      .leaderboard .lb-row.you {
        background: rgba(253, 230, 138, 0.16);
        color: #fde68a;
        font-weight: 700;
      }
      .leaderboard .lb-rank {
        opacity: 0.55;
        font-size: 11px;
      }
      .leaderboard .lb-flag {
        font-size: 16px;
        line-height: 1;
      }
      .leaderboard .lb-name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .leaderboard .lb-score {
        font-weight: 700;
      }
      .leaderboard .lb-change {
        background: none;
        border: none;
        color: #fde68a;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 6px 0 0;
        cursor: pointer;
        opacity: 0.7;
      }
      .leaderboard .lb-change:hover {
        opacity: 1;
      }

      /* Country picker — full-screen modal shown on first load (and again
         when the player taps "change country"). Sits above everything else
         and blocks the canvas pointer events while open. */
      .country-picker {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 16, 0.78);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        pointer-events: auto;
      }
      .country-picker.show {
        display: flex;
      }
      .country-picker .cp-card {
        max-width: min(540px, 92vw);
        max-height: 86vh;
        overflow: auto;
        background: rgba(20, 22, 30, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 24px 22px 18px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      }
      .country-picker h2 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.01em;
      }
      .country-picker p {
        margin: 0 0 16px;
        font-size: 13px;
        opacity: 0.7;
      }
      .country-picker .cp-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
      }
      .country-picker .cp-option {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 6px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, transform 0.12s;
      }
      .country-picker .cp-option:hover {
        background: rgba(253, 230, 138, 0.14);
        border-color: rgba(253, 230, 138, 0.5);
        transform: translateY(-1px);
      }
      .country-picker .cp-flag {
        font-size: 26px;
        line-height: 1;
      }
      .country-picker .cp-close {
        margin-top: 14px;
        background: none;
        border: none;
        color: #fde68a;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        opacity: 0.7;
      }
      .country-picker .cp-close:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game-canvas"></canvas>
      <div class="power-meter" id="power-meter">
        <div class="power-fill" id="power-fill"></div>
      </div>
      <div class="hud">
        <div class="scoreboard">
          <div class="stat">⚽ Goals<span id="goals">0</span></div>
          <div class="stat">🎯 Attempts<span id="attempts">0</span></div>
        </div>
        <div class="title-card">Ria World Cup</div>
        <div class="feedback" id="feedback"></div>
        <div class="instructions" id="instructions">
          Aim with your mouse — <strong>hold</strong> to charge power, release to shoot.
        </div>
        <div class="leaderboard" id="leaderboard">
          <div class="lb-title">🏆 Leaderboard</div>
          <div id="lb-rows"></div>
          <button class="lb-change" id="lb-change" type="button">Change country</button>
        </div>
      </div>
      <div class="country-picker" id="country-picker">
        <div class="cp-card">
          <h2>Pick your country</h2>
          <p>Every goal you score adds to your country's tally on the leaderboard.</p>
          <div class="cp-grid" id="cp-grid"></div>
          <button class="cp-close" id="cp-close" type="button" hidden>Keep current country</button>
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      // =================================================================
      // CONSTANTS
      // =================================================================
      const GOAL_WIDTH = 7.32;
      const GOAL_HEIGHT = 2.44;
      const NET_DEPTH = 1.6;
      const PENALTY_DISTANCE = 11.0;
      const BALL_RADIUS = 0.11;
      // The ball's resting spot changes every round (see pickShootingSpot()).
      // CAMERA_HOME is recomputed to sit behind whatever the current spot is.
      const BALL_HOME = new THREE.Vector3(0, BALL_RADIUS, 0);
      // Returns the Z plane halfway between the ball and the goal — used as
      // the mid-plane when raycasting the drag's middle sample.
      function midPlaneZ() {
        return (BALL_HOME.z + PENALTY_DISTANCE) / 2;
      }
      // Where in 3D space the goalkeeper is looking (so the camera also
      // ends up pointing roughly at the goal center).
      const GOAL_CENTER = new THREE.Vector3(0, GOAL_HEIGHT * 0.45, PENALTY_DISTANCE);
      // Pick a fresh shooting position somewhere in front of the goal. We
      // vary side (X) and distance (Z) so each round is a new angle.
      function pickShootingSpot() {
        // X: anywhere from far-left to far-right of the penalty area (but
        // never directly behind the keeper — that's no shot at all).
        const x = (Math.random() - 0.5) * 8; // -4 .. +4
        // Z: from a few meters behind the penalty mark up to a few meters
        // closer. Negative Z = further from goal.
        const z = -3 + Math.random() * 8; // -3 .. +5
        BALL_HOME.set(x, BALL_RADIUS, z);
        updateCameraHome();
      }
      // Position the camera ~3.2m behind the ball along the ball→goal axis,
      // at eye height.
      function updateCameraHome() {
        const dir = new THREE.Vector3().subVectors(GOAL_CENTER, BALL_HOME);
        dir.y = 0;
        dir.normalize();
        CAMERA_HOME.copy(BALL_HOME)
          .add(dir.multiplyScalar(-3.2));
        CAMERA_HOME.y = 1.55;
      }
      const FLIGHT_DURATION = 0.85; // s — base flight time at full power
      const RESULT_HOLD = 1700; // ms
      // Charge tuning — power is clamped to [MIN_POWER, 1]. A bare click still
      // releases the ball (with MIN_POWER), so the input feels responsive even
      // when the player doesn't realise they need to hold.
      const MIN_POWER = 0.35;
      const MAX_HOLD_MS = 1100;

      // Goal-frame collision tuning. Posts and crossbar are 0.06m radius
      // cylinders (see goalGroup creation). The ball is BALL_RADIUS, so the
      // centre-to-centre miss distance is the sum.
      const POST_RADIUS = 0.06;
      const FRAME_HIT_RADIUS = BALL_RADIUS + POST_RADIUS;
      const GOAL_HALF_W = GOAL_WIDTH / 2;
      // Physics tuning for the post-bounce phase. Picked so a post hit feels
      // dramatic without the ball rocketing across the stadium.
      const POST_RESTITUTION = 0.6;
      const GROUND_RESTITUTION = 0.45;
      const GROUND_FRICTION = 0.78;
      const AIR_DRAG_PER_S = 0.55; // velocity decay factor — applied as v *= AIR_DRAG_PER_S^dt
      const GRAVITY = 9.81;
      const MAX_PHYSICS_MS = 1500;
      const SETTLE_SPEED_SQ = 0.18; // ball considered "at rest" below this v^2

      // Net tuning — nets are very absorbent (low restitution + high friction)
      // so the ball pushes into the mesh and dies, rather than ricocheting
      // back out of the goal mouth. A separate window from the post window
      // because the ball can roll inside the net for a few seconds.
      const NET_RESTITUTION = 0.18;
      const NET_FRICTION = 0.55;
      const NET_PHYSICS_MS = 2200;

      // =================================================================
      // GAME STATE — single source of truth, easy to extend later
      // (e.g. add { country } for the leaderboard feature).
      // =================================================================
      const state = {
        phase: "idle", // idle | aiming | shooting | result
        goals: 0,
        attempts: 0,
        country: null, // reserved for country leaderboard
      };

      // =================================================================
      // UI REFERENCES
      // =================================================================
      const ui = {
        canvas: document.getElementById("game-canvas"),
        goals: document.getElementById("goals"),
        attempts: document.getElementById("attempts"),
        feedback: document.getElementById("feedback"),
        instructions: document.getElementById("instructions"),
        powerMeter: document.getElementById("power-meter"),
        powerFill: document.getElementById("power-fill"),
        leaderboard: document.getElementById("leaderboard"),
        lbRows: document.getElementById("lb-rows"),
        lbChange: document.getElementById("lb-change"),
        countryPicker: document.getElementById("country-picker"),
        cpGrid: document.getElementById("cp-grid"),
        cpClose: document.getElementById("cp-close"),
      };

      // =================================================================
      // COUNTRIES + LEADERBOARD STATE
      // =================================================================
      // Curated list — mix of Ria's main corridors plus a few extras so the
      // leaderboard always shows enough rows to feel alive. Each entry is a
      // tuple of [ISO-2 code, emoji flag, display name].
      const COUNTRIES = [
        ["MX", "🇲🇽", "Mexico"],
        ["CO", "🇨🇴", "Colombia"],
        ["PE", "🇵🇪", "Peru"],
        ["CL", "🇨🇱", "Chile"],
        ["AR", "🇦🇷", "Argentina"],
        ["BR", "🇧🇷", "Brazil"],
        ["EC", "🇪🇨", "Ecuador"],
        ["DO", "🇩🇴", "Dominican Rep."],
        ["IN", "🇮🇳", "India"],
        ["PH", "🇵🇭", "Philippines"],
        ["PK", "🇵🇰", "Pakistan"],
        ["BD", "🇧🇩", "Bangladesh"],
        ["MA", "🇲🇦", "Morocco"],
        ["LK", "🇱🇰", "Sri Lanka"],
        ["ES", "🇪🇸", "Spain"],
        ["US", "🇺🇸", "USA"],
      ];
      const COUNTRY_BY_CODE = Object.fromEntries(
        COUNTRIES.map(([code, flag, name]) => [code, { code, flag, name }])
      );
      const LB_TOP_N = 6;
      const STORAGE_COUNTRY = "riaWorldCup.country";
      const STORAGE_SCORES = "riaWorldCup.scores";

      // localStorage can throw in some sandboxed iframes; wrap so the game
      // still runs in-memory if persistence fails.
      function loadStoredCountry() {
        try {
          const v = localStorage.getItem(STORAGE_COUNTRY);
          return v && COUNTRY_BY_CODE[v] ? v : null;
        } catch {
          return null;
        }
      }
      function saveStoredCountry(code) {
        try {
          localStorage.setItem(STORAGE_COUNTRY, code);
        } catch {}
      }
      function loadStoredScores() {
        try {
          const raw = localStorage.getItem(STORAGE_SCORES);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }
      function saveStoredScores(scores) {
        try {
          localStorage.setItem(STORAGE_SCORES, JSON.stringify(scores));
        } catch {}
      }

      // Per-country goal totals — keyed by ISO-2 code. Loaded once at boot,
      // mutated on each goal, persisted to localStorage. Unknown codes are
      // ignored at render time so a stale entry can't pollute the board.
      const countryScores = loadStoredScores();

      function setScoreboard() {
        ui.goals.textContent = String(state.goals);
        ui.attempts.textContent = String(state.attempts);
      }

      let feedbackTimer = null;
      function showFeedback(type, text) {
        ui.feedback.textContent = text;
        ui.feedback.className = `feedback show ${type}`;
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackTimer = setTimeout(() => {
          ui.feedback.className = "feedback";
        }, 1300);
      }

      function setInstructions(html) {
        ui.instructions.innerHTML = html;
      }

      // -----------------------------------------------------------------
      // Leaderboard rendering
      // -----------------------------------------------------------------
      // We sort all known countries by goals desc, then take the top N. If
      // the player's country isn't already in that slice, we append it so
      // they can always see their own progress without scrolling.
      function renderLeaderboard() {
        const rows = COUNTRIES.map(([code, flag, name]) => ({
          code,
          flag,
          name,
          score: countryScores[code] || 0,
        }))
          .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
          .map((row, idx) => ({ ...row, rank: idx + 1 }));

        let visible = rows.slice(0, LB_TOP_N);
        if (state.country && !visible.find((r) => r.code === state.country)) {
          const me = rows.find((r) => r.code === state.country);
          if (me) visible = [...visible, me];
        }

        ui.lbRows.innerHTML = visible
          .map((r) => {
            const isYou = r.code === state.country;
            return `
              <div class="lb-row${isYou ? " you" : ""}">
                <span class="lb-rank">${r.rank}</span>
                <span class="lb-flag" aria-hidden="true">${r.flag}</span>
                <span class="lb-name">${r.name}</span>
                <span class="lb-score">${r.score}</span>
              </div>
            `;
          })
          .join("");
      }

      // -----------------------------------------------------------------
      // Country picker
      // -----------------------------------------------------------------
      // Opens the modal. `allowClose` is false on the very first launch (we
      // require a choice before the player can start) and true afterwards.
      function showCountryPicker({ allowClose }) {
        ui.cpClose.hidden = !allowClose;
        ui.cpGrid.innerHTML = COUNTRIES.map(
          ([code, flag, name]) =>
            `<button class="cp-option" data-code="${code}" type="button">
               <span class="cp-flag" aria-hidden="true">${flag}</span>
               <span>${name}</span>
             </button>`
        ).join("");
        ui.countryPicker.classList.add("show");
      }
      function hideCountryPicker() {
        ui.countryPicker.classList.remove("show");
      }
      ui.cpGrid.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-code]");
        if (!btn) return;
        const code = btn.dataset.code;
        if (!COUNTRY_BY_CODE[code]) return;
        state.country = code;
        saveStoredCountry(code);
        hideCountryPicker();
        renderLeaderboard();
      });
      ui.cpClose.addEventListener("click", hideCountryPicker);
      ui.lbChange.addEventListener("click", () =>
        showCountryPicker({ allowClose: true })
      );

      // Called from the GOAL branch in launchShot — keeps the country tally
      // and the leaderboard in sync.
      function recordGoalForCountry() {
        if (!state.country) return;
        countryScores[state.country] = (countryScores[state.country] || 0) + 1;
        saveStoredScores(countryScores);
        renderLeaderboard();
      }

      // =================================================================
      // SCENE / CAMERA / RENDERER
      // =================================================================
      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0c2e0c, 30, 90);

      const camera = new THREE.PerspectiveCamera(
        62,
        window.innerWidth / window.innerHeight,
        0.05,
        200
      );
      // Mutable so we can move the camera with the ball each round.
      const CAMERA_HOME = new THREE.Vector3(0, 1.55, -3.2);
      const CAMERA_LOOK_AT = GOAL_CENTER.clone();
      // Initialise the first shooting spot + camera position before scene
      // setup uses them.
      pickShootingSpot();
      camera.position.copy(CAMERA_HOME);
      camera.lookAt(CAMERA_LOOK_AT);

      const renderer = new THREE.WebGLRenderer({
        canvas: ui.canvas,
        antialias: true,
        powerPreference: "high-performance",
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      // =================================================================
      // LIGHTING
      // =================================================================
      scene.add(new THREE.HemisphereLight(0xb8d8ff, 0x224a22, 0.55));
      scene.add(new THREE.AmbientLight(0xffffff, 0.18));

      const sun = new THREE.DirectionalLight(0xffeacc, 1.4);
      sun.position.set(6, 16, -4);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.left = -18;
      sun.shadow.camera.right = 18;
      sun.shadow.camera.top = 14;
      sun.shadow.camera.bottom = -8;
      sun.shadow.camera.near = 0.5;
      sun.shadow.camera.far = 60;
      sun.shadow.bias = -0.0008;
      scene.add(sun);
      scene.add(sun.target);
      sun.target.position.set(0, 0, PENALTY_DISTANCE);

      // =================================================================
      // SKY
      // =================================================================
      {
        const skyMat = new THREE.ShaderMaterial({
          side: THREE.BackSide,
          uniforms: {
            topColor: { value: new THREE.Color(0x0b1d3a) },
            midColor: { value: new THREE.Color(0x3b82f6) },
            bottomColor: { value: new THREE.Color(0xfbbf24) },
          },
          vertexShader: `
            varying vec3 vWorldPosition;
            void main() {
              vec4 world = modelMatrix * vec4(position, 1.0);
              vWorldPosition = world.xyz;
              gl_Position = projectionMatrix * viewMatrix * world;
            }
          `,
          fragmentShader: `
            varying vec3 vWorldPosition;
            uniform vec3 topColor;
            uniform vec3 midColor;
            uniform vec3 bottomColor;
            void main() {
              float h = normalize(vWorldPosition).y;
              vec3 col = h > 0.0
                ? mix(midColor, topColor, smoothstep(0.0, 0.7, h))
                : mix(midColor, bottomColor, smoothstep(0.0, -0.4, h));

      // =================================================================

      {

        const lines = [

      // =================================================================
      // GOAL + NET (back net deformable for ripple)
      // =================================================================

      rightSideNet.rotation.y = -Math.PI / 2;

      // =================================================================
      // STADIUM
      // =================================================================
      {
        const standMat = new THREE.MeshStandardMaterial({ color: 0x2c2c34, roughness: 0.9 });
        const cheerMat = new THREE.MeshStandardMaterial({
          color: 0xff6a1a,
          emissive: 0xff6a1a,
          emissiveIntensity: 0.15,
          roughness: 0.8,
        });
        const farStand = new THREE.Mesh(new THREE.BoxGeometry(40, 12, 6), standMat);
        farStand.position.set(0, 6, PENALTY_DISTANCE + 8);
        farStand.castShadow = true;
        farStand.receiveShadow = true;
        scene.add(farStand);
        const farCrowd = new THREE.Mesh(new THREE.BoxGeometry(36, 4, 0.4), cheerMat);
        farCrowd.position.set(0, 8, PENALTY_DISTANCE + 5.1);
        scene.add(farCrowd);
        for (const side of [-1, 1]) {
          const stand = new THREE.Mesh(new THREE.BoxGeometry(6, 10, 60), standMat);
          stand.position.set(side * 14, 5, PENALTY_DISTANCE / 2);
          scene.add(stand);
          const crowd = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3, 50), cheerMat);
          crowd.position.set(side * (14 - 3.1), 7, PENALTY_DISTANCE / 2);

        }
        for (const [x, z] of [
          [-15, PENALTY_DISTANCE + 10],

        ]) {

      }

      // =================================================================
      // BALL
      // =================================================================
      // We draw an equirectangular 1024×512 texture: white hex tiles with a
      // sparse, deterministic 1-in-7 pattern of black "pentagon" cells, plus
      // dark seams between every cell. Wrapped on a 64×32 sphere this reads
      // as a real soccer ball — the hexes near the poles smear a little
      // (inherent to equirect UV), but the overall pattern is convincing.
      // A grayscale copy of the same canvas drives a bump map so the panels
      // catch light along the seam lines.
      const BALL_TEX_W = 1024;
      const BALL_TEX_H = 512;
      const ballTexCanvas = document.createElement("canvas");
      const ballBumpCanvas = document.createElement("canvas");
      ballTexCanvas.width = ballBumpCanvas.width = BALL_TEX_W;
      ballTexCanvas.height = ballBumpCanvas.height = BALL_TEX_H;
      {
        const ctx = ballTexCanvas.getContext("2d");
        const bctx = ballBumpCanvas.getContext("2d");

        ctx.fillStyle = "#f4f1ea"; // slightly off-white so the ball doesn't look like a TV test card
        ctx.fillRect(0, 0, BALL_TEX_W, BALL_TEX_H);
        bctx.fillStyle = "#808080";
        bctx.fillRect(0, 0, BALL_TEX_W, BALL_TEX_H);

        // Hex tiling — flat-top, staggered rows. cols chosen so the pattern
        // tiles cleanly at the U seam (x=0 and x=BALL_TEX_W meet).
        const cols = 18;
        const hexW = BALL_TEX_W / cols;
        const hexH = hexW * (2 / Math.sqrt(3));
        const rowStep = hexH * 0.75;
        const rows = Math.ceil(BALL_TEX_H / rowStep) + 1;

        function hexPath(c, cx, cy, w, h) {
          const sw = w * 0.5;
          const hh = h * 0.5;
          c.beginPath();
          c.moveTo(cx - sw, cy);
          c.lineTo(cx - sw * 0.5, cy - hh);
          c.lineTo(cx + sw * 0.5, cy - hh);
          c.lineTo(cx + sw, cy);
          c.lineTo(cx + sw * 0.5, cy + hh);
          c.lineTo(cx - sw * 0.5, cy + hh);
          c.closePath();
        }

        // The pattern: roughly every 7th tile gets the dark "pentagon" fill.
        // The mod-7 hash keeps them spaced out without an obvious grid line.
        for (let r = 0; r < rows; r++) {
          const cy = r * rowStep;
          const xShift = (r % 2) * (hexW * 0.5);
          for (let c = -1; c <= cols + 1; c++) {
            const cx = c * hexW + xShift;
            const isPentagon = (c * 3 + r * 5 + 11) % 7 === 0;
            const fill = isPentagon ? "#0e0e10" : "#f4f1ea";
            const bumpFill = isPentagon ? "#404040" : "#a0a0a0";

            hexPath(ctx, cx, cy, hexW * 1.04, hexH * 1.04);
            ctx.fillStyle = fill;
            ctx.fill();
            ctx.strokeStyle = "#1f1f22";
            ctx.lineWidth = 2;
            ctx.stroke();

            hexPath(bctx, cx, cy, hexW * 1.04, hexH * 1.04);
            bctx.fillStyle = bumpFill;
            bctx.fill();
            bctx.strokeStyle = "#202020";
            bctx.lineWidth = 3;
            bctx.stroke();
          }
        }
      }
      const ballTex = new THREE.CanvasTexture(ballTexCanvas);
      ballTex.colorSpace = THREE.SRGBColorSpace;
      ballTex.anisotropy = 8;
      ballTex.wrapS = THREE.RepeatWrapping; // seamless across the U seam
      const ballBump = new THREE.CanvasTexture(ballBumpCanvas);
      ballBump.anisotropy = 8;
      ballBump.wrapS = THREE.RepeatWrapping;

      const ball = new THREE.Mesh(
        new THREE.SphereGeometry(BALL_RADIUS, 64, 32),
        new THREE.MeshStandardMaterial({
          map: ballTex,
          bumpMap: ballBump,
          bumpScale: 0.012,
          roughness: 0.42,
          metalness: 0.04,
        })
      );
      ball.castShadow = true;
      ball.position.copy(BALL_HOME);
      scene.add(ball);

      // =================================================================
      // GOALKEEPER
      // =================================================================
      const keeperGroup = new THREE.Group();
      keeperGroup.position.z = PENALTY_DISTANCE - 0.3;
      scene.add(keeperGroup);

      // 2D practice-style cutout. Real coaches use these for shooting drills:
      // a vertical board stamped with a goalkeeper silhouette that just sits
      // in the goal mouth blocking part of it. We draw the silhouette into a
      // canvas and apply it to a single plane that always faces the camera,
      // so the keeper looks deliberately flat rather than fake-3D.
      const KEEPER_W = 0.95;
      const KEEPER_H = 1.95;
      const keeperCanvas = document.createElement("canvas");
      keeperCanvas.width = 256;
      keeperCanvas.height = 512;
      {
        const c = keeperCanvas.getContext("2d");
        const W = 256;
        const H = 512;
        c.clearRect(0, 0, W, H);
        const cx = W / 2;

        // Silhouette fill + bright outline so the cutout reads as a board,
        // not a person. Yellow stripe is a wink at the goalkeeper jersey.
        c.fillStyle = "#10131a";
        c.strokeStyle = "#facc15";
        c.lineWidth = 5;
        c.lineJoin = "round";
        c.lineCap = "round";

        // ---- head ----
        c.beginPath();
        c.arc(cx, 78, 38, 0, Math.PI * 2);
        c.fill();
        c.stroke();

        // ---- torso (broad shoulders → narrow waist → hips) ----
        c.beginPath();
        c.moveTo(cx - 58, 124);    // left shoulder
        c.quadraticCurveTo(cx - 96, 170, cx - 86, 260); // outer torso curve
        c.lineTo(cx - 62, 360);    // waist
        c.lineTo(cx - 78, 480);    // hip
        c.lineTo(cx - 32, 500);    // groin left
        c.lineTo(cx + 32, 500);    // groin right
        c.lineTo(cx + 78, 480);    // hip right
        c.lineTo(cx + 62, 360);    // waist right
        c.quadraticCurveTo(cx + 96, 170, cx + 58, 124); // outer torso curve right
        c.closePath();
        c.fill();
        c.stroke();

        // ---- arms — held out to the sides in a ready-to-save pose ----
        // Left arm
        c.beginPath();
        c.moveTo(cx - 60, 140);
        c.quadraticCurveTo(cx - 130, 220, cx - 115, 330);
        c.lineTo(cx - 80, 320);
        c.quadraticCurveTo(cx - 92, 230, cx - 40, 170);
        c.closePath();
        c.fill();
        c.stroke();

        // Right arm
        c.beginPath();
        c.moveTo(cx + 60, 140);
        c.quadraticCurveTo(cx + 130, 220, cx + 115, 330);
        c.lineTo(cx + 80, 320);
        c.quadraticCurveTo(cx + 92, 230, cx + 40, 170);
        c.closePath();
        c.fill();
        c.stroke();

        // ---- gloves on the hands so the silhouette reads as a keeper ----
        c.fillStyle = "#facc15";
        c.beginPath();
        c.arc(cx - 122, 332, 22, 0, Math.PI * 2);
        c.fill();
        c.beginPath();
        c.arc(cx + 122, 332, 22, 0, Math.PI * 2);
        c.fill();

        // ---- jersey horizontal stripe (practice-board marker) ----
        c.fillStyle = "#facc15";
        c.fillRect(cx - 80, 250, 160, 8);
      }
      const keeperTex = new THREE.CanvasTexture(keeperCanvas);
      keeperTex.colorSpace = THREE.SRGBColorSpace;
      keeperTex.anisotropy = 8;
      const keeperMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(KEEPER_W, KEEPER_H),
        new THREE.MeshBasicMaterial({
          map: keeperTex,
          transparent: true,
          alphaTest: 0.5, // crisp silhouette edges, no half-transparent halo
          side: THREE.DoubleSide,
        })
      );
      // Base of the board sits on the pitch; the group origin is at y=0 so
      // any rotation.z applied to the group pivots from the feet.
      keeperMesh.position.y = KEEPER_H / 2;
      // PlaneGeometry's default normal is +Z; the camera is on the -Z side
      // of the keeper, so flip it 180° around Y to face the shooter.
      keeperMesh.rotation.y = Math.PI;
      keeperGroup.add(keeperMesh);

      // =================================================================
      // TRAJECTORY PREVIEW (3D dashed line) + CROSSHAIR (3D ring)
      // =================================================================
      const trajectoryGeo = new THREE.BufferGeometry();
      // Pre-allocate buffer for 41 points (40 segments).
      trajectoryGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(new Float32Array(41 * 3), 3)
      );
      const trajectoryMat = new THREE.LineDashedMaterial({
        color: 0xffffff,
        dashSize: 0.22,
        gapSize: 0.16,
        transparent: true,
        opacity: 0.85,
        depthTest: false,
      });
      const trajectoryLine = new THREE.Line(trajectoryGeo, trajectoryMat);
      trajectoryLine.renderOrder = 5;
      trajectoryLine.visible = false;
      scene.add(trajectoryLine);

      const crosshair = new THREE.Group();
      {
        const ringMat = new THREE.MeshBasicMaterial({
          color: 0xef4444,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.9,
          depthTest: false,
        });
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.18, 0.24, 32), ringMat);
        ring.renderOrder = 6;
        crosshair.add(ring);
        const dotMat = new THREE.MeshBasicMaterial({
          color: 0xef4444,
          depthTest: false,
        });
        const dot = new THREE.Mesh(new THREE.CircleGeometry(0.04, 16), dotMat);
        dot.renderOrder = 7;
        crosshair.add(dot);
      }
      crosshair.visible = false;
      scene.add(crosshair);

      // =================================================================
      // POSTPROCESSING
      // =================================================================
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloom = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.65,
        0.55,
        0.82
      );
      composer.addPass(bloom);

      // =================================================================
      // AUDIO
      // =================================================================
      let audio = null;
      function getAudio() {
        if (!audio) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return null;
          audio = new Ctx();
        }
        if (audio.state === "suspended") audio.resume();
        return audio;
      }
      function playKick() {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / ch.length);
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = "lowpass";
        filt.Q.value = 0.7;
        filt.frequency.setValueAtTime(900, now);
        filt.frequency.exponentialRampToValueAtTime(80, now + 0.16);
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(110, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.14);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.7, now + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0005, now + 0.18);
        noise.connect(filt).connect(gain);
        osc.connect(gain);
        gain.connect(ctx.destination);
        noise.start(now);
        osc.start(now);
        osc.stop(now + 0.2);
      }
      function playWhoosh() {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < ch.length; i++) ch[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = "bandpass";
        filt.frequency.setValueAtTime(1400, now);
        filt.frequency.linearRampToValueAtTime(700, now + 0.4);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.18, now + 0.08);
        gain.gain.linearRampToValueAtTime(0, now + 0.45);
        src.connect(filt).connect(gain).connect(ctx.destination);
        src.start(now);
      }
      function playCrowd() {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 2.6, ctx.sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * 0.6;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = "bandpass";
        filt.Q.value = 0.6;
        filt.frequency.setValueAtTime(800, now);
        filt.frequency.linearRampToValueAtTime(1400, now + 0.4);
        filt.frequency.linearRampToValueAtTime(700, now + 2.4);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.55, now + 0.2);
        gain.gain.linearRampToValueAtTime(0.3, now + 1.3);
        gain.gain.linearRampToValueAtTime(0, now + 2.5);
        src.connect(filt).connect(gain).connect(ctx.destination);
        src.start(now);
      }
      function playSave() {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(70, now + 0.25);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.35, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0005, now + 0.32);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.35);
      }

      // Metallic clang for ball-on-post — short, bright, drops fast. Stacks
      // with playSave() on the eventual OFF-THE-POST miss so the impact reads
      // as a separate event from the outcome card.
      function playPostThud() {
        const ctx = getAudio();
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(720, now);
        osc.frequency.exponentialRampToValueAtTime(180, now + 0.18);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.55, now + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0005, now + 0.35);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      }

      // =================================================================
      // MATH HELPERS
      // =================================================================
      function quadraticBezier(t, p0, p1, p2, out) {
        const u = 1 - t;
        out.x = u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x;
        out.y = u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y;
        out.z = u * u * p0.z + 2 * u * t * p1.z + t * t * p2.z;
        return out;
      }

      // Derivative of the quadratic Bezier — gives the ball's instantaneous
      // direction along the curve. Scaled by 1/duration to convert from
      // "units per parameter" to "units per second" (= velocity) at the
      // moment of impact, which we hand to the physics integrator.
      function quadraticBezierTangent(t, p0, p1, p2, out) {
        out.x = 2 * (1 - t) * (p1.x - p0.x) + 2 * t * (p2.x - p1.x);
        out.y = 2 * (1 - t) * (p1.y - p0.y) + 2 * t * (p2.y - p1.y);
        out.z = 2 * (1 - t) * (p1.z - p0.z) + 2 * t * (p2.z - p1.z);
        return out;
      }

      // Raycast from a normalized device coord onto a plane at z = planeZ
      // (plane normal pointing toward the camera).
      const raycaster = new THREE.Raycaster();
      const _ndc = new THREE.Vector2();
      const _hit = new THREE.Vector3();
      function ndcToPlane(ndcX, ndcY, planeZ, out) {
        _ndc.set(ndcX, ndcY);
        raycaster.setFromCamera(_ndc, camera);
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, -1), planeZ);
        if (raycaster.ray.intersectPlane(plane, _hit)) {
          out.copy(_hit);
          return true;
        }
        return false;
      }

      // =================================================================
      // CAMERA / NET / SHAKE FX (same as before)
      // =================================================================
      let shakeAmt = 0;
      function triggerShake(amount = 0.15) {
        shakeAmt = Math.min(shakeAmt + amount, 0.5);
      }
      let punchInUntil = 0;
      function triggerPunchIn(durationMs = 700) {
        punchInUntil = performance.now() + durationMs;
      }
      // -----------------------------------------------------------------
      // Net deformation system
      // -----------------------------------------------------------------
      // Each net mesh is animated independently. While the ball is pressing
      // into a net, that net's `mode` is "press" and its centre-of-deform
      // tracks the ball's contact point with amplitude growing toward the
      // ball's penetration depth. Once the ball leaves, the net transitions
      // to "release" — a damped cosine snap-back that overshoots through the
      // rest position once or twice before settling.
      const NET_INFLUENCE = 1.7;       // metres — how wide the tent around the impact reaches
      const NET_MAX_AMP = 0.85;        // metres — peak push depth at full penetration
      const NET_RELEASE_MS = 950;      // snap-back duration
      const NET_RELEASE_HZ = 5.5;      // oscillation frequency on snap-back
      const NET_PRESS_LERP = 28;       // how snappily the press amp tracks the ball
      const NET_CONTACT_LOST_MS = 40;  // grace period before press becomes release
      const _localBall = new THREE.Vector3();
      const netAnims = new Map();      // mesh → state

      function getNetState(mesh) {
        let s = netAnims.get(mesh);
        if (!s) {
          // Lazily snapshot the rest positions on first use (each net mesh
          // owns its own geometry — we made sure of that above).
          const posAttr = mesh.geometry.attributes.position;
          const base =
            mesh.userData.basePositions ||
            (mesh.userData.basePositions = new Float32Array(posAttr.array));
          s = {
            mesh,
            base,
            mode: "release",
            u: 0,
            v: 0,
            sign: 1,
            amp: 0,
            targetAmp: 0,
            releaseStartMs: 0,
            releaseAmp: 0,
            lastTouchedMs: 0,
          };
          netAnims.set(mesh, s);
        }
        return s;
      }

      function pressNetAt(mesh, ballWorldPos, penetrationDepth, now) {
        const s = getNetState(mesh);
        _localBall.copy(ballWorldPos);
        mesh.worldToLocal(_localBall);
        s.u = _localBall.x;
        s.v = _localBall.y;
        // The net bulges AWAY from the side the ball is on. For every net,
        // the local +Z axis points one way through the plane; we pick the
        // opposite of the ball's side so the deformation tracks the impact.
        s.sign = _localBall.z >= 0 ? -1 : 1;
        s.mode = "press";
        s.targetAmp = Math.min(NET_MAX_AMP, BALL_RADIUS + penetrationDepth * 5.5);
        s.lastTouchedMs = now;
      }

      // Immediately deposit a visible bulge at the impact site, then let it
      // snap back. Used at the moment the ball crosses the goal line so the
      // celebration coincides with a stretch (rather than waiting the ~0.2s
      // for the ball to physically reach the back net).
      function kickNetAt(mesh, ballWorldPos, amp) {
        const s = getNetState(mesh);
        _localBall.copy(ballWorldPos);
        mesh.worldToLocal(_localBall);
        s.u = _localBall.x;
        s.v = _localBall.y;
        s.sign = _localBall.z >= 0 ? -1 : 1;
        s.amp = amp;
        s.releaseAmp = amp;
        s.releaseStartMs = performance.now();
        s.mode = "release";
      }

      function applyNetDeformation(s) {
        const base = s.base;
        const positions = s.mesh.geometry.attributes.position;
        const arr = positions.array;
        const { u, v, sign, amp } = s;
        const pushAmp = sign * amp;
        for (let i = 0, n = positions.count; i < n; i++) {
          const i3 = i * 3;
          const dx = base[i3] - u;
          const dy = base[i3 + 1] - v;
          const distSq = dx * dx + dy * dy;
          if (distSq < NET_INFLUENCE * NET_INFLUENCE) {
            const dist = Math.sqrt(distSq);
            // Smooth half-cosine falloff — broad tent, not a sharp dimple.
            const falloff = 0.5 + 0.5 * Math.cos((dist / NET_INFLUENCE) * Math.PI);
            arr[i3 + 2] = base[i3 + 2] + pushAmp * falloff;
          } else {
            arr[i3 + 2] = base[i3 + 2];
          }
        }
        positions.needsUpdate = true;
      }

      function resetNetGeometry(mesh) {
        const base = mesh.userData.basePositions;
        if (!base) return;
        const arr = mesh.geometry.attributes.position.array;
        for (let i = 0; i < arr.length; i++) arr[i] = base[i];
        mesh.geometry.attributes.position.needsUpdate = true;
      }

      let _lastNetUpdateMs = 0;
      function updateNetAnimations(now) {
        const dt = Math.min((now - _lastNetUpdateMs) / 1000, 0.05);
        _lastNetUpdateMs = now;

        for (const [mesh, s] of netAnims) {
          // If a press hasn't been refreshed for a few frames, the ball has
          // either left the surface or never made real contact — flip to
          // release so the net snaps back.
          if (s.mode === "press" && now - s.lastTouchedMs > NET_CONTACT_LOST_MS) {
            s.mode = "release";
            s.releaseStartMs = now;
            s.releaseAmp = s.amp;
          }

          if (s.mode === "press") {
            s.amp += (s.targetAmp - s.amp) * Math.min(1, dt * NET_PRESS_LERP);
            applyNetDeformation(s);
          } else {
            const elapsed = (now - s.releaseStartMs) / 1000;
            const T = NET_RELEASE_MS / 1000;
            if (elapsed >= T) {
              resetNetGeometry(mesh);
              netAnims.delete(mesh);
              continue;
            }
            const decay = Math.pow(1 - elapsed / T, 1.8);
            const wobble = Math.cos(elapsed * NET_RELEASE_HZ * Math.PI * 2);
            s.amp = s.releaseAmp * decay * wobble;
            applyNetDeformation(s);
          }
        }
      }

      // =================================================================
      // INPUT — aim with mouse, hold to charge power
      // =================================================================
      // `aim` tracks the most recent pointer position in NDC so the 3D arc
      // preview is always pointing somewhere sensible (it starts pointing at
      // the goal centre so the player sees an arc before they ever move the
      // mouse). `charge` tracks the press-and-hold timer.
      const aim = { ndcX: 0, ndcY: 0.05 };
      const charge = { active: false, startedAt: 0, pointerId: null };

      function ndcFromEvent(e) {
        return {
          x: (e.clientX / window.innerWidth) * 2 - 1,
          y: -(e.clientY / window.innerHeight) * 2 + 1,
        };
      }

      // Normalised hold-time in [0..1]. Read every frame to drive the meter.
      function chargeLevel() {
        if (!charge.active) return 0;
        return Math.min((performance.now() - charge.startedAt) / MAX_HOLD_MS, 1);
      }

      // Map a press-and-hold duration to the power factor passed to launchShot.
      // Even a zero-hold click yields MIN_POWER so a single click still kicks.
      function chargeToPower(level) {
        return MIN_POWER + (1 - MIN_POWER) * level;
      }

      function onPointerMove(e) {
        const ndc = ndcFromEvent(e);
        aim.ndcX = ndc.x;
        aim.ndcY = ndc.y;
        if (state.phase === "idle" || state.phase === "aiming") {
          updatePreview();
        }
      }

      function onPointerDown(e) {
        if (state.phase !== "idle") return;
        e.preventDefault();
        ui.canvas.setPointerCapture?.(e.pointerId);
        getAudio(); // unlock audio
        // Take the press point as the live aim so a tap-to-aim-and-shoot
        // gesture works the same as a mouse-hover-then-click.
        const ndc = ndcFromEvent(e);
        aim.ndcX = ndc.x;
        aim.ndcY = ndc.y;
        charge.active = true;
        charge.startedAt = performance.now();
        charge.pointerId = e.pointerId;
        state.phase = "aiming";
        ui.powerMeter.classList.add("active");
        setInstructions("Hold to charge — release to <strong>shoot</strong>");
        updatePreview();
      }

      function onPointerUp(e) {
        if (!charge.active || e.pointerId !== charge.pointerId) return;
        const level = chargeLevel();
        charge.active = false;
        ui.canvas.releasePointerCapture?.(e.pointerId);
        ui.powerMeter.classList.remove("active");
        ui.powerFill.style.width = "0%";

        const end = new THREE.Vector3();
        if (!ndcToPlane(aim.ndcX, aim.ndcY, PENALTY_DISTANCE, end)) {
          state.phase = "idle";
          return;
        }
        const control = arcControlPoint(end);
        launchShot(end, control, chargeToPower(level));
      }

      function onPointerCancel(e) {
        if (charge.active && e.pointerId === charge.pointerId) {
          charge.active = false;
          ui.powerMeter.classList.remove("active");
          ui.powerFill.style.width = "0%";
          state.phase = "idle";
        }
      }

      ui.canvas.addEventListener("pointermove", onPointerMove);
      ui.canvas.addEventListener("pointerdown", onPointerDown);
      ui.canvas.addEventListener("pointerup", onPointerUp);
      ui.canvas.addEventListener("pointercancel", onPointerCancel);

      // Procedural Bezier control point — a natural up-arc midway between the
      // ball and the aim endpoint. We lift the apex above whichever endpoint
      // is taller so the arc never dips below the floor or the goal mouth.
      const _ctrlScratch = new THREE.Vector3();
      function arcControlPoint(end) {
        _ctrlScratch.set(
          (BALL_HOME.x + end.x) / 2,
          Math.max(BALL_HOME.y, end.y) + 0.8,
          midPlaneZ()
        );
        return _ctrlScratch.clone();
      }

      // Always-on 3D arc preview pointing wherever the mouse currently is.
      function updatePreview() {
        const end = new THREE.Vector3();
        if (!ndcToPlane(aim.ndcX, aim.ndcY, PENALTY_DISTANCE, end)) return;
        const control = arcControlPoint(end);

        const positions = trajectoryGeo.attributes.position.array;
        const tmp = new THREE.Vector3();
        for (let i = 0; i <= 40; i++) {
          quadraticBezier(i / 40, BALL_HOME, control, end, tmp);
          positions[i * 3] = tmp.x;
          positions[i * 3 + 1] = tmp.y;
          positions[i * 3 + 2] = tmp.z;
        }
        trajectoryGeo.attributes.position.needsUpdate = true;
        trajectoryGeo.computeBoundingSphere();
        trajectoryLine.computeLineDistances();
        trajectoryLine.visible = true;

        crosshair.position.copy(end).setZ(end.z - 0.05);
        crosshair.lookAt(camera.position);
        crosshair.visible = true;
      }

      // =================================================================
      // SHOT
      // =================================================================
      // Ball-vs-goal-frame collision. Writes the surface normal (pointing
      // from contact toward the ball centre) into `outNormal` and returns
      // the penetration depth (so the caller can push the ball back out).
      // 0 = no collision. Checks both vertical posts and the crossbar; all
      // three are 0.06m radius cylinders.
      function checkFrameCollision(pos, outNormal) {
        // Vertical posts at x = ±GOAL_HALF_W, z = PENALTY_DISTANCE.
        if (pos.y >= -BALL_RADIUS && pos.y <= GOAL_HEIGHT + BALL_RADIUS) {
          for (const postX of [-GOAL_HALF_W, GOAL_HALF_W]) {
            const dx = pos.x - postX;
            const dz = pos.z - PENALTY_DISTANCE;
            const distSq = dx * dx + dz * dz;
            if (distSq < FRAME_HIT_RADIUS * FRAME_HIT_RADIUS && distSq > 1e-8) {
              const dist = Math.sqrt(distSq);
              outNormal.set(dx / dist, 0, dz / dist);
              return FRAME_HIT_RADIUS - dist;
            }
          }
        }
        // Crossbar at y = GOAL_HEIGHT, z = PENALTY_DISTANCE, spanning the goal width.
        if (pos.x >= -GOAL_HALF_W && pos.x <= GOAL_HALF_W) {
          const dy = pos.y - GOAL_HEIGHT;
          const dz = pos.z - PENALTY_DISTANCE;
          const distSq = dy * dy + dz * dz;
          if (distSq < FRAME_HIT_RADIUS * FRAME_HIT_RADIUS && distSq > 1e-8) {
            const dist = Math.sqrt(distSq);
            outNormal.set(0, dy / dist, dz / dist);
            return FRAME_HIT_RADIUS - dist;
          }
        }
        return 0;
      }

      // Ball-vs-net collision. Nets live on four faces of the goal box —
      // back (z = PENALTY_DISTANCE + NET_DEPTH), top (y = GOAL_HEIGHT),
      // left and right (x = ±GOAL_HALF_W) — but only inside the goal mouth,
      // i.e. once the ball has crossed past the goal plane. Writes the
      // inward-pointing normal into `outNormal` and returns penetration
      // depth (0 = no contact).
      // Set by checkNetCollision so the caller can identify which net mesh
      // was struck (in order to push deformation into the right geometry).
      let _hitNet = null;

      function checkNetCollision(pos, outNormal) {
        _hitNet = null;
        if (pos.z < PENALTY_DISTANCE) return 0;
        if (pos.z > PENALTY_DISTANCE + NET_DEPTH + BALL_RADIUS) return 0;
        if (Math.abs(pos.x) > GOAL_HALF_W + BALL_RADIUS) return 0;
        if (pos.y > GOAL_HEIGHT + BALL_RADIUS) return 0;

        const dBack = PENALTY_DISTANCE + NET_DEPTH - pos.z;
        const dTop = GOAL_HEIGHT - pos.y;
        const dLeft = pos.x - -GOAL_HALF_W;
        const dRight = GOAL_HALF_W - pos.x;

        let minD = BALL_RADIUS;
        let nx = 0, ny = 0, nz = 0;
        let mesh = null;
        if (dBack < minD) { minD = dBack; nx = 0; ny = 0; nz = -1; mesh = backNet; }
        if (dTop < minD) { minD = dTop; nx = 0; ny = -1; nz = 0; mesh = topNet; }
        if (dLeft < minD) { minD = dLeft; nx = 1; ny = 0; nz = 0; mesh = leftSideNet; }
        if (dRight < minD) { minD = dRight; nx = -1; ny = 0; nz = 0; mesh = rightSideNet; }

        if (minD < BALL_RADIUS) {
          outNormal.set(nx, ny, nz);
          _hitNet = mesh;
          return BALL_RADIUS - minD;
        }
        return 0;
      }

      // Scratch vectors reused across frames — allocating per-frame would
      // create a lot of garbage during the 60Hz physics tick.
      const _tangent = new THREE.Vector3();
      const _normal = new THREE.Vector3();
      const _velocity = new THREE.Vector3();

      function launchShot(end, control, power = 1) {
        state.phase = "shooting";
        state.attempts += 1;
        setScoreboard();
        trajectoryLine.visible = false;
        crosshair.visible = false;
        setInstructions("");

        // Keeper picks a random dive in the full continuous goal width. Power
        // shrinks the keeper's effective reach (a rocket is harder to save).
        const keeperTargetX = (Math.random() - 0.5) * (GOAL_WIDTH - 1.2);
        const keeperReach = 1.05 - 0.25 * power;

        // Stronger shots fly faster — duration shrinks roughly with power so
        // a maxed-out hold lands in ~0.65s vs ~1.4s for a soft tap.
        const flightDuration = FLIGHT_DURATION * (1.65 - 0.95 * power);

        playKick();
        playWhoosh();

        const start = BALL_HOME.clone();
        const t0 = performance.now();
        let lastFrameMs = t0;
        let lastBallZ = start.z;
        let physicsMode = false;
        let physicsStartMs = 0;
        let physicsBudgetMs = MAX_PHYSICS_MS; // bumped to NET_PHYSICS_MS for goals
        let didHitFrame = false;
        let goalCrossed = false;
        let outcomeDone = false;

        _velocity.set(0, 0, 0);

        function fireGoalFeedback() {
          state.goals += 1;
          setScoreboard();
          showFeedback("goal", "GOAL!");
          playCrowd();
          triggerShake(0.22);
          triggerPunchIn(750);
          // Big visible stretch at the moment of crossing — at the X,Y the
          // ball is heading for, projected onto the back net. The actual
          // ball-on-net press kicks in ~0.2s later as the ball reaches the
          // net surface.
          const predictedZ = PENALTY_DISTANCE + NET_DEPTH - 0.05;
          const flyDz = predictedZ - ball.position.z;
          const flyTime = flyDz / Math.max(_velocity.z, 0.5);
          _localBall.set(
            ball.position.x + _velocity.x * flyTime,
            ball.position.y + _velocity.y * flyTime - 0.5 * 9.81 * flyTime * flyTime,
            predictedZ
          );
          kickNetAt(backNet, _localBall, 0.55);
          recordGoalForCountry();
        }

        function declareOutcome() {
          if (outcomeDone) return;
          outcomeDone = true;
          state.phase = "result";

          // GOAL was already announced the moment the ball crossed the line.
          // We just need to clean up by scheduling the reset.
          if (goalCrossed) {
            setTimeout(resetForNextShot, 450);
            return;
          }

          if (didHitFrame) {
            // Post hit always counts as a miss — even if the ball deflected
            // somewhere afterwards we treat the post strike as the story.
            showFeedback("missed", "OFF THE POST!");
            playSave();
            setTimeout(resetForNextShot, RESULT_HOLD);
            return;
          }

          const inGoal =
            end.x > -GOAL_HALF_W + BALL_RADIUS &&
            end.x < GOAL_HALF_W - BALL_RADIUS &&
            end.y > BALL_RADIUS &&
            end.y < GOAL_HEIGHT - BALL_RADIUS;
          const dKeeper = Math.hypot(end.x - keeperTargetX, end.y - 1.0);
          const blocked = dKeeper < keeperReach;

          if (!inGoal) {
            showFeedback("missed", "MISSED!");
            playSave();
          } else if (blocked) {
            showFeedback("saved", "SAVED!");
            playSave();
            triggerShake(0.06);
          } else {
            // Fallback — the goal-line crossing detector usually catches
            // this case mid-flight, but if it ever missed (e.g. floating
            // point precision at exactly t=1) we still credit the goal.
            goalCrossed = true;
            fireGoalFeedback();
          }
          setTimeout(resetForNextShot, RESULT_HOLD);
        }

        function updateKeeperDive(progress01) {
          // Practice cutout slides on a rail — purely lateral, no lift or tilt.
          const diveT = Math.min(Math.max((progress01 - 0.25) / 0.55, 0), 1);
          const eased = 1 - Math.pow(1 - diveT, 2);
          keeperGroup.position.x = keeperTargetX * eased;
        }

        // Switch from Bezier into physics after hitting a post. `_normal`
        // must be set by the caller (it's the contact normal from
        // checkFrameCollision).
        function enterPostPhysics(now, tAtImpact) {
          quadraticBezierTangent(tAtImpact, start, control, end, _tangent);
          _velocity.copy(_tangent).multiplyScalar(1 / flightDuration);
          const vdn = _velocity.dot(_normal);
          if (vdn < 0) {
            _velocity.addScaledVector(_normal, -2 * vdn * POST_RESTITUTION);
          }
          physicsMode = true;
          physicsStartMs = now;
          physicsBudgetMs = MAX_PHYSICS_MS;
          didHitFrame = true;
          lastFrameMs = now;
          playPostThud();
          triggerShake(0.1);
        }

        // Switch from Bezier into physics after the ball crossed the goal
        // line — keeps the velocity it had on the curve so it carries into
        // the net naturally, no reflection.
        function enterGoalPhysics(now, tAtCrossing) {
          quadraticBezierTangent(tAtCrossing, start, control, end, _tangent);
          _velocity.copy(_tangent).multiplyScalar(1 / flightDuration);
          physicsMode = true;
          physicsStartMs = now;
          physicsBudgetMs = NET_PHYSICS_MS;
          lastFrameMs = now;
        }

        function applyNetContact(now, pen) {
          ball.position.addScaledVector(_normal, pen + 0.004);
          const vdn = _velocity.dot(_normal);
          if (vdn < 0) {
            // Soft reflection plus blanket damping so the ball sinks into
            // the net rather than springing back out.
            _velocity.addScaledVector(_normal, -(1 + NET_RESTITUTION) * vdn);
          }
          _velocity.multiplyScalar(NET_FRICTION);
          // Push deformation into the specific net the ball is touching.
          // The press stays active as long as we keep refreshing it; once
          // the ball leaves, updateNetAnimations switches it to a snap-back
          // automatically.
          if (_hitNet) pressNetAt(_hitNet, ball.position, pen, now);
        }

        function tickPhysics(now) {
          const dt = Math.min((now - lastFrameMs) / 1000, 0.05);
          lastFrameMs = now;

          _velocity.y -= GRAVITY * dt;
          _velocity.multiplyScalar(Math.pow(AIR_DRAG_PER_S, dt));
          ball.position.addScaledVector(_velocity, dt);

          // A post-deflected ball that ends up inside the goal frame is
          // still a goal. Once we've crossed the line, switch out of the
          // OFF-THE-POST branch and fire the celebration. The press/snap
          // animations continue to run on whichever net the ball reaches.
          if (
            !goalCrossed &&
            ball.position.z > PENALTY_DISTANCE + 0.04 &&
            ball.position.z < PENALTY_DISTANCE + NET_DEPTH &&
            ball.position.x > -GOAL_HALF_W + BALL_RADIUS &&
            ball.position.x < GOAL_HALF_W - BALL_RADIUS &&
            ball.position.y > BALL_RADIUS &&
            ball.position.y < GOAL_HEIGHT - BALL_RADIUS
          ) {
            goalCrossed = true;
            fireGoalFeedback();
            physicsBudgetMs = NET_PHYSICS_MS;
            physicsStartMs = now;
          }

          // Spin proportional to speed for visual flair.
          const speed = _velocity.length();
          ball.rotation.x += speed * dt * 1.6;
          ball.rotation.z += speed * dt * 0.6;

          // Ground bounce — clamp y and reflect/dampen vertical velocity.
          if (ball.position.y < BALL_RADIUS) {
            ball.position.y = BALL_RADIUS;
            if (_velocity.y < 0) {
              _velocity.y = -_velocity.y * GROUND_RESTITUTION;
              _velocity.x *= GROUND_FRICTION;
              _velocity.z *= GROUND_FRICTION;
            }
          }

          // Frame collisions (posts/crossbar) — for ricochets off the post,
          // and to keep a goal-bound ball from clipping the inside of a post
          // if its trajectory grazes one.
          const framePen = checkFrameCollision(ball.position, _normal);
          if (framePen > 0) {
            ball.position.addScaledVector(_normal, framePen + 0.005);
            const vdn = _velocity.dot(_normal);
            if (vdn < 0) {
              _velocity.addScaledVector(_normal, -2 * vdn * POST_RESTITUTION);
              playPostThud();
            }
          }

          // Net collisions — only meaningful once the ball is past the goal
          // plane, so this is cheap to call every frame regardless of mode.
          const netPen = checkNetCollision(ball.position, _normal);
          if (netPen > 0) applyNetContact(now, netPen);

          // Stop conditions. For a goal we wait longer (the ball naturally
          // bounces around inside the net) and accept "settled anywhere"
          // since the ball might come to rest on the back net at y ≈ 1m.
          const physElapsed = now - physicsStartMs;
          const settled = goalCrossed
            ? _velocity.lengthSq() < SETTLE_SPEED_SQ
            : _velocity.lengthSq() < SETTLE_SPEED_SQ &&
              ball.position.y <= BALL_RADIUS + 0.01;
          if (physElapsed > physicsBudgetMs || settled) {
            declareOutcome();
          }
        }

        function animate() {
          const now = performance.now();

          if (!physicsMode) {
            const elapsed = (now - t0) / 1000;
            const t = Math.min(elapsed / flightDuration, 1);
            quadraticBezier(t, start, control, end, ball.position);
            ball.rotation.x += 0.35;
            ball.rotation.y += 0.22;
            updateKeeperDive(t);

            // Frame collision (posts/crossbar) → post-physics path.
            const framePen = checkFrameCollision(ball.position, _normal);
            if (framePen > 0) {
              ball.position.addScaledVector(_normal, framePen + 0.01);
              enterPostPhysics(now, t);
              requestAnimationFrame(animate);
              return;
            }

            // Goal-line crossing detection. Compare current ball.position.z
            // to the previous frame's z — if we just stepped through the
            // goal plane while inside the frame and not blocked, that's a
            // goal. We fire the celebration NOW and continue in physics so
            // the ball bounces around inside the net.
            if (
              !goalCrossed &&
              lastBallZ < PENALTY_DISTANCE &&
              ball.position.z >= PENALTY_DISTANCE
            ) {
              const inGoal =
                ball.position.x > -GOAL_HALF_W + BALL_RADIUS &&
                ball.position.x < GOAL_HALF_W - BALL_RADIUS &&
                ball.position.y > BALL_RADIUS &&
                ball.position.y < GOAL_HEIGHT - BALL_RADIUS;
              const dKeeper = Math.hypot(
                ball.position.x - keeperTargetX,
                ball.position.y - 1.0
              );
              const blocked = dKeeper < keeperReach;
              if (inGoal && !blocked) {
                goalCrossed = true;
                // enterGoalPhysics must run first — it sets `_velocity` from
                // the Bezier tangent, which fireGoalFeedback uses to predict
                // where the ball will hit the back net.
                enterGoalPhysics(now, t);
                fireGoalFeedback();
                requestAnimationFrame(animate);
                return;
              }
            }
            lastBallZ = ball.position.z;

            if (t < 1) {
              requestAnimationFrame(animate);
              return;
            }
            declareOutcome();
            return;
          }

          tickPhysics(now);
          if (!outcomeDone) requestAnimationFrame(animate);
        }
        animate();
      }

      function resetForNextShot() {
        state.phase = "idle";
        // Pick a new shooting spot — varies side and distance each round so
        // the player has to re-judge the angle and re-aim each shot.
        pickShootingSpot();
        ball.position.copy(BALL_HOME);
        ball.rotation.set(0, 0, 0);
        const t0 = performance.now();
        const fromX = keeperGroup.position.x;
        (function back() {
          const t = Math.min((performance.now() - t0) / 350, 1);
          const e = 1 - Math.pow(1 - t, 3);
          keeperGroup.position.x = fromX * (1 - e);
          if (t < 1) requestAnimationFrame(back);
        })();
        setInstructions(
          "Aim with your mouse — <strong>hold</strong> to charge power, release to shoot."
        );
        // Re-show the arc pointing at the current mouse position.
        updatePreview();
      }

      // =================================================================
      // RESIZE
      // =================================================================
      function onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h, false);
        composer.setSize(w, h);
        bloom.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener("resize", onResize);
      window.addEventListener("orientationchange", () => setTimeout(onResize, 200));

      // =================================================================
      // MAIN LOOP
      // =================================================================
      const clock = new THREE.Clock();
      const _tmpLook = new THREE.Vector3();
      const _camOffset = new THREE.Vector3();
      function loop() {
        const dt = clock.getDelta();
        const t = clock.elapsedTime;

        if (state.phase === "idle") {
          keeperGroup.position.x = Math.sin(t * 1.3) * 0.55;
        }

        // Pump the power meter while the player is charging — driven from
        // wall-clock so it stays accurate even on slow frames.
        if (charge.active) {
          ui.powerFill.style.width = (chargeLevel() * 100).toFixed(1) + "%";
        }

        // Drive any in-progress net deformations (press while ball is in
        // contact, or snap-back wobble afterward). Empty-map fast path is
        // free, so it's fine to call every frame.
        updateNetAnimations(performance.now());

        if (shakeAmt > 0.0001) {
          _camOffset.set(
            (Math.random() - 0.5) * shakeAmt,
            (Math.random() - 0.5) * shakeAmt,
            (Math.random() - 0.5) * shakeAmt * 0.5
          );
          shakeAmt *= 0.86;
        } else {
          _camOffset.set(0, 0, 0);
          shakeAmt = 0;
        }

        const targetX = state.phase === "shooting" ? ball.position.x * 0.18 : 0;
        camera.position.x +=
          (CAMERA_HOME.x + targetX - camera.position.x) * Math.min(1, dt * 4);
        camera.position.y += (CAMERA_HOME.y - camera.position.y) * Math.min(1, dt * 3);
        camera.position.z += (CAMERA_HOME.z - camera.position.z) * Math.min(1, dt * 3);
        camera.position.add(_camOffset);

        const wantFov = performance.now() < punchInUntil ? 50 : 62;
        camera.fov += (wantFov - camera.fov) * Math.min(1, dt * 5);
        camera.updateProjectionMatrix();

        if (state.phase === "shooting" || state.phase === "result") {
          _tmpLook.copy(ball.position);
          _tmpLook.y += 0.4;
          camera.lookAt(_tmpLook);
        } else {
          camera.lookAt(CAMERA_LOOK_AT);
        }

        composer.render();
        requestAnimationFrame(loop);
      }

      onResize();
      setScoreboard();
      // Show the arc immediately on first load — pointing at the default aim
      // (slightly above goal centre) so the player understands the mechanic
      // before they even move the mouse.
      updatePreview();

      // Always force the picker open on load — the player should commit to
      // a country every single time they play, even if they picked one in a
      // previous session. (The localStorage helpers still exist for the
      // "change country" mid-session flow, but we ignore any saved value.)
      state.country = null;
      renderLeaderboard();
      showCountryPicker({ allowClose: false });

      requestAnimationFrame(loop);

      // =================================================================
      // EXTENSIBILITY HOOKS
      //   - state.country (set externally for future leaderboard)
      //   - onGoal callback (commented inside launchShot) — wire to
      //     localStorage or an API when the leaderboard ships
      // =================================================================
    </script>
  </body>
</html>
