<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Ria World Cup — Keepy Uppy</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1419;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      /* -----------------------------------------------------------------
         Country picker — modal-style overlay shown before the first game.
         ----------------------------------------------------------------- */
      .picker {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 16, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 20px;
      }
      .picker[hidden] { display: none; }
      .picker-card {
        background: #1a1d24;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 28px 28px 20px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .picker-card h1 {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 800;
      }
      .picker-card p {
        margin: 0 0 18px;
        font-size: 13px;
        opacity: 0.7;
      }
      .picker-card select {
        width: 100%;
        padding: 12px 14px;
        background: #0f1219;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        font-size: 16px;
        font-family: inherit;
        appearance: none;
        -webkit-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%23fff' fill='none' stroke-width='1.5'/></svg>");
        background-repeat: no-repeat;
        background-position: right 14px center;
        margin-bottom: 14px;
      }
      .picker-card button {
        width: 100%;
        padding: 13px;
        background: #ff6e14;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .picker-card button:hover { background: #ff8033; }

      /* -----------------------------------------------------------------
         Game canvas + HUD
         ----------------------------------------------------------------- */
      .game { position: fixed; inset: 0; }
      .game[hidden] { display: none; }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: pointer;
        touch-action: none; /* swallow scroll/pinch so taps land cleanly */
      }

      .scoreboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .stat {
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      .stat-touches {
        font-size: 22px;
        font-weight: 800;
      }
      /* Big centered country header — flag + name + live score for whoever
         the player chose. The score animates on every tap via .pop. */
      .country-header {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 22px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(253, 230, 138, 0.35);
        border-radius: 999px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        pointer-events: none;
        z-index: 2;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        white-space: nowrap;
      }
      .header-flag {
        font-size: 32px;
        line-height: 1;
      }
      .header-name {
        font-size: 18px;
        font-weight: 800;
        color: #fde68a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .header-score {
        font-size: 32px;
        font-weight: 900;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
        min-width: 56px;
        text-align: right;
        line-height: 1;
        transition: transform 0.05s linear;
      }
      .header-score.pop {
        animation: scorePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes scorePop {
        0% { transform: scale(1); color: #ffffff; }
        35% { transform: scale(1.25); color: #fde047; }
        100% { transform: scale(1); color: #ffffff; }
      }

      /* "+1" floaters that fly from the ball to the player's leaderboard
         row on every tap. Plain absolute-positioned spans driven by a CSS
         transition — JS sets the source/target positions, the browser
         animates the rest. Self-remove on transitionend. */
      .floater {
        position: fixed;
        z-index: 6;
        font-size: 28px;
        font-weight: 900;
        color: #fde047;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
        pointer-events: none;
        will-change: transform, opacity;
        transition:
          transform 0.85s cubic-bezier(0.25, 1.1, 0.5, 1),
          opacity 0.85s ease-out;
      }

      .leaderboard {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        right: 16px;
        width: 200px;
        max-height: 70vh;
        overflow: auto;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 10px 12px 8px;
        font-size: 13px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        pointer-events: none;
      }
      .lb-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 4px;
      }
      .lb-row {
        display: grid;
        grid-template-columns: 18px 22px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 3px 2px;
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
      }
      .lb-row.you {
        background: rgba(253, 230, 138, 0.18);
        color: #fde68a;
        font-weight: 700;
      }
      .lb-rank { opacity: 0.55; font-size: 11px; }
      .lb-flag { font-size: 16px; line-height: 1; }
      .lb-name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hint {
        position: absolute;
        bottom: max(env(safe-area-inset-bottom, 0px), 24px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 13px;
        opacity: 0.65;
        pointer-events: none;
        transition: opacity 0.4s ease-out;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }

      /* -----------------------------------------------------------------
         Game-over card
         ----------------------------------------------------------------- */
      .gameover {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 16, 0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        padding: 20px;
      }
      .gameover[hidden] { display: none; }
      .gameover-card {
        background: #1a1d24;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 28px 32px;
        text-align: center;
        width: 100%;
        max-width: 360px;
        max-height: calc(100vh - 40px);
        overflow: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .gameover-card h2 {
        margin: 0 0 4px;
        font-size: 26px;
        font-weight: 800;
      }
      .gameover-card .score {
        font-size: 64px;
        font-weight: 900;
        color: #fde047;
        margin: 8px 0;
        line-height: 1;
      }
      .gameover-card .label {
        opacity: 0.6;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .gameover-card button {
        margin-top: 18px;
        width: 100%;
        padding: 13px;
        background: #ff6e14;
        color: #000;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .gameover-card button:hover { background: #ff8033; }

      /* Leaderboard snapshot embedded in the game-over card so the player
         can see where their country sits at the end of the run. Visually
         echoes the live HUD leaderboard. */
      .gameover-card .gameover-lb {
        margin-top: 20px;
        text-align: left;
        max-height: 220px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px 8px;
      }
      .gameover-card .gameover-lb-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.65;
        margin-bottom: 6px;
      }
      .gameover-card .lb-row {
        display: grid;
        grid-template-columns: 18px 22px 1fr auto;
        align-items: center;
        gap: 6px;
        padding: 3px 2px;
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
        font-size: 13px;
      }
      .gameover-card .lb-row.you {
        background: rgba(253, 230, 138, 0.18);
        color: #fde68a;
        font-weight: 700;
      }
      .gameover-card .lb-rank { opacity: 0.55; font-size: 11px; }
      .gameover-card .lb-flag { font-size: 16px; line-height: 1; }
      .gameover-card .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* Smaller screens — shrink the leaderboard + country header so they
         don't crowd the ball, and push the scoreboard below the header. */
      @media (max-width: 600px) {
        .scoreboard { top: calc(max(env(safe-area-inset-top, 0px), 16px) + 56px); }
        .leaderboard { top: calc(max(env(safe-area-inset-top, 0px), 16px) + 56px); }
      }
      @media (max-width: 480px) {
        /* Hide the live HUD leaderboard on phones — it crowds the playfield.
           Players still see the full leaderboard (and their country) on the
           game-over card. */
        .leaderboard { display: none; }
        .stat { padding: 7px 11px; font-size: 12px; }
        .stat-touches { font-size: 18px; }
        .country-header { padding: 7px 14px; gap: 10px; }
        .header-flag { font-size: 22px; }
        .header-name { font-size: 13px; letter-spacing: 0.04em; }
        .header-score { font-size: 22px; min-width: 40px; }
      }
    </style>
  </head>
  <body>
    <!-- Step 1: pick your country before the game starts. -->
    <div class="picker" id="picker">
      <div class="picker-card">
        <h1>Pick your country</h1>
        <p>Every touch you make goes to your country's leaderboard score.</p>
        <select id="country-select"></select>
        <button id="start-btn" type="button">Start playing</button>
      </div>
    </div>

    <!-- Step 2: the game itself. -->
    <div class="game" id="game" hidden>
      <canvas id="canvas"></canvas>

      <div class="scoreboard">
        <div class="stat stat-touches">⚽ <span id="touches">0</span></div>
        <div class="stat">🏆 Best <span id="best">0</span></div>
      </div>

      <div class="country-header" id="country-header">
        <div class="header-flag" id="header-flag">🇲🇽</div>
        <div class="header-name" id="header-name">Mexico</div>
        <div class="header-score" id="header-score">0</div>
      </div>

      <div class="leaderboard">
        <div class="lb-title">🌎 Leaderboard</div>
        <div id="lb-rows"></div>
      </div>

      <div class="hint" id="hint">Tap the ball to keep it up</div>

      <div class="gameover" id="gameover" hidden>
        <div class="gameover-card">
          <h2>Game over</h2>
          <div class="label">You kept it up</div>
          <div class="score" id="final-score">0</div>
          <div class="label">touches</div>
          <div class="gameover-lb">
            <div class="gameover-lb-title">🌎 Leaderboard</div>
            <div id="gameover-lb-rows"></div>
          </div>
          <button id="play-again" type="button">Play again</button>
        </div>
      </div>
    </div>

    <script>
      // =================================================================
      // COUNTRIES + LEADERBOARD STATE
      // =================================================================
      // Each entry is [ISO-2 code, flag emoji, display name, seed score].
      // Seed scores keep the leaderboard from reading all-zeros on first
      // load — without them the board looks broken.
      const COUNTRIES = [
        ["MX", "🇲🇽", "Mexico", 412],
        ["CO", "🇨🇴", "Colombia", 358],
        ["PE", "🇵🇪", "Peru", 287],
        ["CL", "🇨🇱", "Chile", 245],
        ["AR", "🇦🇷", "Argentina", 391],
        ["BR", "🇧🇷", "Brazil", 478],
        ["US", "🇺🇸", "USA", 219],
        ["ES", "🇪🇸", "Spain", 196],
        ["PH", "🇵🇭", "Philippines", 173],
        ["IN", "🇮🇳", "India", 312],
      ];

      // Per-country running totals — mutated as the player racks up touches.
      // No persistence (per the spec), so totals reset on a page reload.
      const scores = Object.fromEntries(
        COUNTRIES.map(([code, , , seed]) => [code, seed])
      );

      // Session state.
      let playerCountry = "MX"; // overwritten when the player picks
      let touches = 0;
      let best = 0;
      let alive = false; // true while a run is in progress

      // =================================================================
      // UI REFERENCES
      // =================================================================
      const ui = {
        picker: document.getElementById("picker"),
        countrySelect: document.getElementById("country-select"),
        startBtn: document.getElementById("start-btn"),
        game: document.getElementById("game"),
        canvas: document.getElementById("canvas"),
        touches: document.getElementById("touches"),
        best: document.getElementById("best"),
        lbRows: document.getElementById("lb-rows"),
        hint: document.getElementById("hint"),
        gameover: document.getElementById("gameover"),
        finalScore: document.getElementById("final-score"),
        playAgain: document.getElementById("play-again"),
        gameoverLbRows: document.getElementById("gameover-lb-rows"),
        headerFlag: document.getElementById("header-flag"),
        headerName: document.getElementById("header-name"),
        headerScore: document.getElementById("header-score"),
      };

      // Sync the centered country header with the current playerCountry —
      // flag, name, and starting score.
      function setCountryHeader() {
        const entry = COUNTRIES.find(([code]) => code === playerCountry);
        if (!entry) return;
        ui.headerFlag.textContent = entry[1];
        ui.headerName.textContent = entry[2];
        ui.headerScore.textContent = String(scores[playerCountry]);
      }

      // Bump the country score in the header with a quick scale+colour pop
      // so the increment feels alive. Remove + readd the class so it
      // retriggers on every tap, even rapid ones.
      function pulseCountryScore() {
        ui.headerScore.textContent = String(scores[playerCountry]);
        ui.headerScore.classList.remove("pop");
        // Force reflow so the animation restarts cleanly on the next add.
        void ui.headerScore.offsetWidth;
        ui.headerScore.classList.add("pop");
      }

      // Pop a "+1" at (srcX, srcY) and animate it toward the player's
      // highlighted row on the leaderboard. Each call creates a throwaway
      // DOM node that self-removes after the transition; cheap enough that
      // rapid-fire tapping won't pile up.
      function spawnFloater(srcX, srcY) {
        const f = document.createElement("div");
        f.className = "floater";
        f.textContent = "+1";
        // Position at the source first — initial paint with no transform.
        f.style.left = srcX + "px";
        f.style.top = srcY + "px";
        f.style.transform = "translate(-50%, -50%) scale(1)";
        f.style.opacity = "1";
        document.body.appendChild(f);

        // Default target — right edge of the screen if the leaderboard row
        // isn't there yet (e.g. very first tap before render).
        let targetX = window.innerWidth - 100;
        let targetY = 60;
        const youRow = ui.lbRows.querySelector(".lb-row.you");
        if (youRow) {
          const rect = youRow.getBoundingClientRect();
          targetX = rect.left + rect.width / 2;
          targetY = rect.top + rect.height / 2;
        }
        const dx = targetX - srcX;
        const dy = targetY - srcY;

        // Next frame, swap to the destination transform — the CSS
        // transition handles the actual motion.
        requestAnimationFrame(() => {
          f.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.55)`;
          f.style.opacity = "0";
        });
        f.addEventListener("transitionend", () => f.remove(), { once: true });
        // Safety net in case transitionend doesn't fire (e.g. tab inactive).
        setTimeout(() => f.remove(), 1200);
      }

      // Build the country dropdown.
      COUNTRIES.forEach(([code, flag, name]) => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = `${flag}  ${name}`;
        if (code === playerCountry) opt.selected = true;
        ui.countrySelect.appendChild(opt);
      });

      // Shared markup builder — reused by the live HUD board AND the
      // end-of-run snapshot on the game-over card.
      function buildLeaderboardHTML() {
        const ranked = COUNTRIES
          .map(([code, flag, name]) => ({ code, flag, name, score: scores[code] }))
          .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
        return ranked
          .map(
            (r, idx) => `
              <div class="lb-row${r.code === playerCountry ? " you" : ""}">
                <span class="lb-rank">${idx + 1}</span>
                <span class="lb-flag">${r.flag}</span>
                <span class="lb-name">${r.name}</span>
                <span>${r.score}</span>
              </div>`
          )
          .join("");
      }

      // Live HUD leaderboard — refreshed on every tap.
      function renderLeaderboard() {
        ui.lbRows.innerHTML = buildLeaderboardHTML();
      }

      // End-of-run snapshot — populated when the game-over card opens.
      function renderGameoverLeaderboard() {
        ui.gameoverLbRows.innerHTML = buildLeaderboardHTML();
      }

      function setTouches(n) {
        touches = n;
        ui.touches.textContent = String(n);
        if (n > best) {
          best = n;
          ui.best.textContent = String(n);
        }
      }

      // =================================================================
      // GAME PHYSICS + RENDERING
      // =================================================================
      const canvas = ui.canvas;
      const ctx = canvas.getContext("2d");

      // Tuning constants. All units are pixels and pixels-per-second.
      const GRAVITY = 1500;         // downward acceleration
      const KICK_VELOCITY = -700;   // upward bump on every tap
      const SIDE_RESTITUTION = 0.7; // bounce energy retained off side walls
      const TOP_DAMPING = 0.4;      // how much energy the ceiling clamp removes
      const HORIZONTAL_FACTOR = 10; // off-centre taps push sideways by dx * this
      const MAX_VX = 700;           // cap horizontal speed
      const HIT_FORGIVENESS = 1.15; // tap hitbox = ball.r * this
      const GROUND_FRAC = 0.78;     // grass starts at this fraction of viewport height
      const BALL_RADIUS_FRAC = 0.04;// ball radius as fraction of min(W,H)
      const MIN_BALL_RADIUS = 22;

      let W = 0, H = 0;
      let groundY = 0; // top of the grass band — recomputed on every resize
      const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 40, spin: 0, vSpin: 0 };

      // Match canvas backing-store to the actual CSS pixel size so the ball
      // stays sharp on high-DPR screens.
      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ball.r = Math.max(MIN_BALL_RADIUS, Math.min(W, H) * BALL_RADIUS_FRAC);
        groundY = H * GROUND_FRAC;
        // Keep the ball on-screen if the window shrinks mid-game.
        if (alive) {
          ball.x = Math.max(ball.r, Math.min(W - ball.r, ball.x));
          ball.y = Math.max(ball.r, Math.min(groundY - ball.r, ball.y));
        }
      }
      window.addEventListener("resize", resize);

      function resetBall() {
        ball.x = W / 2;
        ball.y = H * 0.35;
        ball.vx = 0;
        ball.vy = 0;
        ball.spin = 0;
        ball.vSpin = 0;
      }

      function startGame() {
        setTouches(0);
        resetBall();
        alive = true;
        ui.hint.style.opacity = "0.65";
        ui.gameover.hidden = true;
      }

      function endGame() {
        alive = false;
        ui.finalScore.textContent = String(touches);
        // Snapshot the leaderboard into the card so the player can see where
        // their country sits at the end of the run.
        renderGameoverLeaderboard();
        ui.gameover.hidden = false;
      }

      // Bump the ball if the tap landed on it. Off-centre taps add lateral
      // velocity so the player has some steering control.
      function handleTap(clientX, clientY) {
        if (!alive) return;
        const rect = canvas.getBoundingClientRect();
        const cx = clientX - rect.left;
        const cy = clientY - rect.top;
        const dx = cx - ball.x;
        const dy = cy - ball.y;
        const distSq = dx * dx + dy * dy;
        const hitR = ball.r * HIT_FORGIVENESS;
        if (distSq > hitR * hitR) return;

        ball.vy = KICK_VELOCITY;
        // Newton's third law for keepy-uppy: hit the right side of the ball
        // and it gets pushed LEFT, hit the left side and it goes right, hit
        // dead-centre and it shoots straight up. So the horizontal kick is
        // the *negative* of where you struck relative to the ball's centre.
        ball.vx = -dx * HORIZONTAL_FACTOR;
        if (ball.vx > MAX_VX) ball.vx = MAX_VX;
        if (ball.vx < -MAX_VX) ball.vx = -MAX_VX;
        // Spin matches the rolling direction the ball is now moving in.
        ball.vSpin = dx * 0.05;

        setTouches(touches + 1);
        scores[playerCountry] = (scores[playerCountry] || 0) + 1;
        renderLeaderboard();
        pulseCountryScore();
        // Pop a "+1" at the actual tap point and let it fly to the
        // player's leaderboard row.
        spawnFloater(clientX, clientY);
        ui.hint.style.opacity = "0";
      }
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        handleTap(e.clientX, e.clientY);
      });

      // -----------------------------------------------------------------
      // Drawing helpers
      // -----------------------------------------------------------------
      // Stadium scene at golden hour: sunset sky, a soft sun, a couple of
      // clouds, a stepped stadium silhouette with floodlights, and a grass
      // field with subtle mowing stripes radiating from a vanishing point.
      // Every gradient/path is rebuilt each frame — cheap enough at 60fps
      // and avoids any cache-invalidation headache on resize.
      function drawBackground() {
        // ---- SKY ----
        const sky = ctx.createLinearGradient(0, 0, 0, groundY);
        sky.addColorStop(0, "#162247");
        sky.addColorStop(0.4, "#3a2d62");
        sky.addColorStop(0.75, "#c4633a");
        sky.addColorStop(1, "#f0a560");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, groundY);

        // ---- SUN + WARM HALO ----
        const sunX = W * 0.72;
        const sunY = groundY - H * 0.12;
        const sunR = Math.min(W, H) * 0.045;
        const halo = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 8);
        halo.addColorStop(0, "rgba(255, 225, 165, 0.7)");
        halo.addColorStop(0.35, "rgba(255, 170, 110, 0.22)");
        halo.addColorStop(1, "rgba(255, 150, 100, 0)");
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, W, groundY);
        ctx.fillStyle = "#fff0c8";
        ctx.beginPath();
        ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
        ctx.fill();

        // ---- CLOUDS ----
        function cloud(cx, cy, sz) {
          ctx.fillStyle = "rgba(255, 205, 175, 0.32)";
          ctx.beginPath();
          ctx.ellipse(cx - sz * 0.45, cy, sz * 0.4, sz * 0.18, 0, 0, Math.PI * 2);
          ctx.ellipse(cx, cy - sz * 0.06, sz * 0.5, sz * 0.22, 0, 0, Math.PI * 2);
          ctx.ellipse(cx + sz * 0.45, cy + sz * 0.02, sz * 0.42, 0.19 * sz, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        cloud(W * 0.18, H * 0.22, Math.min(W, H) * 0.09);
        cloud(W * 0.46, H * 0.11, Math.min(W, H) * 0.11);
        cloud(W * 0.88, H * 0.27, Math.min(W, H) * 0.075);

        // ---- STADIUM SILHOUETTE ----
        // A stepped roofline of distant stands. Drawn as one filled polygon
        // so the silhouette reads as a single dark mass against the sky.
        ctx.fillStyle = "#15203a";
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(0, groundY - 24);
        ctx.lineTo(W * 0.07, groundY - 26);
        ctx.lineTo(W * 0.09, groundY - 44);
        ctx.lineTo(W * 0.3, groundY - 46);
        ctx.lineTo(W * 0.32, groundY - 34);
        ctx.lineTo(W * 0.48, groundY - 36);
        ctx.lineTo(W * 0.5, groundY - 56);
        ctx.lineTo(W * 0.72, groundY - 56);
        ctx.lineTo(W * 0.74, groundY - 40);
        ctx.lineTo(W * 0.94, groundY - 38);
        ctx.lineTo(W * 0.96, groundY - 26);
        ctx.lineTo(W, groundY - 24);
        ctx.lineTo(W, groundY);
        ctx.closePath();
        ctx.fill();

        // ---- FLOODLIGHTS ----
        ctx.strokeStyle = "#0e1626";
        ctx.lineWidth = 2;
        const lights = [
          { x: W * 0.16, h: 78 },
          { x: W * 0.61, h: 96 },
          { x: W * 0.88, h: 72 },
        ];
        for (const { x, h } of lights) {
          ctx.beginPath();
          ctx.moveTo(x, groundY - 50);
          ctx.lineTo(x, groundY - 50 - h);
          ctx.stroke();
          const ly = groundY - 50 - h;
          const lampGlow = ctx.createRadialGradient(x, ly, 0, x, ly, 32);
          lampGlow.addColorStop(0, "rgba(255, 240, 200, 0.6)");
          lampGlow.addColorStop(1, "rgba(255, 240, 200, 0)");
          ctx.fillStyle = lampGlow;
          ctx.beginPath();
          ctx.arc(x, ly, 32, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff5d6";
          ctx.beginPath();
          ctx.arc(x, ly, 4, 0, Math.PI * 2);
          ctx.fill();
        }

        // ---- HORIZON HAZE ----
        // Soft warm bleed where stadium meets grass — sells the depth.
        const haze = ctx.createLinearGradient(0, groundY - 10, 0, groundY + 4);
        haze.addColorStop(0, "rgba(255, 200, 150, 0)");
        haze.addColorStop(1, "rgba(255, 200, 150, 0.4)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, groundY - 10, W, 14);

        // ---- GRASS ----
        const grass = ctx.createLinearGradient(0, groundY, 0, H);
        grass.addColorStop(0, "#4d8554");
        grass.addColorStop(0.5, "#386841");
        grass.addColorStop(1, "#1d4326");
        ctx.fillStyle = grass;
        ctx.fillRect(0, groundY, W, H - groundY);

        // ---- MOWING STRIPES (perspective from a vanishing point above) ----
        const vpX = W * 0.5;
        const vpY = groundY - H * 0.25;
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, groundY, W, H - groundY);
        ctx.clip();
        for (let i = 0; i < 9; i++) {
          if (i % 2 !== 0) continue;
          const a1 = (i / 9 - 0.5) * Math.PI * 1.25;
          const a2 = ((i + 1) / 9 - 0.5) * Math.PI * 1.25;
          ctx.fillStyle = "rgba(0,0,0,0.11)";
          ctx.beginPath();
          ctx.moveTo(vpX + Math.tan(a1) * (groundY - vpY), groundY);
          ctx.lineTo(vpX + Math.tan(a1) * (H + 300 - vpY), H + 300);
          ctx.lineTo(vpX + Math.tan(a2) * (H + 300 - vpY), H + 300);
          ctx.lineTo(vpX + Math.tan(a2) * (groundY - vpY), groundY);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      // Simple white sphere — a radial gradient does the heavy lifting:
      // light from the upper-left, falling off to a darker rim on the
      // lower-right. A small specular highlight near the light direction
      // sells it as a glossy ball, and an oval drop shadow on the grass
      // shrinks/fades as the ball climbs.
      function drawBall() {
        // ---- DROP SHADOW ----
        const heightAboveGround = groundY - ball.y;
        const heightFrac = Math.max(0, Math.min(1, heightAboveGround / (H * 0.55)));
        const shadowAlpha = 0.45 * (1 - heightFrac * 0.65);
        const shadowScale = Math.max(0.45, 1 - heightFrac * 0.5);
        ctx.save();
        ctx.translate(ball.x, groundY + ball.r * 0.1);
        ctx.scale(shadowScale, 0.3);
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(0, 0, ball.r * 1.0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // ---- SPHERE ----
        ctx.save();
        ctx.translate(ball.x, ball.y);

        // Body — radial gradient shaded as if lit from the upper-left.
        const body = ctx.createRadialGradient(
          -ball.r * 0.32,
          -ball.r * 0.38,
          0,
          0,
          0,
          ball.r * 1.05
        );
        body.addColorStop(0, "#ffffff");
        body.addColorStop(0.4, "#f0f0f0");
        body.addColorStop(0.82, "#a8a8a8");
        body.addColorStop(1, "#666666");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
        ctx.fill();

        // Specular highlight — a small bright spot offset toward the light.
        const spec = ctx.createRadialGradient(
          -ball.r * 0.34,
          -ball.r * 0.4,
          0,
          -ball.r * 0.34,
          -ball.r * 0.4,
          ball.r * 0.42
        );
        spec.addColorStop(0, "rgba(255,255,255,0.95)");
        spec.addColorStop(0.6, "rgba(255,255,255,0.25)");
        spec.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = spec;
        ctx.beginPath();
        ctx.arc(-ball.r * 0.34, -ball.r * 0.4, ball.r * 0.42, 0, Math.PI * 2);
        ctx.fill();

        // Subtle dark edge for definition against bright sky regions.
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      // -----------------------------------------------------------------
      // Main loop
      // -----------------------------------------------------------------
      let lastT = performance.now();
      function loop(now) {
        const dt = Math.min((now - lastT) / 1000, 0.05);
        lastT = now;

        if (alive) {
          ball.vy += GRAVITY * dt;
          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;
          // Spin trails ball motion for visual flavour.
          ball.spin += ball.vSpin * dt + ball.vx * dt * 0.008;

          // Side walls — bounce with some energy loss.
          if (ball.x - ball.r < 0) {
            ball.x = ball.r;
            ball.vx = -ball.vx * SIDE_RESTITUTION;
          } else if (ball.x + ball.r > W) {
            ball.x = W - ball.r;
            ball.vx = -ball.vx * SIDE_RESTITUTION;
          }

          // Top — clamp so the ball doesn't disappear off-screen.
          if (ball.y - ball.r < 0) {
            ball.y = ball.r;
            ball.vy = Math.abs(ball.vy) * TOP_DAMPING;
          }

          // Ground — run ends.
          if (ball.y + ball.r >= groundY) {
            ball.y = groundY - ball.r;
            ball.vy = 0;
            endGame();
          }
        }

        drawBackground();
        drawBall();
        requestAnimationFrame(loop);
      }

      // =================================================================
      // BOOT
      // =================================================================
      ui.startBtn.addEventListener("click", () => {
        playerCountry = ui.countrySelect.value;
        setCountryHeader();
        ui.picker.hidden = true;
        ui.game.hidden = false;
        resize();
        renderLeaderboard();
        startGame();
      });

      ui.playAgain.addEventListener("click", () => {
        startGame();
      });

      // Initial sizing + leaderboard so the canvas isn't blank if the
      // window resizes while the picker is open.
      resize();
      renderLeaderboard();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
